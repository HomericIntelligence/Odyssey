[workspace]
channels = ["https://conda.modular.com/max-nightly", "https://conda.modular.com/max", "conda-forge"]
name = "ProjectOdyssey"
platforms = ["linux-64"]
version = "0.1.0"


[dependencies]
# Language runtime
mojo = "==1.0.0b2.dev2026050805"

# Core libraries
numpy = ">=2.3.5,<3"
jinja2 = ">=3.1.0,<4"
pyyaml = ">=6.0.0,<7"
click = ">=8.0.0,<9"
tqdm = ">=4.67.0,<5"
# Utilities
prettytable = ">=3.17.0,<4"
pygithub = ">=2.8.1,<3"
jsonschema = ">=4.0"
nbformat = ">=5.10.0,<6"
nbconvert = ">=7.16.0,<8"
just = "*"
pydantic = ">=2.12.5,<3"

# Transitive-dependency CVE floors (#5386). These packages are not imported
# by project code; the constraints force the conda solver past known CVEs:
#   authlib    CVE-2026-41425
#   gitpython  CVE-2026-42215 / -42284 / -44244 / GHSA-mv93-w799-cj2w
#   mistune    CVE-2026-33079 / -44897
authlib = ">=1.6.11"
gitpython = ">=3.1.50"
mistune = ">=3.2.1"

[feature.dev.dependencies]
# Dev-only tools (not needed at runtime)
flask = ">=3.0.0,<4"
pip = ">=26.1"  # CVE-2026-1703 / -6357 (#5386)
# Python build frontend — used by `just wheel` to produce the
# projectodyssey wheel from python/pyproject.toml.
python-build = ">=1.2,<2"

# Testing
pytest = ">=9.0.3"  # CVE-2025-71176 (#5386)
pytest-cov = ">=6.0.0,<7"
pytest-timeout = ">=2.1.0,<3"
pytest-xdist = ">=3.0.0,<4"
pytest-benchmark = ">=5.0.0,<6"

# Code quality
ruff = ">=0.14.7,<0.16"
bandit = ">=1.7.5"
mypy = ">=1.19.1,<2"
types-PyYAML = ">=6.0"
safety = ">=3.0.0,<4"
pip-audit = ">=2.7.0,<3"

# Pre-commit
pre-commit = ">=3.5.0"
pre-commit-hooks = ">=4.5.0,<4.6"  # pinned to match .pre-commit-config.yaml rev (Issue #4030)
nbstripout = ">=0.7.1"            # tracked to keep in sync with .pre-commit-config.yaml (Issue #4030)

# Documentation
mkdocs = ">=1.6.0,<2"
mkdocs-material = ">=9.0.0,<10"
lychee = ">=0.22.0,<0.23"

[feature.notebook.dependencies]
jupyterlab = ">=4.3.0,<5"
matplotlib = ">=3.9.0,<4"
ipywidgets = ">=8.1.0,<9"
seaborn = ">=0.13.0,<1"

[environments]
default = { features = ["dev"], solve-group = "default" }
prod = { solve-group = "default" }
notebook = { features = ["notebook", "dev"], solve-group = "default" }

[pypi-dependencies]
homericintelligence-hephaestus = ">=0.9.0,<1"
pip-licenses = ">=4.0.0,<5"

[tasks]
bandit = "bandit --ini .bandit"
