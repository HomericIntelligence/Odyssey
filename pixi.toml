[workspace]
channels = ["https://conda.modular.com/max-nightly", "https://conda.modular.com/max", "conda-forge"]
name = "ProjectOdyssey"
platforms = ["linux-64"]
version = "0.1.0"


[dependencies]
# Language runtime
mojo = "==0.26.3.0.dev2026040705"

# Core libraries
numpy = ">=2.3.5,<3"
jinja2 = ">=3.1.0,<4"
pyyaml = ">=6.0.0,<7"
click = ">=8.0.0,<9"
tqdm = ">=4.67.0,<5"
flask = ">=3.0.0,<4"

# Utilities
prettytable = ">=3.17.0,<4"
pygithub = ">=2.8.1,<3"
jsonschema = ">=4.0"
nbformat = ">=5.10.0,<6"
nbconvert = ">=7.16.0,<8"
pip = ">=25.3,<26"
just = "*"
pydantic = ">=2.12.5,<3"
hephaestus = ">=0.7.0"  # Required for scripts/agents/agent_utils.py re-exports

[feature.dev.dependencies]
# Testing
pytest = ">=8.1.0,<9"
pytest-cov = ">=6.0.0,<7"
pytest-timeout = ">=2.1.0,<3"
pytest-xdist = ">=3.0.0,<4"
pytest-benchmark = ">=5.0.0,<6"

# Code quality
ruff = ">=0.14.7,<0.16"
bandit = ">=1.7.5"
mypy = ">=1.19.1,<2"
types-PyYAML = ">=6.0"
safety = ">=3.0.0,<4"
pip-audit = ">=2.7.0,<3"

# Pre-commit
pre-commit = ">=3.5.0"
pre-commit-hooks = ">=4.5.0,<4.6"  # pinned to match .pre-commit-config.yaml rev (Issue #4030)
nbstripout = ">=0.7.1"            # tracked to keep in sync with .pre-commit-config.yaml (Issue #4030)

# Documentation
mkdocs = ">=1.6.0,<2"
mkdocs-material = ">=9.0.0,<10"
lychee = ">=0.22.0,<0.23"

[feature.notebook.dependencies]
jupyterlab = ">=4.3.0,<5"
matplotlib = ">=3.9.0,<4"
ipywidgets = ">=8.1.0,<9"
seaborn = ">=0.13.0,<1"

[environments]
default = { features = ["dev"], solve-group = "default" }
prod = { solve-group = "default" }
notebook = { features = ["notebook", "dev"], solve-group = "default" }

[pypi-dependencies]
homericintelligence-hephaestus = ">=0.7.0,<1"
pip-licenses = ">=4.0.0,<5"

[tasks]
bandit = "bandit --ini .bandit"
