services:
  # Main development environment
  projectodyssey-dev:
    user: "${USER_ID}:${GROUP_ID}"
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        USER_ID: ${USER_ID}
        GROUP_ID: ${GROUP_ID}
        USER_NAME: ${USER_NAME:-dev}
    image: projectodyssey:dev
    volumes:
      - .:/workspace:Z
      - pixi-cache:/home/${USER_NAME:-dev}/.cache/pixi
      - pre-commit-cache:/home/${USER_NAME:-dev}/.cache/pre-commit
      - ${HOME}/.gitconfig:/home/${USER_NAME:-dev}/.gitconfig:ro
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    environment:
      - HOME=/home/${USER_NAME:-dev}
      - USER_ID=${USER_ID}
      - GROUP_ID=${GROUP_ID}
      - ENVIRONMENT=development
      - TERM=xterm-256color
      - PIXI_HOME=/home/${USER_NAME:-dev}/.pixi
      - PIXI_CACHE_DIR=/home/${USER_NAME:-dev}/.cache/pixi
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: /bin/bash
    # Resource limits require cgroups v2 with cpu controller;
    # omitted for compatibility with cgroups v1 hosts (Debian 11).

  # CI/Testing environment
  projectodyssey-ci:
    user: "${USER_ID}:${GROUP_ID}"
    build:
      context: .
      dockerfile: Dockerfile
      target: ci
      args:
        USER_ID: ${USER_ID}
        GROUP_ID: ${GROUP_ID}
        USER_NAME: ${USER_NAME:-dev}
    image: projectodyssey:ci
    volumes:
      - .:/workspace
      - pixi-cache:/home/${USER_NAME:-dev}/.cache/pixi
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    environment:
      - HOME=/home/${USER_NAME:-dev}
      - USER_ID=${USER_ID}
      - GROUP_ID=${GROUP_ID}
      - ENVIRONMENT=ci
      - CI=true
      - PIXI_HOME=/home/${USER_NAME:-dev}/.pixi
      - PIXI_CACHE_DIR=/home/${USER_NAME:-dev}/.cache/pixi
    working_dir: /workspace

  # Production environment
  projectodyssey-prod:
    user: "${USER_ID}:${GROUP_ID}"
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        USER_ID: ${USER_ID}
        GROUP_ID: ${GROUP_ID}
        USER_NAME: ${USER_NAME:-dev}
    image: projectodyssey:prod
    volumes:
      - .:/workspace:ro
    environment:
      - HOME=/home/${USER_NAME:-dev}
      - USER_ID=${USER_ID}
      - GROUP_ID=${GROUP_ID}
      - ENVIRONMENT=production
      - PIXI_HOME=/home/${USER_NAME:-dev}/.pixi
    working_dir: /workspace

volumes:
  pixi-cache:
    driver: local
  pre-commit-cache:
    driver: local
