services:
  # Main development environment
  projectodyssey-dev:
    user: "${USER_ID}:${GROUP_ID}"
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        USER_ID: ${USER_ID}
        GROUP_ID: ${GROUP_ID}
        USER_NAME: ${USER_NAME:-dev}
    image: projectodyssey:dev
    volumes:
      - .:/workspace:Z
      - pixi-cache:/home/${USER_NAME:-dev}/.cache/pixi
      - pre-commit-cache:/home/${USER_NAME:-dev}/.cache/pre-commit
      - ${HOME}/.gitconfig:/home/${USER_NAME:-dev}/.gitconfig:ro
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    environment:
      - HOME=/home/${USER_NAME:-dev}
      - USER_ID=${USER_ID}
      - GROUP_ID=${GROUP_ID}
      - ENVIRONMENT=development
      - TERM=xterm-256color
      - PIXI_HOME=/home/${USER_NAME:-dev}/.pixi
      - PIXI_CACHE_DIR=/home/${USER_NAME:-dev}/.cache/pixi
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: /bin/bash
    # Resource limits guard the host from runaway training jobs OOMing the box
    # (#5313/#5317). Tunable via env vars; defaults sized for a 16-GB / 8-core
    # developer workstation. Override per-host with:
    #   ODYSSEY_MEM_LIMIT=8g ODYSSEY_CPU_LIMIT=4 just podman-up
    # cgroups v1 hosts will silently ignore these — that's fine; on cgroups v2
    # they enforce.
    mem_limit: ${ODYSSEY_MEM_LIMIT:-12g}
    cpus: ${ODYSSEY_CPU_LIMIT:-6.0}
    # Allow unlimited core dumps so the libKGEN JIT crash
    # (modular/modular#6413) actually writes a core file. Per-exec `ulimit -c
    # unlimited` does NOT propagate across `podman compose exec` invocations,
    # so we must set the limit on the service itself. Pairs with the host-side
    # core_pattern wiring in .github/actions/coredump-capture/action.yml.
    ulimits:
      core: -1

  # CI/Testing environment
  projectodyssey-ci:
    user: "${USER_ID}:${GROUP_ID}"
    build:
      context: .
      dockerfile: Dockerfile
      target: ci
      args:
        USER_ID: ${USER_ID}
        GROUP_ID: ${GROUP_ID}
        USER_NAME: ${USER_NAME:-dev}
    image: projectodyssey:ci
    volumes:
      - .:/workspace
      - pixi-cache:/home/${USER_NAME:-dev}/.cache/pixi
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    environment:
      - HOME=/home/${USER_NAME:-dev}
      - USER_ID=${USER_ID}
      - GROUP_ID=${GROUP_ID}
      - ENVIRONMENT=ci
      - CI=true
      - PIXI_HOME=/home/${USER_NAME:-dev}/.pixi
      - PIXI_CACHE_DIR=/home/${USER_NAME:-dev}/.cache/pixi
    working_dir: /workspace
    # Resource limits guard the host from runaway CI jobs OOMing the box
    # (#5313/#5317). Tunable via env vars; same defaults as the dev service.
    # Override per-host with:
    #   ODYSSEY_MEM_LIMIT=8g ODYSSEY_CPU_LIMIT=4 just podman-up
    # cgroups v1 hosts will silently ignore these — that's fine; on cgroups v2
    # they enforce.
    mem_limit: ${ODYSSEY_MEM_LIMIT:-12g}
    cpus: ${ODYSSEY_CPU_LIMIT:-6.0}
    # See projectodyssey-dev for rationale: ulimit -c must be set on the
    # service so cores survive across `podman compose exec` invocations.
    ulimits:
      core: -1

  # Production environment
  projectodyssey-prod:
    user: "${USER_ID}:${GROUP_ID}"
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        USER_ID: ${USER_ID}
        GROUP_ID: ${GROUP_ID}
        USER_NAME: ${USER_NAME:-dev}
    image: projectodyssey:prod
    volumes:
      - .:/workspace:ro
    environment:
      - HOME=/home/${USER_NAME:-dev}
      - USER_ID=${USER_ID}
      - GROUP_ID=${GROUP_ID}
      - ENVIRONMENT=production
      - PIXI_HOME=/home/${USER_NAME:-dev}/.pixi
    working_dir: /workspace
    # Resource limits guard the host from runaway training jobs OOMing the box
    # (#5313/#5317). Tunable via env vars; same defaults as the dev service.
    # Override per-host with:
    #   ODYSSEY_MEM_LIMIT=8g ODYSSEY_CPU_LIMIT=4 just podman-up
    # cgroups v1 hosts will silently ignore these — that's fine; on cgroups v2
    # they enforce.
    mem_limit: ${ODYSSEY_MEM_LIMIT:-12g}
    cpus: ${ODYSSEY_CPU_LIMIT:-6.0}

volumes:
  pixi-cache:
    driver: local
  pre-commit-cache:
    driver: local
