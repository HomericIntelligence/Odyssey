# coverage.toml - Coverage configuration for ML Odyssey
# STATUS: ASPIRATIONAL — targets cannot be enforced until Mojo provides coverage tooling (ADR-008)
# These targets define the project's coverage goals and are used by map_test_to_source.py
# to prioritize which source modules most urgently need test files.
# Next review: 2026-06-25

[coverage]
# Overall project target (when available)
target = 90.0
minimum = 80.0

[coverage.modules]
# Per-module targets based on criticality

[coverage.modules."src/projectodyssey/core"]
# Critical path - tensor operations, layers, losses
target = 95
minimum = 90
priority = "critical"

[coverage.modules."src/projectodyssey/autograd"]
# Gradient computation - must be correct
target = 95
minimum = 90
priority = "critical"

[coverage.modules."src/projectodyssey/nn"]
# Neural network layers
target = 90
minimum = 85
priority = "high"

[coverage.modules."src/projectodyssey/data"]
# Data loading and transforms
target = 85
minimum = 80
priority = "high"

[coverage.modules."src/projectodyssey/training"]
# Training loops and optimizers
target = 90
minimum = 85
priority = "high"

[coverage.modules."src/projectodyssey/ops"]
# Mathematical operations
target = 90
minimum = 85
priority = "high"

[coverage.modules."examples"]
# Demonstration code
target = 70
minimum = 60
priority = "low"

[coverage.modules."scripts"]
# Python automation scripts (coverage available now)
target = 80
minimum = 70
priority = "medium"

[coverage.exclude]
# Files excluded from coverage
patterns = [
    "*/__init__.mojo",
    "*/test_*.mojo",
    "examples/*/run_*.mojo",
]

[mapping]
# Configuration for test-to-source file mapping (scripts/map_test_to_source.py)
# Until Mojo coverage tooling is available, this script identifies source modules
# that lack test files as a structural coverage proxy
tolerance = 0.10  # Flag when >10% of source modules lack test files
