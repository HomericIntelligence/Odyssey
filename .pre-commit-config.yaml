# Pre-commit hooks for ML Odyssey
# See https://pre-commit.com for more information

repos:
  # Silent-failure guard (ports HomericIntelligence/Odysseus#280):
  # rejects `|| true` in shell/YAML/Dockerfile/justfile/HCL and
  # `continue-on-error: true` in GitHub workflow YAML.
  - repo: local
    hooks:
      - id: forbid-or-true
        name: "forbid silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        description: >
          Rejects the `or-true` idiom (and its whitespace variants) in shell,
          YAML, Dockerfile, justfile, and HCL sources. Refactor to an explicit
          `if`-guard, a real conditional, or a documented `set +e`/`set -e`
          bracket. See HomericIntelligence/Odysseus#280.
        language: pygrep
        entry: '\|\|\s*true(\s*$|\s+#)'
        files: \.(sh|bash|yml|yaml|hcl)$|(^|/)Dockerfile[^/]*$|(^|/)[Jj]ustfile$
        types: [text]
        pass_filenames: true

      - id: forbid-continue-on-error
        name: "forbid continue-on-error workflow opt-out"
        description: >
          GitHub Actions `continue-on-error: true` (truthy form) hides real CI
          failures. Fix the underlying job/step instead.
        language: pygrep
        entry: '^\s*continue-on-error:\s*true\s*$'
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: true

      - id: forbid-advisory-warnings
        name: "forbid advisory ::warning:: pattern in workflow run blocks"
        description: >
          The advisory-warning workflow annotation is morally equivalent to
          `continue-on-error: true` when it replaces a tool's failure exit
          with a benign-looking warning. The CI step still passes, the
          underlying problem still goes unfixed. Make the step fail-fast
          instead. The only legitimate use is annotating a step that runs
          BEFORE the failing tool (e.g., advising on a deprecated config),
          not wrapping the tool's own exit. See HomericIntelligence/Odysseus#282.
        language: pygrep
        # Match the GitHub Actions advisory-annotation prefix. We exempt
        # this workflow file (the lint rule itself contains the literal
        # for self-documentation) via the `exclude` regex below.
        entry: '::warning::'
        files: ^\.github/workflows/.*\.ya?ml$
        exclude: ^\.github/workflows/_required\.yml$
        pass_filenames: true

  # Version sync check — ensures pyproject.toml, mojo.toml, and VERSION
  # all carry the same version string. Fails if any file drifts. Use `just bump-version`
  # to update all files atomically. Resolves #5327 and #5190. (pixi.toml removed — ADR-018.)
  - repo: local
    hooks:
      - id: check-version-sync
        name: Check Version Sync
        description: >-
          Ensure version in pyproject.toml, mojo.toml, and VERSION are all in sync.
          Use `just bump-version <new_version>` to bump atomically.
        entry: python3 scripts/check_version_sync.py
        language: system
        files: ^(pyproject\.toml|mojo\.toml|VERSION)$
        pass_filenames: false

  # mojo-format: Requires Mojo binary (glibc >= 2.32, i.e., Ubuntu 22.04+, Debian 12+).
  # On older hosts (Debian 10-11, glibc < 2.32) the wrapper script detects the
  # incompatibility and exits 0 with a warning instead of failing the commit.
  # CI runs on Ubuntu 24.04 (glibc 2.39) and always formats.
  # See docs/dev/mojo-glibc-compatibility.md for details. Tracked: #3170 (closed), #3253, #3365
  - repo: local
    hooks:
      - id: mojo-format
        name: Mojo Format
        description: Format Mojo source files using mojo format (GLIBC-compatible wrapper)
        entry: scripts/mojo-format-compat.sh
        language: script
        files: ^(benchmarks|examples|papers|scripts|src/odyssey|tests)/.*\.(mojo|🔥)$
        pass_filenames: true
      - id: check-print-debug-artifacts
        name: Check for NOTE/TODO/FIXME in print statements
        description: >-
          Fail if examples/ contains print() calls with NOTE, TODO, or FIXME
          left over from development/debugging.
        entry: 'print.*(NOTE|TODO|FIXME)'
        language: pygrep
        files: ^examples/
      - id: check-list-constructor
        name: Check for deprecated List[Type](args) syntax
        description: Prevent use of invalid List variadic constructor (use list literals instead)
        entry: 'List\[.*\]\([0-9]'
        language: pygrep
        files: ^(benchmarks|examples|papers|scripts|src/odyssey|tests)/.*\.(mojo|🔥)$
        types: [text]
      - id: no-matmul-call-sites
        name: Enforce no .__matmul__() call sites
        description: Ban .__matmul__( call sites in Mojo files (use matmul(A, B) instead). Ref #3215
        entry: bash scripts/check-no-matmul-call-sites.sh
        language: system
        pass_filenames: false
        always_run: true

  # Prevent accidentally committing the uv-managed venv (ADR-018 replacement for
  # the former no-pixi-env-in-workspace guard). The venv is developer-local and
  # must never be tracked — CI builds it into the image / via `uv sync`.
  - repo: local
    hooks:
      - id: no-venv-tracked
        name: Forbid tracking the uv .venv/ in the repo
        description: >-
          Ensures the uv-managed virtual environment (.venv/) is never committed.
          It is developer-local; CI materialises it via `uv sync`.
        entry: >-
          bash -c
          'if [ "${CI:-false}" = "true" ]; then exit 0; fi;
          if git ls-files --error-unmatch .venv >/dev/null 2>&1; then
          echo "ERROR .venv/ is tracked by git. Remove it: git rm -r --cached .venv";
          exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

  # Dockerfile and Docker Compose verification
  - repo: local
    hooks:
      - id: no-cargo-in-docker
        name: Enforce cargo-free Docker builds
        description: Prevent cargo/cargo install in Docker files for reproducible builds (Issue #3993)
        entry: bash -c 'violations=$(grep -rn "cargo" "$@" | grep -v "^[^:]*:[^:]*:#"); if [ -n "$violations" ]; then echo "Found cargo references in Docker files (must use pre-built binaries):"; echo "$violations"; exit 1; fi' --
        language: system
        files: ^(Dockerfile|Dockerfile\..*|docker-compose.*\.ya?ml)$
  # Security workflow property checks - prevents regression of gaps fixed in #3143
  # Runs only when security workflow files are staged
  - repo: local
    hooks:
      - id: check-security-workflow-no-git
        name: Check Gitleaks has no --no-git flag
        description: Prevent regression of #3143 - Gitleaks must not use --no-git
        entry: 'gitleaks detect.*\-\-no\-git'
        language: pygrep
        files: ^\.github/workflows/security\.yml$

  # Guard: refuse commits that add .env files (secrets must never be committed)
  # Refs: #5188
  - repo: local
    hooks:
      - id: no-dotenv-commit
        name: Forbid committing .env files
        description: >-
          Prevent .env files from being committed. Use .env.example for
          safe defaults and cp .env.example .env for local setup.
        entry: >-
          bash -c
          'echo "ERROR: .env files must not be committed (use .env.example for safe defaults)"; exit 1'
        language: system
        files: ^\.env(\..+)?$
        exclude: ^\.env\.example$

  # Dockerfile validation - guards against accidental regression
  # Prevents re-introduction of cargo apt dependency or cargo install commands
  - repo: local
    hooks:
      - id: no-cargo-in-dockerfile
        name: No cargo in Dockerfile
        description: Prevent re-introduction of cargo apt dependency or cargo install
        entry: bash -c 'grep -E "(cargo\s+install|apt-get install.*\bcargo\b)" "$@" && exit 1 || exit 0' --
        language: system
        files: ^Dockerfile(\.ci)?$
        pass_filenames: true

  # Runtime debugging output checks
  - repo: local
    hooks:
      - id: check-runtime-notes
        name: Check for runtime NOTE/TODO/FIXME prints
        description: Flag print() statements containing NOTE, TODO, or FIXME in examples/
        entry: bash -c 'violations=$(grep -rn "print.*\(NOTE\|TODO\|FIXME\)" examples/ --include="*.mojo" --include="*.🔥" 2>/dev/null); if [ -n "$violations" ]; then echo "Found runtime NOTE/TODO/FIXME prints (should be removed before commit):"; echo "$violations"; exit 1; fi'
        language: system
        files: ^examples/.*\.(mojo|🔥)$
        pass_filenames: false

  # Security checks - bandit for accurate Python security scanning
  # Replaces naive pygrep shell=True check with AST-based analysis
  # Skips: B310 (urlopen with controlled URLs), B202 (tarfile in download scripts), B301 (pickle in trusted dataset loaders)
  - repo: local
    hooks:
      - id: bandit
        name: Bandit Security Scan
        description: Scan Python files for security vulnerabilities using bandit
        entry: uv run bandit --ini .bandit -ll
        language: system
        files: ^(scripts|tests|tools|examples)/.*\.py$
        types: [python]
        pass_filenames: true

  # Dependency lock freshness — ensures uv.lock is consistent with pyproject.toml
  # (ADR-018 replacement for the former pixi.toml↔requirements*.txt sync check,
  # Issue #5137). `uv lock --check` fails if the lockfile is stale.
  - repo: local
    hooks:
      - id: check-uv-lock
        name: Check uv.lock Freshness
        description: Validate that uv.lock is up-to-date with pyproject.toml (ADR-018)
        entry: uv lock --check
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false

  # Version consistency check — ensures .pre-commit-config.yaml revs match the
  # pins in pyproject.toml (Issue #4030).
  - repo: local
    hooks:
      - id: check-precommit-versions
        name: Check Pre-commit Version Consistency
        description: Ensure .pre-commit-config.yaml revs match pyproject.toml versions (Issue #4030)
        entry: python scripts/check_precommit_versions.py
        language: system
        files: ^(\.pre-commit-config\.yaml|pyproject\.toml)$
        pass_filenames: false

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        files: ^(scripts|tests|tools)/.*\.py$
        args: [--ignore-missing-imports, --no-strict-optional, --explicit-package-bases, --check-untyped-defs, --python-version, "3.10", --exclude, generators/]
        additional_dependencies: [types-PyYAML]

  # Type checking for examples/ — uses a per-file wrapper because examples/
  # subdirectories (e.g. alexnet_cifar10) cause "Duplicate module" errors
  # when mypy receives multiple files with the same basename in one invocation.
  - repo: local
    hooks:
      - id: mypy-examples
        name: mypy (examples)
        description: Type-check Python files in examples/ one file at a time
        entry: uv run python scripts/mypy-each-file.py --ignore-missing-imports --no-strict-optional --explicit-package-bases --check-untyped-defs --python-version 3.10
        language: system
        files: ^examples/.*\.py$
        types: [python]
        pass_filenames: true

  # Python formatting and linting
  - repo: local
    hooks:
      - id: ruff-format-python
        name: Ruff Format Python
        description: Format Python files in scripts/, examples/, tests/, tools/ and all subdirectories using uv run ruff format
        entry: uv run ruff format
        language: system
        files: ^(scripts|examples|tests|tools)/.*\.py$
        types: [python]
        pass_filenames: true
      - id: ruff-check-python
        name: Ruff Check Python
        description: Lint Python files in scripts/, examples/, tests/, tools/ and all subdirectories using uv run ruff check
        entry: uv run ruff check --fix
        language: system
        files: ^(scripts|examples|tests|tools)/.*\.py$
        types: [python]
        pass_filenames: true

  # Audit .claude/shared/ link-backs in AGENTS.md
  - repo: local
    hooks:
      - id: audit-shared-links
        name: Audit .claude/shared/ links in AGENTS.md
        description: Ensure every .claude/shared/*.md file is listed in AGENTS.md Quick Links
        entry: python scripts/audit_shared_links.py
        language: system
        files: ^(AGENTS\.md|\.claude/shared/.*)$
        pass_filenames: false

  # Test coverage validation
  - repo: local
    hooks:
      - id: validate-test-coverage
        name: Validate Test Coverage
        description: Ensure all test_*.mojo files are covered by CI matrix
        entry: python3 scripts/validate_test_coverage.py
        language: system
        files: (test_.*\.mojo|comprehensive-tests\.yml)$
        # pass_filenames: false is intentional — this script performs a whole-repo
        # coverage scan against the CI workflow YAML, not per-file validation.
        # The files: pattern handles efficient triggering; the script ignores file args.
        pass_filenames: false
      - id: check-test-count-badge
        name: Check Test Count Badge
        description: Validate README.md test count badge matches actual test_*.mojo count
        entry: python3 scripts/check_test_count_badge.py
        language: system
        files: ^README\.md$
        pass_filenames: false
      - id: check-precommit-versions
        name: Check pre-commit vs uv version drift
        description: Fail if rev tags in .pre-commit-config.yaml drift from pyproject.toml versions
        entry: python scripts/check_precommit_versions.py
        language: system
        pass_filenames: false
        files: ^(\.pre-commit-config\.yaml|pyproject\.toml|uv\.lock)$

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.12.1
    hooks:
      - id: markdownlint-cli2
        name: Markdown Lint
        description: Lint markdown files for consistency
        exclude: ^(notes/(plan|issues|review|blog)|\.claude/plugins)/
        args: ['--config', '.markdownlint.json']

  # Jupyter notebook output stripping
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        name: Strip Notebook Outputs
        description: Remove outputs from Jupyter notebooks before commit
        files: \.ipynb$
        args: ['--extra-keys', 'metadata.kernelspec']

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        exclude: ^notes/(plan|review|issues)/
      - id: end-of-file-fixer
        name: Fix End of Files
        exclude: ^notes/(plan|review|issues)/
      - id: check-yaml
        name: Check YAML
      - id: check-added-large-files
        name: Check for Large Files
        args: ['--maxkb=1000']
      - id: mixed-line-ending
        name: Fix Mixed Line Endings
        exclude: ^notes/(plan|review|issues)/
