# Pre-commit hooks for ML Odyssey
# See https://pre-commit.com for more information

repos:
  # mojo-format: Requires Mojo binary (glibc >= 2.32, i.e., Ubuntu 22.04+, Debian 11+).
  # On older hosts (Debian 10/Buster, glibc 2.28) the wrapper script detects the
  # incompatibility and exits 0 with a warning instead of failing the commit.
  # CI runs on Ubuntu 24.04 (glibc 2.39) and always formats.
  # See docs/dev/mojo-glibc-compatibility.md for details. Tracked: #3170 (closed), #3253, #3365
  - repo: local
    hooks:
      - id: mojo-format
        name: Mojo Format
        description: Format Mojo source files using mojo format (GLIBC-compatible wrapper)
        entry: scripts/mojo-format-compat.sh
        language: script
        files: ^(benchmarks|examples|papers|scripts|shared|tests)/.*\.(mojo|🔥)$
        pass_filenames: true
      - id: check-list-constructor
        name: Check for deprecated List[Type](args) syntax
        description: Prevent use of invalid List variadic constructor (use list literals instead)
        entry: 'List\[.*\]\([0-9]'
        language: pygrep
        files: ^(benchmarks|examples|papers|scripts|shared|tests)/.*\.(mojo|🔥)$
        types: [text]

  # Security checks - bandit for accurate Python security scanning
  # Replaces naive pygrep shell=True check with AST-based analysis
  # Suppressions (B310, B202) are documented in .bandit [bandit] section
  - repo: local
    hooks:
      - id: bandit
        name: Bandit Security Scan
        description: Scan Python files for security vulnerabilities using bandit (suppressions in .bandit)
        entry: pixi run bandit -ll --ini .bandit
        language: system
        files: ^(scripts|tests)/.*\.py$
        types: [python]
        pass_filenames: true

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        files: ^scripts/.*\.py$
        args: [--ignore-missing-imports, --no-strict-optional, --explicit-package-bases, --check-untyped-defs, --python-version, "3.10"]
        additional_dependencies: [types-PyYAML]

  # Python formatting and linting
  - repo: local
    hooks:
      - id: ruff-format-python
        name: Ruff Format Python
        description: Format Python files in scripts/, examples/, tests/, tools/ and all subdirectories using pixi run ruff format
        entry: pixi run ruff format
        language: system
        files: ^(scripts|examples|tests|tools)/.*\.py$
        types: [python]
        pass_filenames: true
      - id: ruff-check-python
        name: Ruff Check Python
        description: Lint Python files in scripts/, examples/, tests/, tools/ and all subdirectories using pixi run ruff check
        entry: pixi run ruff check --fix
        language: system
        files: ^(scripts|examples|tests|tools)/.*\.py$
        types: [python]
        pass_filenames: true

  # Test coverage validation
  - repo: local
    hooks:
      - id: validate-test-coverage
        name: Validate Test Coverage
        description: Ensure all test_*.mojo files are covered by CI matrix
        entry: python3 scripts/validate_test_coverage.py
        language: system
        files: (test_.*\.mojo|comprehensive-tests\.yml)$
        pass_filenames: false
      - id: check-test-count-badge
        name: Check Test Count Badge
        description: Validate README.md test count badge matches actual test_*.mojo count
        entry: python3 scripts/check_test_count_badge.py
        language: system
        files: ^README\.md$
        pass_filenames: false

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.12.1
    hooks:
      - id: markdownlint-cli2
        name: Markdown Lint
        description: Lint markdown files for consistency
        exclude: ^notes/(plan|issues|review|blog)/
        args: ['--config', '.markdownlint.json']

  # Jupyter notebook output stripping
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        name: Strip Notebook Outputs
        description: Remove outputs from Jupyter notebooks before commit
        files: \.ipynb$
        args: ['--extra-keys', 'metadata.kernelspec']

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        exclude: ^notes/(plan|review|issues)/
      - id: end-of-file-fixer
        name: Fix End of Files
        exclude: ^notes/(plan|review|issues)/
      - id: check-yaml
        name: Check YAML
      - id: check-added-large-files
        name: Check for Large Files
        args: ['--maxkb=1000']
      - id: mixed-line-ending
        name: Fix Mixed Line Endings
        exclude: ^notes/(plan|review|issues)/
