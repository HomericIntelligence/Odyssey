# Pre-commit hooks for ML Odyssey
# See https://pre-commit.com for more information

repos:
  # mojo-format: Requires Mojo binary (glibc >= 2.32, i.e., Ubuntu 22.04+, Debian 12+).
  # On older hosts (Debian 10-11, glibc < 2.32) the wrapper script detects the
  # incompatibility and exits 0 with a warning instead of failing the commit.
  # CI runs on Ubuntu 24.04 (glibc 2.39) and always formats.
  # See docs/dev/mojo-glibc-compatibility.md for details. Tracked: #3170 (closed), #3253, #3365
  - repo: local
    hooks:
      - id: mojo-format
        name: Mojo Format
        description: Format Mojo source files using mojo format (GLIBC-compatible wrapper)
        entry: scripts/mojo-format-compat.sh
        language: script
        files: ^(benchmarks|examples|papers|scripts|shared|tests)/.*\.(mojo|🔥)$
        pass_filenames: true
      - id: check-list-constructor
        name: Check for deprecated List[Type](args) syntax
        description: Prevent use of invalid List variadic constructor (use list literals instead)
        entry: 'List\[.*\]\([0-9]'
        language: pygrep
        files: ^(benchmarks|examples|papers|scripts|shared|tests)/.*\.(mojo|🔥)$
        types: [text]
      - id: no-matmul-call-sites
        name: Enforce no .__matmul__() call sites
        description: Ban .__matmul__( call sites in Mojo files (use matmul(A, B) instead). Ref #3215
        entry: bash -c 'violations=$(grep -rn "\.__matmul__(" . --include="*.mojo" --include="*.🔥" --exclude-dir=".pixi" --exclude-dir=".git" | grep -v "fn __matmul__(" | grep -v "# __matmul__" | grep -v "__matmul__.*deprecated"); if [ -n "$violations" ]; then echo "Found .__matmul__() call sites (use matmul(A, B) instead):"; echo "$violations"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

  # Dockerfile and Docker Compose verification
  - repo: local
    hooks:
      - id: no-cargo-in-docker
        name: Enforce cargo-free Docker builds
        description: Prevent cargo/cargo install in Docker files for reproducible builds (Issue #3993)
        entry: bash -c 'violations=$(grep -rn "cargo" "$@" | grep -v "^[^:]*:[^:]*:#"); if [ -n "$violations" ]; then echo "Found cargo references in Docker files (must use pre-built binaries):"; echo "$violations"; exit 1; fi'
        language: system
        files: ^(Dockerfile|Dockerfile\..*|docker-compose.*\.ya?ml)$
        pass_filenames: true

  # Security workflow property checks - prevents regression of gaps fixed in #3143
  # Runs only when security workflow files are staged
  - repo: local
    hooks:
      - id: check-security-workflow-no-git
        name: Check Gitleaks has no --no-git flag
        description: Prevent regression of #3143 - Gitleaks must not use --no-git
        entry: 'gitleaks detect.*\-\-no\-git'
        language: pygrep
        files: ^\.github/workflows/security\.yml$

  # Dockerfile validation - guards against accidental regression
  # Prevents re-introduction of cargo apt dependency or cargo install commands
  - repo: local
    hooks:
      - id: no-cargo-in-dockerfile
        name: No cargo in Dockerfile
        description: Prevent re-introduction of cargo apt dependency or cargo install
        entry: bash -c 'grep -E "(cargo\s+install|apt-get install.*\bcargo\b)" "$@" && exit 1 || exit 0' --
        language: system
        files: ^Dockerfile(\.ci)?$
        pass_filenames: true

  # Security checks - bandit for accurate Python security scanning
  # Replaces naive pygrep shell=True check with AST-based analysis
  # Skips: B310 (urlopen with controlled URLs), B202 (tarfile in download scripts), B301 (pickle in trusted dataset loaders)
  - repo: local
    hooks:
      - id: bandit
        name: Bandit Security Scan
        description: Scan Python files for security vulnerabilities using bandit
        entry: pixi run bandit -ll --skip B310,B202,B301
        language: system
        files: ^(scripts|tests|tools|examples)/.*\.py$
        types: [python]
        pass_filenames: true

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        files: ^(scripts|tests|tools)/.*\.py$
        args: [--ignore-missing-imports, --no-strict-optional, --explicit-package-bases, --check-untyped-defs, --python-version, "3.10", --exclude, generators/]
        additional_dependencies: [types-PyYAML]

  # Type checking for examples/ — uses a per-file wrapper because examples/
  # subdirectories have hyphenated names (e.g. alexnet-cifar10) that are not
  # valid Python package names, causing "Duplicate module" errors when mypy
  # receives multiple files with the same basename in one invocation.
  - repo: local
    hooks:
      - id: mypy-examples
        name: mypy (examples)
        description: Type-check Python files in examples/ one file at a time
        entry: pixi run python scripts/mypy-each-file.py --ignore-missing-imports --no-strict-optional --explicit-package-bases --check-untyped-defs --python-version 3.10
        language: system
        files: ^examples/.*\.py$
        types: [python]
        pass_filenames: true

  # Python formatting and linting
  - repo: local
    hooks:
      - id: ruff-format-python
        name: Ruff Format Python
        description: Format Python files in scripts/, examples/, tests/, tools/ and all subdirectories using pixi run ruff format
        entry: pixi run ruff format
        language: system
        files: ^(scripts|examples|tests|tools)/.*\.py$
        types: [python]
        pass_filenames: true
      - id: ruff-check-python
        name: Ruff Check Python
        description: Lint Python files in scripts/, examples/, tests/, tools/ and all subdirectories using pixi run ruff check
        entry: pixi run ruff check --fix
        language: system
        files: ^(scripts|examples|tests|tools)/.*\.py$
        types: [python]
        pass_filenames: true

  # Audit .claude/shared/ link-backs in CLAUDE.md
  - repo: local
    hooks:
      - id: audit-shared-links
        name: Audit shared/ links in CLAUDE.md
        description: Ensure every .claude/shared/*.md file is listed in CLAUDE.md Quick Links
        entry: python scripts/audit_shared_links.py
        language: system
        files: ^(CLAUDE\.md|\.claude/shared/.*)$
        pass_filenames: false

  # Check for bare pixi run mojo calls in CI workflows
  - repo: local
    hooks:
      - id: check-bare-pixi-mojo
        name: Check for bare pixi run mojo calls
        description: Prevent bare pixi run mojo calls without retry loop or just test-group routing (Issue #3956)
        entry: python scripts/check_bare_pixi_mojo.py
        language: system
        files: ^\.github/workflows/.*\.yml$
        pass_filenames: false

  # Test coverage validation
  - repo: local
    hooks:
      - id: validate-test-coverage
        name: Validate Test Coverage
        description: Ensure all test_*.mojo files are covered by CI matrix
        entry: python3 scripts/validate_test_coverage.py
        language: system
        files: (test_.*\.mojo|comprehensive-tests\.yml)$
        # pass_filenames: false is intentional — this script performs a whole-repo
        # coverage scan against the CI workflow YAML, not per-file validation.
        # The files: pattern handles efficient triggering; the script ignores file args.
        pass_filenames: false
      - id: check-test-count-badge
        name: Check Test Count Badge
        description: Validate README.md test count badge matches actual test_*.mojo count
        entry: python3 scripts/check_test_count_badge.py
        language: system
        files: ^README\.md$
        pass_filenames: false
      - id: check-test-count-badge
        name: Check Test Count Badge
        description: Validate README.md test count badge matches actual test_*.mojo count
        entry: python3 scripts/check_test_count_badge.py
        language: system
        files: ^README\.md$
        pass_filenames: false
      - id: validate-adr009-headers
        name: Validate ADR-009 Headers
        description: Ensure all test_*_part*.mojo files have ADR-009 split docstring (Issue #2942)
        entry: python3 scripts/validate_adr009_headers.py
        language: system
        files: test_.*_part\d+\.mojo$
        pass_filenames: false
      - id: check-precommit-versions
        name: Check pre-commit vs pixi version drift
        description: Fail if rev tags in .pre-commit-config.yaml drift from pixi.lock versions
        entry: python scripts/check_precommit_versions.py
        language: system
        pass_filenames: false
        files: ^(\.pre-commit-config\.yaml|pixi\.toml|pixi\.lock)$

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.12.1
    hooks:
      - id: markdownlint-cli2
        name: Markdown Lint
        description: Lint markdown files for consistency
        exclude: ^(notes/(plan|issues|review|blog)|\.claude/plugins)/
        args: ['--config', '.markdownlint.json']

  # Jupyter notebook output stripping
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        name: Strip Notebook Outputs
        description: Remove outputs from Jupyter notebooks before commit
        files: \.ipynb$
        args: ['--extra-keys', 'metadata.kernelspec']

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        exclude: ^notes/(plan|review|issues)/
      - id: end-of-file-fixer
        name: Fix End of Files
        exclude: ^notes/(plan|review|issues)/
      - id: check-yaml
        name: Check YAML
      - id: check-added-large-files
        name: Check for Large Files
        args: ['--maxkb=1000']
      - id: mixed-line-ending
        name: Fix Mixed Line Endings
        exclude: ^notes/(plan|review|issues)/
