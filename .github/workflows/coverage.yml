name: Code Coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================================
  # Test Metrics (Proxy for Coverage Until Mojo Provides Tooling)
  # ============================================================================
  test-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: "Test Metrics"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Generate test metrics (JSON)
        run: |
          python scripts/generate_test_metrics.py --output metrics.json --format json

      - name: Generate test metrics (Markdown)
        run: |
          python scripts/generate_test_metrics.py --output metrics.md --format markdown

      - name: Display metrics
        run: cat metrics.md

      - name: Upload metrics artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: test-metrics
          path: |
            metrics.json
            metrics.md
          retention-days: 90

      - name: Build PR comment report
        if: github.event_name == 'pull_request'
        run: python scripts/build_pr_comment.py --metrics-file metrics.md --output-file metrics-pr-comment.md

      - name: Comment on PR with metrics
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/pr-comment
        with:
          report-file: metrics-pr-comment.md
          comment-marker: "Test Metrics Report"
