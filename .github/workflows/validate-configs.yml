name: Validate Configurations

# Also covers: test-agents, script-validation, paper-validation, validate-workflows

on:
  push:
    branches: [main]
    paths:
      - 'configs/**/*.yaml'
      - 'configs/**/*.yml'
      - 'shared/utils/config*.mojo'
      - '.claude/agents/**'
      - 'tests/agents/**'
      - 'agents/**'
      - 'scripts/**/*.py'
      - 'papers/**'
      - '.github/**'
      - 'scripts/validate_workflow_checkout_order.py'
      - '.github/workflows/validate-configs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'configs/**/*.yaml'
      - 'configs/**/*.yml'
      - 'shared/utils/config*.mojo'
      - '.claude/agents/**'
      - 'tests/agents/**'
      - 'agents/**'
      - 'scripts/**/*.py'
      - 'papers/**'
      - '.github/**'
      - 'scripts/validate_workflow_checkout_order.py'
      - '.github/workflows/validate-configs.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate-yaml:
    name: Validate YAML Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.10'

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate YAML files
        run: |
          echo "Validating YAML syntax in configs/"
          find configs/ -type f \( -name "*.yaml" -o -name "*.yml" \) | while read file; do
            echo "Validating: $file"
            yamllint -d "{extends: default, rules: {line-length: {max: 120}}}" "$file"
          done

      - name: Check for required default configs
        run: |
          echo "Checking for required default configurations..."
          required_defaults=(
            "configs/defaults/training.yaml"
            "configs/defaults/model.yaml"
            "configs/defaults/data.yaml"
          )

          for config in "${required_defaults[@]}"; do
            if [ ! -f "$config" ]; then
              echo "ERROR: Required default config missing: $config"
              exit 1
            fi
            echo "✓ Found: $config"
          done

  validate-schemas:
    name: Validate Configuration Schemas
    runs-on: ubuntu-latest
    needs: validate-yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.10'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate config structure
        run: |
          echo "Validating configuration structure..."
          python3 << 'PYTHON_SCRIPT'
          import yaml
          import sys
          from pathlib import Path

          def validate_training_config(config_path):
              """Validate training configuration has required fields."""
              with open(config_path) as f:
                  config = yaml.safe_load(f)

              # Check for optimizer section
              if 'optimizer' not in config:
                  print(f"WARNING: {config_path} missing 'optimizer' section")
                  return False

              # Check for training section
              if 'training' not in config:
                  print(f"WARNING: {config_path} missing 'training' section")
                  return False

              print(f"✓ {config_path} has valid structure")
              return True

          # Validate default training config
          default_training = Path("configs/defaults/training.yaml")
          if default_training.exists():
              validate_training_config(default_training)

          # Validate paper training configs
          paper_configs = Path("configs/papers").rglob("training.yaml")
          for config in paper_configs:
              validate_training_config(config)

          print("\nConfiguration structure validation complete!")
          PYTHON_SCRIPT

  test-config-loading:
    name: Test Configuration Loading
    runs-on: ubuntu-latest
    needs: validate-yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Test config loading
        run: |
          echo "Running configuration loading tests..."
          just test-group tests/configs "test_loading.mojo"
          echo "Running configuration merging tests..."
          just test-group tests/configs "test_merging.mojo"
          echo "Running configuration validation tests..."
          just test-group tests/configs "test_validation.mojo"
          echo "Running environment variable substitution tests..."
          just test-group tests/configs "test_env_vars.mojo"
          echo "Running configuration integration tests..."
          just test-group tests/configs "test_integration.mojo"
          echo "All configuration loading tests passed!"

  validate-agents:
    name: Validate Agent Configurations
    runs-on: ubuntu-latest
    needs: validate-yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Validate agent frontmatter (check_frontmatter)
        run: |
          echo "Validating agent configurations..."
          found_agents=0
          if [ -d ".claude/agents" ]; then
            for file in .claude/agents/*.md; do
              if [ -f "$file" ]; then
                if grep -q "^---" "$file"; then
                  echo "✓ $(basename "$file"): has frontmatter"
                  found_agents=$((found_agents + 1))
                else
                  echo "ERROR: $(basename "$file"): missing YAML frontmatter"
                  exit 1
                fi
              fi
            done
          fi
          if [ $found_agents -eq 0 ]; then
            echo "No agent files found to validate"
          fi
          echo "Agent frontmatter validation complete!"

  validate-experiments:
    name: Validate Experiment Configs
    runs-on: ubuntu-latest
    needs: validate-yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.10'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate experiment configs reference valid papers
        run: |
          echo "Validating experiment configurations..."
          python3 << 'PYTHON_SCRIPT'
          import yaml
          import sys
          from pathlib import Path

          experiments_dir = Path("configs/experiments")
          if not experiments_dir.exists():
              print("No experiments directory yet - skipping validation")
              sys.exit(0)

          for exp_file in experiments_dir.rglob("*.yaml"):
              with open(exp_file) as f:
                  config = yaml.safe_load(f)

              # Check if experiment references a valid paper
              paper_name = exp_file.parent.name
              paper_dir = Path(f"configs/papers/{paper_name}")

              if not paper_dir.exists():
                  print(f"WARNING: Experiment {exp_file} references non-existent paper: {paper_name}")
              else:
                  print(f"✓ {exp_file.name} references valid paper: {paper_name}")

          print("\nExperiment validation complete!")
          PYTHON_SCRIPT

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-yaml, validate-schemas, validate-agents, validate-experiments]
    if: always()
    steps:
      - name: Check validation results
        run: |
          echo "=" * 60
          echo "Configuration Validation Summary"
          echo "=" * 60
          echo "✓ YAML syntax validation: ${{ needs.validate-yaml.result }}"
          echo "✓ Schema validation: ${{ needs.validate-schemas.result }}"
          echo "✓ Experiment validation: ${{ needs.validate-experiments.result }}"
          echo "=" * 60

          if [ "${{ needs.validate-yaml.result }}" != "success" ] || \
             [ "${{ needs.validate-schemas.result }}" != "success" ] || \
             [ "${{ needs.validate-experiments.result }}" != "success" ]; then
            echo "ERROR: Some validation checks failed!"
            exit 1
          fi

          echo "All validation checks passed!"

  # ============================================================================
  # Agent Configuration Tests (absorbed from test-agents.yml)
  # ============================================================================
  test-agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml "homericintelligence-hephaestus>=0.7.0,<1"

      - name: Install hephaestus
        run: pip install "homericintelligence-hephaestus>=0.7.0,<1"

      - name: Validate agent configurations
        run: python3 tests/agents/validate_configs.py .claude/agents/

      - name: Test agent loading
        run: python3 tests/agents/test_loading.py .claude/agents/

      - name: Test delegation patterns
        run: python3 tests/agents/test_delegation.py .claude/agents/

      - name: Test workflow integration
        run: python3 tests/agents/test_integration.py .claude/agents/

      - name: Test Mojo patterns
        run: python3 tests/agents/test_mojo_patterns.py .claude/agents/

  # ============================================================================
  # Script Validation (absorbed from script-validation.yml)
  # ============================================================================
  validate-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install validation tools
        run: |
          pixi run pip install ruff pyyaml

      - name: Find Python scripts
        id: find-scripts
        run: |
          echo "Discovering Python scripts in scripts/ directory..."
          if [ -d "scripts" ]; then
            find scripts -name "*.py" -type f | tee /tmp/scripts_list.txt
            SCRIPT_COUNT=$(wc -l < /tmp/scripts_list.txt)
          else
            echo "scripts/ directory does not exist"
            SCRIPT_COUNT=0
            > /tmp/scripts_list.txt
          fi
          echo "Found $SCRIPT_COUNT Python scripts"
          echo "script_count=$SCRIPT_COUNT" >> $GITHUB_OUTPUT

      - name: Syntax validation
        run: |
          echo "Validating Python syntax for all scripts..."
          SCRIPT_COUNT=${{ steps.find-scripts.outputs.script_count }}
          if [ "$SCRIPT_COUNT" -eq 0 ]; then
            echo "No scripts to validate"
            exit 0
          fi
          EXIT_CODE=0
          while IFS= read -r script; do
            [ -z "$script" ] && continue
            echo "Checking: $script"
            if ! python3 -m py_compile "$script"; then
              echo "Syntax error in: $script"
              EXIT_CODE=1
            fi
          done < /tmp/scripts_list.txt

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ All scripts have valid Python syntax"
          else
            echo "Syntax validation failed"
          fi
          exit $EXIT_CODE

      - name: Lint with ruff
        run: |
          echo "Running ruff linter on all scripts..."
          SCRIPT_COUNT=${{ steps.find-scripts.outputs.script_count }}
          if [ "$SCRIPT_COUNT" -eq 0 ] || [ ! -d "scripts" ]; then
            echo "No scripts to lint"
            exit 0
          fi
          pixi run ruff check scripts/ --output-format=github || {
            echo "Linting issues found"
            exit 1
          }
          echo "✅ All scripts passed linting"

      - name: Check script formatting
        run: |
          echo "Checking code formatting with ruff..."
          SCRIPT_COUNT=${{ steps.find-scripts.outputs.script_count }}
          if [ "$SCRIPT_COUNT" -eq 0 ] || [ ! -d "scripts" ]; then
            echo "No scripts to check formatting"
            exit 0
          fi
          pixi run ruff format --check scripts/ || {
            echo "Formatting issues found. Run: pixi run ruff format scripts/"
            exit 1
          }
          echo "✅ All scripts are properly formatted"

      - name: Validate script shebangs
        run: |
          echo "Checking shebang lines..."
          SCRIPT_COUNT=${{ steps.find-scripts.outputs.script_count }}
          if [ "$SCRIPT_COUNT" -eq 0 ]; then
            exit 0
          fi
          while IFS= read -r script; do
            [ -z "$script" ] && continue
            if head -n1 "$script" | grep -q "^#!/usr/bin/env python3"; then
              echo "✓ $script has correct shebang"
            elif head -n1 "$script" | grep -q "^#!"; then
              echo "Warning: $script has unexpected shebang: $(head -n1 "$script")"
            else
              echo "Info: $script has no shebang (may be a library module)"
            fi
          done < /tmp/scripts_list.txt
          echo "✅ Shebang validation complete"

  # ============================================================================
  # Paper Validation (absorbed from paper-validation.yml)
  # ============================================================================
  validate-paper-structure:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: "Paper Structure Validation"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate paper directory structure
        run: |
          echo "Validating paper directory structure..."

          if [ ! -d "papers" ]; then
            echo "No papers/ directory found yet — skipping"
            exit 0
          fi

          # find exits 0 even when no results; 2>/dev/null suppresses ENOENT on papers/ subdirs.
          # The papers/ existence check above already handles the missing-dir case.
          PAPER_DIRS=$(find papers -name "metadata.yml" -exec dirname {} \; 2>/dev/null) || PAPER_DIRS=""

          if [ -z "$PAPER_DIRS" ]; then
            echo "No paper implementations found yet"
            exit 0
          fi

          VALIDATION_FAILED=false

          for paper_dir in $PAPER_DIRS; do
            echo "Validating: $paper_dir"

            for file in README.md metadata.yml; do
              if [ -f "$paper_dir/$file" ]; then
                echo "  ✅ $file"
              else
                echo "  Missing: $file"
                VALIDATION_FAILED=true
              fi
            done

            if [ -f "$paper_dir/metadata.yml" ]; then
              for field in title authors year url; do
                if ! grep -q "^$field:" "$paper_dir/metadata.yml"; then
                  echo "  Missing metadata field: $field"
                  VALIDATION_FAILED=true
                fi
              done
              echo "  Metadata fields checked"
            fi
          done

          if [ "$VALIDATION_FAILED" = "true" ]; then
            echo "Paper structure validation failed"
            exit 1
          fi
          echo "✅ All paper structures valid"

  validate-paper-implementation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: "Paper Implementation Validation"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Check implementation completeness
        run: |
          echo "Checking implementation completeness..."

          if [ ! -d "papers" ]; then
            echo "No papers/ directory found yet — skipping"
            exit 0
          fi

          # find exits 0 even when no results; 2>/dev/null suppresses ENOENT on papers/ subdirs.
          # The papers/ existence check above already handles the missing-dir case.
          PAPER_DIRS=$(find papers -name "metadata.yml" -exec dirname {} \; 2>/dev/null) || PAPER_DIRS=""

          if [ -z "$PAPER_DIRS" ]; then
            echo "No paper implementations found yet"
            exit 0
          fi

          for paper_dir in $PAPER_DIRS; do
            echo "Checking: $paper_dir"
            if [ -d "$paper_dir/implementation" ]; then
              MOJO_FILES=$(find "$paper_dir/implementation" -name "*.mojo" | wc -l)
              if [ "$MOJO_FILES" -gt 0 ]; then
                echo "  ✅ $MOJO_FILES Mojo files"
              else
                echo "  No Mojo implementation files found"
              fi
            fi
            if [ -d "$paper_dir/tests" ]; then
              TEST_FILES=$(find "$paper_dir/tests" -name "test_*.py" -o -name "test_*.mojo" | wc -l)
              if [ "$TEST_FILES" -gt 0 ]; then
                echo "  ✅ $TEST_FILES test files"
              else
                echo "  No test files found"
              fi
            fi
          done
          echo "✅ Implementation check complete"

  validate-paper-reproducibility:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Paper Reproducibility (optional)"
    # Only run if specifically requested
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'validate-reproducibility'))

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Run training scripts (quick validation)
        run: |
          echo "Running training scripts for reproducibility validation..."

          if [ ! -d "papers" ]; then
            echo "No papers/ directory found yet"
            exit 0
          fi

          # find exits 0 even when no results; use || PAPER_DIRS="" to handle find errors explicitly.
          PAPER_DIRS=$(find papers -name "train.py" -o -name "train.mojo" -exec dirname {} \; 2>/dev/null) || PAPER_DIRS=""

          if [ -z "$PAPER_DIRS" ]; then
            echo "No training scripts found yet"
            exit 0
          fi

          for paper_dir in $PAPER_DIRS; do
            echo "Running training for: $paper_dir"
            if [ -f "$paper_dir/train.py" ]; then
              if ! podman compose exec -T projectodyssey-dev bash -c "pixi run python $paper_dir/train.py --quick-validation --epochs 1"; then
                echo "::warning::Training script failed for $paper_dir/train.py"
              fi
            elif [ -f "$paper_dir/train.mojo" ]; then
              if ! podman compose exec -T projectodyssey-dev bash -c "pixi run mojo -I . $paper_dir/train.mojo --quick-validation --epochs 1"; then
                echo "::warning::Training script failed for $paper_dir/train.mojo"
              fi
            fi
          done

  paper-report:
    needs: [validate-paper-structure, validate-paper-implementation]
    runs-on: ubuntu-latest
    if: always()
    name: "Paper Validation Report"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Generate validation report
        run: |
          echo "# Paper Validation Results" > paper-report.md
          echo "" >> paper-report.md

          if [ "${{ needs.validate-paper-structure.result }}" = "success" ]; then
            echo "- ✅ Structure Validation: Passed" >> paper-report.md
          else
            echo "- Structure Validation: ${{ needs.validate-paper-structure.result }}" >> paper-report.md
          fi

          if [ "${{ needs.validate-paper-implementation.result }}" = "success" ]; then
            echo "- ✅ Implementation Validation: Passed" >> paper-report.md
          else
            echo "- Implementation Validation: ${{ needs.validate-paper-implementation.result }}" >> paper-report.md
          fi

          cat paper-report.md

      - name: Upload validation report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: paper-validation-report
          path: paper-report.md
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/pr-comment
        with:
          report-file: paper-report.md
          comment-marker: "Paper Validation Results"

  # ============================================================================
  # Test Coverage Validation - Ensure all test_*.mojo files are in CI matrix
  # ============================================================================
  validate-test-coverage:
    name: Validate Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate test coverage
        run: python scripts/validate_test_coverage.py

  # ============================================================================
  # Workflow Checkout Order (absorbed from validate-workflows.yml)
  # ============================================================================
  validate-checkout-order:
    name: Enforce Composite Action Checkout-First Ordering
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate checkout-first ordering for composite actions
        run: |
          echo "Checking that all jobs using ./.github/actions/ have actions/checkout as a preceding step..."
          python3 scripts/validate_workflow_checkout_order.py .github/workflows/
