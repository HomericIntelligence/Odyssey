name: Validate Workflow Checkout Order

on:
  push:
    branches: [main]
    paths:
      - '.github/**'
      - 'scripts/validate_workflow_checkout_order.py'
      - 'scripts/validate_mojo_retry_pattern.py'
      - 'scripts/check_bare_mojo_calls.py'
      - '.github/workflows/validate-workflows.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/**'
      - 'scripts/validate_workflow_checkout_order.py'
      - 'scripts/validate_mojo_retry_pattern.py'
      - 'scripts/check_bare_mojo_calls.py'
      - '.github/workflows/validate-workflows.yml'
  workflow_dispatch:

jobs:
  validate-checkout-order:
    name: Enforce Composite Action Checkout-First Ordering
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5->v6
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate checkout-first ordering for composite actions
        run: |
          echo "Checking that all steps-based jobs using ./.github/actions/ have actions/checkout as a preceding step..."
          echo "(Reusable workflow jobs using ./.github/workflows/ are skipped — they run in their own VM with their own checkout.)"
          python3 scripts/validate_workflow_checkout_order.py .github/workflows/

      - name: Detect bare pixi run mojo calls without retry protection
        run: |
          echo "Checking for bare 'pixi run mojo' calls not protected by a retry loop (issue #3329)..."
          python3 scripts/validate_mojo_retry_pattern.py .github/workflows/
      - name: Check for bare pixi run mojo calls
        run: |
          echo "Checking workflow files for bare pixi run mojo calls without retry (ref #3956)..."
          python3 scripts/check_bare_mojo_calls.py .github/workflows/*.yml
