name: Test Data Utilities

on:
  push:
    branches: [main]
    paths:
      - 'tests/shared/data/**'
      - 'shared/data/**'
      - '.github/workflows/test-data-utilities.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tests/shared/data/**'
      - 'shared/data/**'
      - '.github/workflows/test-data-utilities.yml'

jobs:
  test-data-utilities:
    name: Data Utilities Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install Just
        uses: extractions/setup-just@v3

      - name: Verify Mojo installation
        run: |
          pixi run mojo --version

      - name: Check if test files exist
        id: check-tests
        run: |
          if [ -d "tests/shared/data" ]; then
            echo "tests_exist=true" >> $GITHUB_OUTPUT
          else
            echo "tests_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Dataset Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          just test-group "tests/shared/data/datasets" "test_base_dataset.mojo test_tensor_dataset.mojo"

      - name: Run Loader Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          just test-group "tests/shared/data/loaders" "test_base_loader.mojo"

      - name: Run Transform Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          just test-group "tests/shared/data/transforms" "test_pipeline.mojo"

      - name: Run Sampler Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          just test-group "tests/shared/data/samplers" "test_sequential.mojo"

      - name: Run All Data Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          just test-group "tests/shared/data" "run_all_tests.mojo"

      - name: Report Results
        if: always()
        run: |
          if [ "${{ steps.check-tests.outputs.tests_exist }}" = "true" ]; then
            echo "Data utilities test suite completed"
            echo "Check individual test outputs above for details"
          else
            echo "⚠️  Data utilities tests not yet implemented"
            echo "This workflow will run once tests/shared/data/ tests are created"
          fi
