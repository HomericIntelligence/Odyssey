name: Container Build and Publish

# Build and publish container images to GitHub Container Registry using Podman
# Triggered on pushes to main, version tags, and PRs (build-only)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to registry (even on non-main branches)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  # Container image names must be lowercase - github.repository preserves case
  IMAGE_NAME: homericintelligence/projectodyssey

permissions:
  contents: read
  packages: write
  security-events: write  # For Trivy SARIF uploads

jobs:
  # ============================================================================
  # Build and Push Container Images
  # ============================================================================
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        target: [runtime, ci, production]
        include:
          - target: runtime
            suffix: ''
          - target: ci
            suffix: '-ci'
          - target: production
            suffix: '-prod'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Cache Podman storage
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: ~/.local/share/containers
          key: podman-ci-${{ matrix.target }}-${{ hashFiles('Dockerfile.ci') }}
          restore-keys: |
            podman-ci-${{ matrix.target }}-

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request' || github.event.inputs.push == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "$REGISTRY" --username "${{ github.actor }}" --password-stdin

      - name: Generate tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          SUFFIX: ${{ matrix.suffix }}
          TARGET: ${{ matrix.target }}
          REF: ${{ github.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          TAGS=""
          SHORT_SHA="${SHA:0:7}"

          # Branch tag
          if [[ "$EVENT_NAME" == "push" && "$REF" == refs/heads/* ]]; then
            TAGS="${TAGS}${REGISTRY}/${IMAGE_NAME}:${REF_NAME}${SUFFIX} "
          fi

          # PR tag
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            TAGS="${TAGS}${REGISTRY}/${IMAGE_NAME}:pr-${PR_NUMBER}${SUFFIX} "
          fi

          # Semver tags
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF_NAME#v}"
            TAGS="${TAGS}${REGISTRY}/${IMAGE_NAME}:${VERSION}${SUFFIX} "
            MINOR="${VERSION%.*}"
            TAGS="${TAGS}${REGISTRY}/${IMAGE_NAME}:${MINOR}${SUFFIX} "
          fi

          # SHA tag
          TAGS="${TAGS}${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}${SUFFIX} "

          # Latest tag (only for runtime on main)
          if [[ "$REF" == "refs/heads/main" && "$TARGET" == "runtime" ]]; then
            TAGS="${TAGS}${REGISTRY}/${IMAGE_NAME}:latest "
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Generated tags: $TAGS"

      - name: Build image
        env:
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_ARGS=""
          for tag in ${{ steps.tags.outputs.tags }}; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done

          podman build --format docker \
            -f Dockerfile.ci \
            --target "${{ matrix.target }}" \
            --platform linux/amd64 \
            --build-arg BUILD_DATE="$BUILD_DATE" \
            --build-arg VCS_REF="$SHA" \
            --build-arg VERSION="$REF_NAME" \
            $TAG_ARGS \
            .

      - name: Push images
        if: (github.event_name != 'pull_request' || github.event.inputs.push == 'true') && matrix.target != 'ci'
        run: |
          for tag in ${{ steps.tags.outputs.tags }}; do
            echo "Pushing $tag..."
            podman push "$tag"
          done

      - name: Generate SBOM
        if: github.event_name != 'pull_request' && matrix.target == 'runtime'
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d  # v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          artifact-name: sbom-${{ matrix.target }}.spdx.json
          output-file: sbom-${{ matrix.target }}.spdx.json

      - name: Upload SBOM
        if: github.event_name != 'pull_request' && matrix.target == 'runtime'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: sbom-${{ matrix.target }}
          path: sbom-${{ matrix.target }}.spdx.json
          retention-days: 90

  # ============================================================================
  # Test Built Images
  # ============================================================================
  test-images:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Log in to Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "$REGISTRY" --username "${{ github.actor }}" --password-stdin

      - name: Test runtime image
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          echo "Testing runtime image..."
          podman run --rm "$REGISTRY/$IMAGE_NAME:$IMAGE_TAG" \
            pixi run mojo --version
          echo "Runtime image working"

      - name: Test production image
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          echo "Testing production image..."
          podman run --rm "$REGISTRY/$IMAGE_NAME:${IMAGE_TAG}-prod" \
            pixi run mojo --version
          echo "Production image working"

      - name: Run smoke tests
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          echo "Running smoke tests in container..."
          podman run --rm "$REGISTRY/$IMAGE_NAME:$IMAGE_TAG" \
            pixi run mojo test -I . tests/smoke/ || echo "Smoke tests not found or failed"

  # ============================================================================
  # Security Scan
  # ============================================================================
  security-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request'

    steps:
      - name: Log in to Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "$REGISTRY" --username "${{ github.actor }}" --password-stdin

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v4
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    needs: [build-and-push, test-images, security-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate summary
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          echo "# Container Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: \`$REGISTRY/$IMAGE_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| runtime | \`$IMAGE_TAG\` | ${{ needs.build-and-push.result == 'success' && 'pass' || 'fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ci | \`${IMAGE_TAG}-ci\` | ${{ needs.build-and-push.result == 'success' && 'pass' || 'fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| production | \`${IMAGE_TAG}-prod\` | ${{ needs.build-and-push.result == 'success' && 'pass' || 'fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Usage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Pull latest" >> $GITHUB_STEP_SUMMARY
          echo "podman pull $REGISTRY/$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Run tests" >> $GITHUB_STEP_SUMMARY
          echo "podman run --rm $REGISTRY/$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Interactive shell" >> $GITHUB_STEP_SUMMARY
          echo "podman run -it $REGISTRY/$IMAGE_NAME:$IMAGE_TAG bash" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
