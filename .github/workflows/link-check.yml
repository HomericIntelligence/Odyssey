name: Check Markdown Links

on:
  # Run on pull requests that modify markdown files
  pull_request:
    paths:
      - '**.md'

  # Run on pushes to main that modify markdown files
  push:
    branches:
      - main
    paths:
      - '**.md'

  # Run weekly to catch link rot
  schedule:
    # Every Monday at 9 AM UTC (1 AM PST)
    - cron: '0 9 * * 1'

  # Allow manual runs
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Restore lychee cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
        with:
          # Check all markdown files
          args: |
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --max-retries 3
            --retry-wait-time 5
            --timeout 15
            --accept "200..=204,503,504"
            --exclude 'file:///,https://www.conventionalcommits.org'
            --base '${{ github.workspace }}'
            '**/*.md'

          # Output results to a file
          output: lychee-report.md

          # Format as markdown
          format: markdown

          # Fail the workflow if broken links are found
          fail: true

          # Use GitHub token to avoid rate limiting
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate installation.md anchor links
        run: |
          python3 scripts/validate_installation_anchors.py \
            README.md \
            docs/getting-started/installation.md
