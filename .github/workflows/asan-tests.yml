name: ASAN Tests

on:
  pull_request:
    paths:
      - 'src/odyssey/**/*.mojo'
      - 'tests/**/*.mojo'
      - 'justfile'
      - 'Dockerfile'
      - '.github/workflows/asan-tests.yml'

  push:
    branches:
      - main
    paths:
      - 'src/odyssey/**/*.mojo'
      - 'tests/**/*.mojo'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  asan-tests:
    name: AddressSanitizer Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Run core hash tests under ASAN
        run: |
          echo "Running src/odyssey/core hash tests under AddressSanitizer..."
          just test-group-asan "tests/odyssey/core" "test_hash.mojo"

      - name: Run MXFP4 block tests under ASAN
        run: |
          echo "Running MXFP4 block tests under AddressSanitizer..."
          just test-group-asan "tests/core/types" "test_mxfp4_block.mojo"

      - name: Run serialization tests under ASAN
        run: |
          echo "Running serialization tests under AddressSanitizer..."
          just test-group-asan "tests/examples" "test_trait_based_serialization.mojo"

      - name: Run gradient checking tests under ASAN
        run: |
          echo "Running gradient checking tests under AddressSanitizer..."
          just test-group-asan "tests/odyssey/core" "test_gradient_checking_basic.mojo test_gradient_checking_dtype.mojo"

      - name: Run tensor dataset tests under ASAN
        run: |
          echo "Running tensor dataset tests under AddressSanitizer..."
          just test-group-asan "tests/odyssey/data/datasets" "test_tensor_dataset.mojo"

      - name: Report ASAN status
        if: always()
        run: |
          echo "ASAN test run complete"
          echo "Any heap-use-after-free, buffer overflow, or memory errors above are root causes of JIT crashes"
