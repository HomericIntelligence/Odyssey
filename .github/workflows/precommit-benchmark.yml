name: Pre-commit Hook Benchmark

# Measure pre-commit hook runtime to catch performance regressions.
# Non-blocking: emits a warning annotation but never fails CI.

on:
  workflow_dispatch:

  push:
    paths:
      - .pre-commit-config.yaml
      - pyproject.toml

  pull_request:
    paths:
      - .pre-commit-config.yaml
      - pyproject.toml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  precommit-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up uv
        uses: ./.github/actions/setup-uv

      - name: Install pre-commit
        run: |
          uv pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-

      - name: Count tracked files
        id: count-files
        run: |
          FILE_COUNT=$(git ls-files | wc -l | tr -d ' ')
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Time pre-commit hooks
        id: time-hooks
        run: |
          START=$SECONDS
          # Skip mojo-format — it is advisory/non-blocking (same as pre-commit.yml)
          # because the Mojo 0.26.1 formatter has known bugs.
          SKIP=mojo-format uv run pre-commit run --all-files --show-diff-on-failure
          HOOK_EXIT=$?
          ELAPSED=$((SECONDS - START))
          echo "elapsed=$ELAPSED" >> "$GITHUB_OUTPUT"
          if [ "$HOOK_EXIT" -eq 0 ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Write benchmark summary
        if: always()
        env:
          ELAPSED: ${{ steps.time-hooks.outputs.elapsed }}
          FILE_COUNT: ${{ steps.count-files.outputs.file_count }}
          HOOK_STATUS: ${{ steps.time-hooks.outputs.status }}
        run: |
          uv run python scripts/bench_precommit.py \
            --elapsed "${ELAPSED:-0}" \
            --files "${FILE_COUNT:-0}" \
            --status "${HOOK_STATUS:-unknown}"

      - name: Save benchmark data as JSON artifact
        if: always()
        run: |
          mkdir -p benchmark-results
          cat > benchmark-results/precommit-benchmark.json << 'JSONEOF'
          {
            "workflow": "precommit-benchmark",
            "run_id": "${{ github.run_id }}",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "elapsed_s": ${{ steps.time-hooks.outputs.elapsed || 0 }},
            "file_count": ${{ steps.count-files.outputs.file_count || 0 }},
            "hook_status": "${{ steps.time-hooks.outputs.status || 'unknown' }}",
            "commit_sha": "${{ github.sha }}"
          }
          JSONEOF

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: benchmark-results
          path: benchmark-results/
          retention-days: 365
          compression-level: 9
