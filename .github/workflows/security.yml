name: Security Scanning

# Secret detection, SAST, and supply chain review on PRs and pushes to main
# Target duration: < 5 minutes

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ============================================================================
  # Secret Scanning
  # ============================================================================
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          fetch-depth: 0  # Full history for comprehensive scanning

      - name: Run Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.0_linux_x64.tar.gz
          chmod +x gitleaks

          if [ -f .gitleaks.toml ]; then
            echo "Using .gitleaks.toml configuration"
            ./gitleaks detect --source=. --config=.gitleaks.toml --verbose --no-git --exit-code=1
          else
            echo "No .gitleaks.toml found, using default configuration"
            ./gitleaks detect --source=. --verbose --no-git --exit-code=1
          fi

  # ============================================================================
  # SAST Scanning
  # ============================================================================
  sast-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
          generateSarif: true
        continue-on-error: true

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  # ============================================================================
  # Supply Chain Review
  # ============================================================================
  supply-chain-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always
        continue-on-error: true

  # ============================================================================
  # Security Report
  # ============================================================================
  security-report:
    needs: [secret-scan, sast-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Generate security report
        run: |
          echo "# 🔐 Security Scan Results" > security-report.md
          echo "" >> security-report.md
          echo "**Workflow Run**: [\`${{ github.run_number }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> security-report.md
          echo "" >> security-report.md

          echo "## Scan Status" >> security-report.md
          echo "" >> security-report.md

          if [ "${{ needs.secret-scan.result }}" = "success" ]; then
            echo "- ✅ **Secret Scan**: Passed (no secrets detected)" >> security-report.md
          else
            echo "- ❌ **Secret Scan**: Failed (secrets detected!)" >> security-report.md
          fi

          if [ "${{ needs.sast-scan.result }}" = "success" ]; then
            echo "- ✅ **SAST Scan**: Passed" >> security-report.md
          else
            echo "- ⚠️ **SAST Scan**: Completed with findings" >> security-report.md
          fi

          echo "" >> security-report.md
          echo "## Recommendations" >> security-report.md
          echo "" >> security-report.md

          if [ "${{ needs.secret-scan.result }}" != "success" ]; then
            echo "- 🚨 **CRITICAL**: Remove exposed secrets immediately" >> security-report.md
            echo "" >> security-report.md
            echo "⛔ **Action Required**: Critical security issues must be resolved before merge." >> security-report.md
          else
            echo "- Keep dependencies up to date" >> security-report.md
            echo "- Review SAST findings in the Security tab" >> security-report.md
            echo "- Monitor security advisories for your dependencies" >> security-report.md
          fi

          cat security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v6
        with:
          name: security-report
          path: security-report.md
          retention-days: 90

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/pr-comment
        with:
          report-file: security-report.md
          comment-marker: "\U0001F510 Security Scan Results"

      - name: Fail if secrets detected
        run: |
          if [ "${{ needs.secret-scan.result }}" != "success" ]; then
            echo "❌ CRITICAL: Secrets detected in repository"
            exit 1
          fi

          echo "✅ No critical security issues found"
