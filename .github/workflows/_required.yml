# Canonical required-checks workflow for the org-wide homeric-main-baseline ruleset.
# This workflow defines the 9 canonical status-check contexts that branch protection
# requires. All job name: strings are the EXACT context strings — do not rename.
#
# Reference implementation: HomericIntelligence/ProjectScylla _required.yml
# Stack: Mixed Python + Mojo (pixi-managed), pytest for Python tests, mojo test for Mojo.
name: Required Checks

on:
  pull_request:
  push:
    branches: [main]

# One run per branch at a time; cancel any in-progress run when a new commit arrives.
concurrency:
  group: required-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 0. forbid-suppressions ────────────────────────────────────────────────
  # Regression guard ported from HomericIntelligence/Odysseus#280. Rejects
  # `|| true` in shell/YAML/Dockerfile/justfile/HCL and `continue-on-error: true`
  # in GitHub workflow YAML, so the silent-failure idiom cannot return without
  # tripping a required check.
  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Reject silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files \
            -- \
            '*.sh' '*.bash' '*.yml' '*.yaml' '*.hcl' \
            'Dockerfile*' '**/Dockerfile*' \
            'justfile' '**/justfile' 'Justfile' '**/Justfile')
          declare -a scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              # Exempt this workflow file (heredoc would otherwise self-match)
              .github/workflows/_required.yml) continue ;;
              # Exempt any runbook that documents the rule (if present)
              docs/runbooks/no-silent-failures.md) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nE '\|\|[[:space:]]*true([[:space:]]*$|[[:space:]]+#)' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found silent-failure workarounds above. Refactor per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no silent-failure workarounds found'

      - name: "Reject continue-on-error workflow opt-out"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files"
            exit 0
          fi
          if grep -nE '^[[:space:]]*continue-on-error:[[:space:]]*true[[:space:]]*$' "${files[@]}"; then
            echo ""
            echo '::error::Found "continue-on-error: true" above. Fix the root cause per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no "continue-on-error: true" found'

      - name: "Reject advisory annotation pattern"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          # The advisory-annotation pattern in workflow run blocks is morally
          # equivalent to continue-on-error: true: it lets a tool fail without
          # failing the CI step. Per HomericIntelligence/Odysseus#282 (Bucket F),
          # every tool must be fail-fast. The only legitimate annotation is
          # informational text not tied to a tool's exit code — those should
          # use echo "WARN:" to stdout instead.
          declare -a scan_files=()
          for f in "${files[@]}"; do
            # Exempt this workflow file (heredoc would otherwise self-match).
            case "$f" in
              .github/workflows/_required.yml) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nF '::warning::' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found advisory annotations above. Make the underlying tool fail-fast or use echo "WARN:" to stdout. See HomericIntelligence/Odysseus#282.'
            exit 1
          fi
          echo 'OK: no advisory annotations found'

  # ── 1. lint ────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install pre-commit
        run: pixi run pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run pre-commit (all files, skip mojo-format)
        # mojo-format is advisory/non-blocking due to Mojo 0.26.x formatter limitations —
        # see docs/dev/mojo-glibc-compatibility.md. All other hooks are enforced.
        run: SKIP=mojo-format pixi run pre-commit run --all-files --show-diff-on-failure

      - name: Enforce no .__matmul__() call sites
        run: |
          # Bucket D: `grep -v` returns 1 with no matches and breaks pipefail.
          # Use `awk` filters (always exit 0) plus a `set +e` around the
          # initial `grep` so absence of any hit doesn't fail the pipeline.
          set +e
          raw=$(grep -rn '\.__matmul__(' . \
                  --include='*.mojo' --include='*.🔥' \
                  --exclude-dir='.pixi' --exclude-dir='.git')
          set -e
          violations=$(printf '%s\n' "$raw" \
            | awk '!/fn __matmul__\(/ && !/# __matmul__/ && !/__matmul__.*deprecated/ && NF')
          if [ -n "$violations" ]; then
            echo "::error::Found .__matmul__() call sites (use matmul(A, B) instead):"
            echo "$violations"
            exit 1
          fi

      - name: Install mypy and stubs
        run: pixi run pip install mypy types-PyYAML

      - name: Run mypy
        # mypy.ini at repo root is the single source of truth for mypy config.
        # Exclude generators/ due to module path ambiguity (same as pre-commit.yml).
        run: |
          pixi run mypy --exclude 'generators/' scripts/

  # ── 2. unit-tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Check pre-commit vs pixi version drift
        run: pixi run python scripts/check_precommit_versions.py

      - name: Run Python unit tests
        run: |
          pixi run pytest tests/unit/ \
            --override-ini="addopts=" \
            -v --strict-markers \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=junit-unit.xml

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-results-unit
          path: |
            coverage.xml
            junit-unit.xml
          retention-days: 7

  # ── 3. integration-tests ───────────────────────────────────────────────────
  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Run Python integration tests
        # tests/integration/ contains architecture-level tests that validate
        # the src/projectodyssey library and model implementations end-to-end without
        # requiring live network access or external services.
        # Exit code 5 means no tests collected (integration dir has only .mojo tests).
        run: |
          set +e
          pixi run pytest tests/integration/ \
            --override-ini="addopts=" \
            -v --strict-markers \
            --junitxml=junit-integration.xml
          code=$?
          set -e
          if [ "$code" -eq 5 ]; then
            echo "::notice::No Python integration tests collected — skipping"
          elif [ "$code" -ne 0 ]; then
            exit "$code"
          fi

      - name: Validate YAML configs
        # Secondary integration validator: ensures all YAML configs in configs/
        # parse correctly and pass yamllint structure checks.
        run: |
          pixi run pip install yamllint
          find configs/ -type f \( -name "*.yaml" -o -name "*.yml" \) 2>/dev/null | \
            sort | while read -r f; do
              echo "Validating $f ..."
              pixi run python3 -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
            done
          echo "All config YAML files are valid."

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-results-integration
          path: junit-integration.xml
          retention-days: 7

  # ── 4. security/dependency-scan ────────────────────────────────────────────
  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install pip-audit
        # Upgrade pip first so the audited environment does not carry the
        # runner's pre-installed vulnerable pip (PYSEC-2026-196 affects pip
        # 26.1.1, fixed in 26.1.2). pip-audit scans the whole environment, so
        # a stale runner pip would otherwise fail the scan on a vuln unrelated
        # to this project's declared dependencies.
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit against pyproject.toml dependencies
        id: pip-audit
        run: |
          # Fail-fast pip-audit per HomericIntelligence/Odysseus#282 (Bucket F).
          # Both wrappers (editable install + pip-audit) were advisory `::warning::`
          # patterns that let CVE findings pass silently. Now:
          #   - The editable install is required (a real build-backend failure
          #     means the audit cannot evaluate project deps; fix the metadata).
          #   - pip-audit exits non-zero on findings and blocks the PR.
          #
          # Three transitive-dep CVEs remain allowlisted because upstream has
          # not published a fix version (tracked in #5386). The other 10 CVEs
          # were resolved by version floors in pixi.toml and are no longer
          # ignored. Drop the remaining entries once upstream lands a fix.
          set -euo pipefail
          pip install setuptools wheel
          pip install -e . --no-deps
          pip-audit --skip-editable \
            --ignore-vuln CVE-2026-44708 \
            --ignore-vuln CVE-2026-44896 \
            --ignore-vuln CVE-2026-3219

      - name: Post pip-audit summary
        if: always()
        env:
          AUDIT_OUTCOME: ${{ steps.pip-audit.outcome }}
        run: |
          {
            echo "## pip-audit Security Scan"
            echo ""
            if [ "$AUDIT_OUTCOME" = "success" ]; then
              echo "No HIGH/CRITICAL vulnerabilities found."
            else
              echo "Vulnerabilities detected — see job logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── 5. security/secrets-scan ───────────────────────────────────────────────
  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Full history so gitleaks can scan all commits, not just HEAD.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          # Pinned to v8.30.0 — matches security.yml pin (see #3316)
          GITLEAKS_VERSION="8.30.0"
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e  gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | sha256sum --check
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: |
          if [ -f .gitleaks.toml ]; then
            gitleaks detect --source=. --config=.gitleaks.toml --verbose --exit-code=1
          else
            gitleaks detect --source=. --verbose --exit-code=1
          fi

  # ── 6. build ───────────────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Build Python package (sdist + wheel)
        # pixi.toml has no build task; use python -m build directly.
        # The Mojo src/projectodyssey library is validated separately in build-validation.yml
        # (requires the Mojo runtime / container setup).
        # Use isolated build (default) so build dependencies are fetched automatically.
        run: |
          pixi run pip install build
          pixi run python -m build
          ls -lh dist/

  # ── 7. schema-validation ───────────────────────────────────────────────────
  schema-validation:
    name: schema-validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate workflow YAML schemas
        run: |
          find .github/workflows -name "*.yml" | sort | \
            xargs check-jsonschema \
              --schemafile https://json.schemastore.org/github-workflow

      - name: Validate JSON schemas in schemas/
        run: |
          # Ensure every schema file in schemas/ is valid JSON
          find schemas/ -name "*.json" 2>/dev/null | sort | while read -r f; do
            echo "Checking $f ..."
            python3 -c "import json, sys; json.load(open('$f'))" || exit 1
          done
          echo "All JSON schema files are valid."

  # ── 9. deps/version-sync ───────────────────────────────────────────────────
  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Cross-check pyproject.toml and pixi.toml versions
        run: |
          python3 - <<'EOF'
          import tomllib, sys

          with open("pyproject.toml", "rb") as f:
              pyproject = tomllib.load(f)
          with open("pixi.toml", "rb") as f:
              pixi = tomllib.load(f)

          pyproject_ver = pyproject.get("project", {}).get("version") or \
                          pyproject.get("tool", {}).get("poetry", {}).get("version")
          # pixi.toml stores version under [workspace] in this repo
          pixi_ver = pixi.get("workspace", {}).get("version") or \
                     pixi.get("package", {}).get("version")

          print(f"pyproject.toml version : {pyproject_ver}")
          print(f"pixi.toml version      : {pixi_ver}")

          if pyproject_ver and pixi_ver and pyproject_ver != pixi_ver:
              print(f"::error::Version mismatch: pyproject.toml={pyproject_ver}, pixi.toml={pixi_ver}")
              sys.exit(1)
          print("Versions are consistent.")
          EOF

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Validate pixi.lock is up-to-date
        run: |
          if ! pixi install --locked 2>/dev/null; then
            echo "::error::pixi.lock is stale — run 'pixi install' locally and commit pixi.lock"
            exit 1
          fi

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v20.0.0
        with:
          globs: "**/*.md"
          config: ".markdownlint.yaml"

  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Skip if no pixi.toml
        id: detect
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pixi
        if: steps.detect.outputs.skip == 'false'
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11  # v0.9.6
        with:
          pixi-version: v0.67.2
          cache: true
      - name: pixi install (locked)
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ -f pixi.lock ]; then
            pixi install --locked
          else
            # Informational stdout WARN (not a ::warning:: advisory): this branch
            # does not gate a tool exit — pixi install will still run, just
            # without lock-pinning. Per HomericIntelligence/Odysseus#282 Bucket F.
            echo "WARN: pixi.toml present but pixi.lock missing — running unlocked"
            pixi install
          fi

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh
