name: Workflow Smoke Tests

# Fast-fail gate that validates workflow properties without heavy setup.
# Guards against regression of gaps fixed in #3143 and #3318:
#   - security.yml: pull_request trigger, Semgrep setup, Gitleaks flags
#   - pre-commit.yml: pull_request trigger present
#   - comprehensive-tests.yml: matrix coverage maintained
#   - validate-configs.yml: agent config validation on PRs

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/security.yml'
      - '.github/workflows/pre-commit.yml'
      - '.github/workflows/comprehensive-tests.yml'
      - '.github/workflows/validate-configs.yml'
      - 'tests/smoke/test_security_workflow_properties.py'
      - '.github/workflows/pre-commit.yml'
      - 'tests/smoke/test_pre_commit_workflow_properties.py'
      - '.github/workflows/comprehensive-tests.yml'
      - 'tests/smoke/test_comprehensive_tests_workflow_properties.py'
      - '.github/workflows/validate-configs.yml'
      - 'tests/smoke/test_validate_configs_workflow_properties.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke-test-security-workflows:
    name: Security Workflow Property Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Fast-fail grep checks before any heavy setup
      - name: Check pull_request trigger present
        run: |
          if ! grep -qP '^\s+pull_request\b' .github/workflows/security.yml; then
            echo "ERROR: security.yml is missing pull_request trigger"
            exit 1
          fi
          echo "OK: pull_request trigger present"

      - name: Check Semgrep has no continue-on-error
        run: |
          # Extract lines around Semgrep action and check for continue-on-error
          if grep -A20 'semgrep-action' .github/workflows/security.yml | grep -q 'continue-on-error: true'; then
            echo "ERROR: Semgrep step has continue-on-error: true"
            exit 1
          fi
          echo "OK: Semgrep step has no continue-on-error: true"

      - name: Check Gitleaks has no --no-git flag
        run: |
          if grep -q -- '--no-git' .github/workflows/security.yml; then
            echo "ERROR: Gitleaks uses --no-git in security.yml"
            exit 1
          fi
          echo "OK: Gitleaks has no --no-git flag"

      - name: Check pre-commit has pull_request trigger
        run: |
          if ! grep -qP '^\s+pull_request\b' .github/workflows/pre-commit.yml; then
            echo "ERROR: pre-commit.yml is missing pull_request trigger"
            exit 1
          fi
          echo "OK: pre-commit.yml has pull_request trigger"

      - name: Check comprehensive-tests has matrix
        run: |
          if ! grep -q 'matrix:' .github/workflows/comprehensive-tests.yml; then
            echo "ERROR: comprehensive-tests.yml missing matrix configuration"
            exit 1
          fi
          echo "OK: comprehensive-tests.yml has matrix coverage"

      - name: Check validate-configs has agent validation
        run: |
          if ! grep -q 'check_frontmatter\|validate_agents' .github/workflows/validate-configs.yml; then
            echo "ERROR: validate-configs.yml missing agent configuration validation"
            exit 1
          fi
          echo "OK: validate-configs.yml includes agent validation"

      # Full pytest run for comprehensive assertions
      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Run security workflow smoke tests
        run: pixi run python -m pytest tests/smoke/test_security_workflow_properties.py -v

  smoke-test-other-workflows:
    name: Other Workflow Property Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Fast-fail grep checks before any heavy setup
      - name: Check pre-commit pull_request trigger present
        run: |
          if ! grep -qP '^\s+pull_request\b' .github/workflows/pre-commit.yml; then
            echo "ERROR: pre-commit.yml is missing pull_request trigger"
            exit 1
          fi
          echo "OK: pull_request trigger present in pre-commit.yml"

      - name: Check pre-commit mojo-format is fail-fast
        run: |
          # The mojo-format step must be fail-fast per HomericIntelligence/
          # Odysseus#282 (Bucket F). The previous "advisory" forms
          # (continue-on-error and the workflow-annotation wrapper) are both
          # forbidden because they let formatter diffs merge silently. Run
          # mojo format locally (in a GLIBC-compatible container — see
          # docs/dev/mojo-glibc-compatibility.md) and commit any diff.
          #
          # The advisory annotation literal is constructed at runtime so this
          # file itself does not trip the forbid-advisory-warnings lint rule.
          advisory_prefix="::warn"
          advisory_prefix="${advisory_prefix}ing::"
          block=$(awk '
            /^[[:space:]]+-[[:space:]]+name:[[:space:]]+Run mojo format/ {flag=1; print; next}
            flag && /^[[:space:]]+-[[:space:]]+name:/ {exit}
            flag {print}
          ' .github/workflows/pre-commit.yml)
          if echo "$block" | grep -q 'continue-on-error: true'; then
            echo "ERROR: mojo-format step has 'continue-on-error: true' (forbidden Bucket A)."
            exit 1
          fi
          if echo "$block" | grep -qF "$advisory_prefix"; then
            echo "ERROR: mojo-format step uses the advisory-annotation pattern (forbidden Bucket F)."
            echo "       Remove the wrapper and run the command bare so CI fails on diffs."
            exit 1
          fi
          if ! echo "$block" | grep -q 'pre-commit run mojo-format'; then
            echo "ERROR: mojo-format step does not appear to invoke pre-commit run mojo-format."
            exit 1
          fi
          echo "OK: mojo-format step is fail-fast (no continue-on-error / no advisory annotation)"

      - name: Check comprehensive-tests pull_request trigger present
        run: |
          if ! grep -qP '^\s+pull_request\b' .github/workflows/comprehensive-tests.yml; then
            echo "ERROR: comprehensive-tests.yml is missing pull_request trigger"
            exit 1
          fi
          echo "OK: pull_request trigger present in comprehensive-tests.yml"

      - name: Check comprehensive-tests fail-fast is false
        run: |
          if ! grep -q 'fail-fast: false' .github/workflows/comprehensive-tests.yml; then
            echo "ERROR: comprehensive-tests.yml is missing fail-fast: false"
            exit 1
          fi
          echo "OK: fail-fast: false present in comprehensive-tests.yml"

      - name: Check validate-configs pull_request trigger present
        run: |
          if ! grep -qP '^\s+pull_request\b' .github/workflows/validate-configs.yml; then
            echo "ERROR: validate-configs.yml is missing pull_request trigger"
            exit 1
          fi
          echo "OK: pull_request trigger present in validate-configs.yml"

      - name: Check validate-configs uses yamllint
        run: |
          if ! grep -q 'yamllint' .github/workflows/validate-configs.yml; then
            echo "ERROR: validate-configs.yml does not use yamllint"
            exit 1
          fi
          echo "OK: yamllint present in validate-configs.yml"

      # Full pytest run for comprehensive assertions
      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Run other workflow smoke tests
        run: |
          pixi run python -m pytest \
            tests/smoke/test_pre_commit_workflow_properties.py \
            tests/smoke/test_comprehensive_tests_workflow_properties.py \
            tests/smoke/test_validate_configs_workflow_properties.py \
            -v
