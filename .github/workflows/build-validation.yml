name: Build Validation

on:
  # Run on pull requests when source files change
  pull_request:
    paths:
      - 'shared/**/*.mojo'
      - 'pixi.toml'
      - 'justfile'
      - '.github/workflows/build-validation.yml'

  # Run on pushes to main
  push:
    branches:
      - main
    paths:
      - 'shared/**/*.mojo'
      - 'pixi.toml'
      - 'justfile'
      - '.github/workflows/build-validation.yml'

  # Allow manual runs
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3

      - name: Build shared package (debug mode)
        run: |
          echo "Building shared Mojo package in debug mode..."
          just build
          echo "✓ Build succeeded"

      - name: Validate package compilation
        run: |
          echo "Running validation-only package compilation..."
          just package
          echo "✓ Package validation succeeded"

      - name: Report build status
        if: always()
        run: |
          echo "Build validation completed successfully"
          echo "Shared Mojo package compiles without errors"
