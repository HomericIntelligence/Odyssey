name: Build Validation

on:
  # Run on pull requests when source files change
  pull_request:
    paths:
      - 'src/odyssey/**/*.mojo'
      - 'pyproject.toml'
      - 'justfile'
      - '.github/workflows/build-validation.yml'

  # Run on pushes to main
  push:
    branches:
      - main
    paths:
      - 'src/odyssey/**/*.mojo'
      - 'pyproject.toml'
      - 'justfile'
      - '.github/workflows/build-validation.yml'

  # Allow manual runs
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-validation:
    # Uses the repo's own setup-container composite action (rootless podman
    # compose, managed directly on the runner host) — no job-level
    # `container:` wrapper here, since nesting that action's podman inside
    # another container would be podman-in-podman.
    # PR #5675: keep this on `ubuntu-latest` GitHub-hosted runners until the
    # self-hosted `aeolus` runner is provisioned with SIMD-capable CPUs
    # (Mojo 1.0.0b2 binary SIGILLs at `mojo --version` exit 132 on the
    # current aeolus hardware). The setup-container/action.yml plumbing
    # (linger-enable + sudo handling) is preserved + hardened; the
    # self-hosted migration is deferred to a follow-up issue.
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      # Fast type-check gate (#5142): runs before the full ci-build so
      # contributors get sub-minute feedback on library compilation errors
      # without waiting for the full executable build.
      - name: Type-check src/odyssey/ library (fast feedback)
        run: |
          echo "Running fast type-check..."
          just check
          echo "✓ Type-check passed"

      - name: Build and validate src/odyssey package
        run: |
          echo "Running CI build validation..."
          just ci-build
          echo "✓ CI build validation succeeded"
