name: Comprehensive Tests

# Unified test workflow combining comprehensive tests with quality metrics
# Runs ALL tests (Mojo and Python) with metrics collection and quality analysis
# Also covers: build-validation, test-gradients, test-data-utilities, coverage
# Target duration: < 15 minutes (parallelized across test groups)

on:
  # Run on all pull requests
  pull_request:

  # Run on pushes to main
  push:
    branches:
      - main

  # Allow manual runs with extended options
  workflow_dispatch:
    inputs:
      run_extended:
        description: 'Run extended analysis (SIMD, complexity)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pull-requests: write  # For PR comments

jobs:
  # ============================================================================
  # Mojo Syntax Validation - Catch deprecated patterns early
  # ============================================================================
  mojo-syntax-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: "Mojo Syntax Validation"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check for deprecated List[Type](args) pattern
        run: |
          echo "=================================================="
          echo "Checking for deprecated List[Type](args) pattern..."
          echo "=================================================="

          # Search for deprecated pattern (any type)
          if grep -rE "List\[.*\]\([0-9]" --include="*.mojo" shared/ tests/ examples/ benchmarks/ scripts/ 2>/dev/null; then
            echo ""
            echo "❌ FAILED: Found deprecated List[Type](args) syntax"
            echo ""
            echo "The variadic List constructor does not exist in Mojo."
            echo "Use list literals instead: var shape = [3, 4, 5]"
            echo ""
            echo "See: https://docs.modular.com/mojo/manual/types#list"
            echo "See: CLAUDE.md section 'List Initialization'"
            exit 1
          else
            echo ""
            echo "✅ PASSED: No deprecated List constructor patterns found"
          fi

      - name: Check for deprecated backward result alias names
        run: |
          echo "============================================================"
          echo "Checking for deprecated backward result alias names..."
          echo "============================================================"

          # The 8 deprecated type aliases removed in #3059/#3267.
          # They must not reappear in shared/ or tests/.
          PATTERN='LinearBackwardResult\|LinearNoBiasBackwardResult\|Conv2dBackwardResult\|Conv2dNoBiasBackwardResult\|DepthwiseConv2dBackwardResult\|DepthwiseConv2dNoBiasBackwardResult\|DepthwiseSeparableConv2dBackwardResult\|DepthwiseSeparableConv2dNoBiasBackwardResult'

          # Two-phase grep: broad scan, then exclude comment-only lines and docstrings.
          if grep -rn "$PATTERN" shared/ tests/ --include='*.mojo' 2>/dev/null \
               | grep -v '^\s*#' \
               | grep -v '^\s*"""' \
               | grep -q .; then
            echo ""
            echo "::error::Deprecated alias names detected in shared/ or tests/"
            grep -rn "$PATTERN" shared/ tests/ --include='*.mojo' 2>/dev/null \
              | grep -v '^\s*#' \
              | grep -v '^\s*"""'
            echo ""
            echo "FAILED: The above deprecated type aliases were removed in #3059."
            echo "Use the replacement struct names directly (e.g., LinearGradients)."
            exit 1
          else
            echo ""
            echo "PASSED: No deprecated backward result alias names found"
          fi

  # ============================================================================
  # Mojo Package Compilation Check - Verify shared package compiles
  # This runs BEFORE tests to catch compilation errors early
  # ============================================================================
  mojo-compilation:
    needs: [mojo-syntax-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: "Mojo Package Compilation"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Check Mojo version
        run: pixi run mojo --version

      - name: Install Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3

      - name: Build Mojo packages
        run: |
          echo "=================================================="
          echo "Building Mojo packages..."
          echo "=================================================="

          if [ -d "shared" ]; then
            NATIVE=1 just build ci
            echo "✅ Shared package built successfully"
          else
            echo "⚠️  No shared package found yet"
          fi

      - name: Compile shared package
        run: |
          echo "=================================================="
          echo "Compiling shared package..."
          echo "=================================================="

          mkdir -p compilation-results

          # Count total files for reporting
          total_files=$(find shared -name "*.mojo" -type f | wc -l)
          echo "Total .mojo files in shared/: $total_files"

          # Build the shared package (compiles all modules properly with relative imports)
          export REPO_ROOT=$(pwd)
          if pixi run mojo package -I "$REPO_ROOT" shared -o /tmp/shared.mojopkg 2>&1; then
            echo "✅ PASSED: shared package compiled successfully"
            echo "compilation_status=success" >> $GITHUB_ENV
          else
            echo "❌ FAILED: shared package compilation"
            echo ""
            echo "Fix compilation errors before merging to main."
            echo "compilation_status=failed" >> $GITHUB_ENV
            exit 1
          fi

          # Save compilation summary
          cat > compilation-results/summary.txt << EOF
          Mojo Compilation Check
          ======================
          Total .mojo files: $total_files
          Status: success
          EOF

      - name: Upload compilation results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: mojo-compilation-results
          path: compilation-results/
          retention-days: 7

  # ============================================================================
  # Test Coverage Validation - Ensure all tests are discovered
  # ============================================================================
  validate-test-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: "Test Coverage Validation"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Validate test coverage
        id: validation
        run: |
          python scripts/validate_test_coverage.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Post validation report to PR
        if: github.event_name == 'pull_request' && steps.validation.outputs.exit_code != '0'
        run: |
          python scripts/validate_test_coverage.py --post-pr

      - name: Fail if validation failed
        if: steps.validation.outputs.exit_code != '0'
        run: |
          echo "Test coverage validation failed. See PR comment for details."
          exit 1

  # ============================================================================
  # Audit Shared Links - Verify .claude/shared/ files are documented in CLAUDE.md
  # ============================================================================
  audit-shared-links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: "Audit Shared Links"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Audit shared links in CLAUDE.md
        run: |
          python scripts/audit_shared_links.py

  # ============================================================================
  # Comprehensive Mojo Test Suite - Parallelized by Test Group
  # ============================================================================
  test-mojo-comprehensive:
    needs: [mojo-compilation, validate-test-coverage]  # Only run tests if compilation and validation succeed
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Job timeout for all matrix groups. Monitor wall-clock times after
                          # consolidating test files. If any group consistently takes >10 min,
                          # split it into two separate entries. See Issue #3357 for monitoring
                          # guidance and ADR-009 for heap corruption splitting constraints.
    strategy:
      fail-fast: false  # Run all test groups even if one fails
      matrix:
        test-group:
          # IMPORTANT: The 'pattern' field accepts space-separated LITERAL filenames only,
          # NOT glob patterns. Use "test_elem_part1.mojo test_elem_part2.mojo" not "*_part*.mojo"
          # See Issue #4110 and ADR-009 for CI pattern constraints and split file guidelines.
          # ---- Core tensor operations ----
          # Uses wildcards to auto-include split files (*_part1, *_part2, etc.)
          - name: "Core Tensors"
            path: "tests/shared/core"
            pattern: "test_tensors*.mojo test_arithmetic*.mojo test_broadcasting*.mojo test_shape*.mojo test_creation*.mojo test_reduction*.mojo test_matrix*.mojo test_matmul*.mojo test_strassen.mojo test_pooling*.mojo test_properties*.mojo test_high_dimensional*.mojo test_slicing*.mojo"
          # ---- Activations + dtype dispatch ----
          - name: "Core Activations & Types"
            path: "tests/shared/core"
            pattern: "test_*.mojo"
          # ---- Loss functions split per ADR-009 ----
          - name: "Core Loss"
            path: "tests/shared/core"
            pattern: "test_losses_part*.mojo test_loss_funcs*.mojo test_loss_utils_part*.mojo"
          # ---- Gradient math ----
          # Mojo JIT crashes (libKGENCompilerRTShared.so) on CI runners.
          # Non-blocking pending Mojo runtime fix.
          - name: "Core Gradient"
            path: "tests/shared/core"
            pattern: "test_backward_linear.mojo test_backward_conv_pool.mojo test_backward_losses.mojo test_gradient_checking_basic.mojo test_gradient_checking_dtype.mojo test_gradient_validation_activations.mojo test_gradient_validation_layers.mojo test_gradient_validation_part1.mojo test_gradient_validation_part2.mojo test_variable_backward.mojo test_depthwise_conv_grad_check_part1.mojo test_depthwise_conv_grad_check_part2.mojo"
          # ---- Core Utilities ----
          # NOTE: This pattern has 28+ explicit file patterns and is difficult to maintain.
          # Consider refactoring by moving layer-specific tests to tests/shared/core/layers/
          # or similar subdirectory. See Issue #4359 for discussion of auto-discovery patterns
          # and the constraints of the pattern field (no true glob support).
          - name: "Core Utilities"
            path: "tests/shared/core"
            pattern: "test_utilities.mojo test_utility*.mojo test_utils*.mojo test_validation*.mojo test_integration*.mojo test_inplace_simd.mojo test_lazy_expression.mojo test_memory_pool_part*.mojo test_constants.mojo test_extensor_*.mojo test_setitem_view.mojo test_memory_leaks*.mojo test_initializers_*.mojo test_layers*.mojo test_linear*.mojo test_conv*.mojo test_normalization*.mojo test_dropout_part*.mojo test_module.mojo test_composed_op*.mojo test_hash.mojo test_sequential.mojo"
          # ---- All data subsystems (formats/datasets/samplers/transforms/loaders) ----
          # NOTE: Some data tests (test_prefetch, test_random_transform_base) crash
          # on CI with heap corruption — non-blocking pending investigation
          # test_cache.mojo was split into test_cache_part1.mojo + test_cache_part2.mojo
          # per ADR-009 (≤10 fn test_ per file) to fix heap corruption in the Data CI group.
          - name: "Data"
            path: "tests/shared/data"
            pattern: "test_*.mojo datasets/test_*.mojo samplers/test_*.mojo transforms/test_*.mojo loaders/test_*.mojo formats/test_*.mojo"
          # ---- Autograd engine + shared benchmarking helpers ----
          # Kept as separate entries (not merged under tests/shared parent path)
          # to avoid silent pass-with-0-tests if a subdirectory is empty/renamed.
          # See: https://github.com/homericintelligence/projectodyssey/issues/3356
          - name: "Autograd"
            path: "tests/shared/autograd"
            pattern: "test_*.mojo"
          - name: "Benchmarking"
            path: "tests/shared/benchmarking"
            pattern: "test_*.mojo"
          # ---- Integration tests (segfault-prone on CI, kept non-blocking) ----
          - name: "Integration Tests"
            path: "tests/shared/integration"
            pattern: "test_*.mojo"
          # ---- Shared infra: fixtures, testing helpers, utils, training stubs ----
          # NOTE: utils/test_logging.mojo split into 3 files per ADR-009 (≤10 fn test_ per file)
          # NOTE: testing/test_fixtures.mojo split into 3 parts per ADR-009 (≤10 fn test_ per file)
          # to avoid Mojo v0.26.1 heap corruption (libKGENCompilerRTShared.so JIT fault)
          # NOTE: Audited per Issue #3999 — all subdirectory globs match test files:
          #   - utils/test_*.mojo: ✓ (5+ test files)
          #   - fixtures/test_*.mojo: ✓ (2+ test files)
          #   - training/test_*.mojo: ✓ (11+ test files)
          #   - testing/test_*.mojo: ✓ (10+ test files)
          # Mojo JIT crashes on CI runners — non-blocking pending investigation.
          - name: "Shared Infra & Testing"
            path: "tests/shared"
            pattern: "test_imports*.mojo test_data_generators_part*.mojo test_model_utils.mojo test_serialization.mojo utils/test_*.mojo fixtures/test_*.mojo training/test_*.mojo testing/test_*.mojo"
          # ---- Model layer tests (the main PR-blocking test suite) ----
          # test_*.mojo glob auto-discovers all model tests including ADR-009 _partN split files
          # (e.g., test_googlenet_layers_part1.mojo) without requiring manual CI updates.
          # Mojo JIT crashes on CI runners — non-blocking pending investigation.
          - name: "Models"
            path: "tests/models"
            pattern: "test_*.mojo"
          # ---- Top-level, debug, helpers, tooling, fuzz (low-frequency failures) ----
          # NOTE: debug/test_*.mojo pattern removed — tests/debug/ contains no test files
          # and including it would cause silent pass-with-0-tests (see Issue #3999 for context).
          # If debug tests are added in the future, add "debug/test_*.mojo" back to pattern.
          - name: "Misc Tests"
            path: "tests"
            pattern: "test_*.mojo training/test_*.mojo unit/test_*.mojo integration/test_*.mojo helpers/test_*.mojo tooling/benchmarks/test_*.mojo shared/fuzz/test_*.mojo"
          # ---- Examples: lenet5 (no dataset required) + test examples ----
          - name: "Examples"
            path: "tests/examples"
            pattern: "test_*.mojo"
          # ---- Core type system ----
          # Mojo JIT crashes on CI runners — non-blocking pending investigation.
          - name: "Core Types & Fuzz"
            path: "tests/core/types"
            pattern: "test_*.mojo"

    name: "${{ matrix.test-group.name }}"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3

      - name: Run test group
        run: |
          echo "=================================================="
          echo "Test Group: ${{ matrix.test-group.name }}"
          echo "Path: ${{ matrix.test-group.path }}"
          echo "=================================================="
          echo ""

          mkdir -p test-results
          start_time=$(date +%s)

          test_result="failed"
          exit_code=1

          # Use justfile to run test group
          # The justfile handles all the complexity of test discovery and execution
          if NATIVE=1 just test-group "${{ matrix.test-group.path }}" "${{ matrix.test-group.pattern }}"; then
            test_result="passed"
            exit_code=0
          fi

          end_time=$(date +%s)
          duration=$((end_time - start_time))

          # Create simplified result files
          # Note: Detailed metrics are in justfile output, these are for aggregation
          cat > "test-results/${{ matrix.test-group.name }}.json" << EOF
          {
            "group": "${{ matrix.test-group.name }}",
            "tests": 1,
            "passed": $([ "$test_result" = "passed" ] && echo 1 || echo 0),
            "failed": $([ "$test_result" = "failed" ] && echo 1 || echo 0),
            "duration": $duration
          }
          EOF

          echo "Test Group: ${{ matrix.test-group.name }}" > "test-results/${{ matrix.test-group.name }}.txt"
          echo "Result: $test_result" >> "test-results/${{ matrix.test-group.name }}.txt"
          echo "Duration: ${duration}s" >> "test-results/${{ matrix.test-group.name }}.txt"

          exit $exit_code

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: test-results-${{ matrix.test-group.name }}
          path: test-results/
          retention-days: 7

  # ============================================================================
  # Configs Tests
  # ============================================================================
  test-configs:
    needs: [mojo-compilation, validate-test-coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Configs"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3

      - name: Run Configs tests
        run: NATIVE=1 just test-group tests/configs "test_*.mojo"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: test-results-Configs
          path: test-results/
          retention-days: 7

  # ============================================================================
  # NOTE: Training tests moved to weekly workflow (requires dataset downloads)
  # ============================================================================

  # ============================================================================
  # Benchmarks Tests
  # ============================================================================
  test-benchmarks:
    needs: [mojo-compilation, validate-test-coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Benchmarks"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3

      - name: Run Benchmarks tests
        run: NATIVE=1 just test-group tests/shared/benchmarks "bench_*.mojo"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: test-results-Benchmarks
          path: test-results/
          retention-days: 7

  # ============================================================================
  # Core Layers Tests
  # ============================================================================
  test-core-layers:
    needs: [mojo-compilation, validate-test-coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Core Layers"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3

      - name: Run Core Layers tests
        run: NATIVE=1 just test-group tests/shared/core/layers "test_*.mojo"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: test-results-Core-Layers
          path: test-results/
          retention-days: 7

  # ============================================================================
  # Python Tests
  # ============================================================================
  test-python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: "Python Tests"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Run Python tests
        run: |
          mkdir -p test-results

          # Collect all Python test paths
          TEST_PATHS=""

          # Unit tests
          if [ -d "tests/unit" ] && [ -n "$(find tests/unit -name 'test_*.py' 2>/dev/null)" ]; then
            TEST_PATHS="$TEST_PATHS tests/unit/"
          fi
          # Claude hook tests
          if [ -d "tests/claude " ] && [ -n "$(find tests/claude -name 'test_*.py' 2>/dev/null)" ]; then
            TEST_PATHS="$TEST_PATHS tests/claude/"
          fi

          # Integration tests (agents, foundation)
          [ -f "tests/agents/test_integration.py" ] && TEST_PATHS="$TEST_PATHS tests/agents/test_integration.py"
          [ -f "tests/foundation/test_structure_integration.py" ] && TEST_PATHS="$TEST_PATHS tests/foundation/test_structure_integration.py"

          start_time=$(date +%s)
          if [ -n "$TEST_PATHS" ]; then
            echo "Running Python tests from: $TEST_PATHS"
            if pytest $TEST_PATHS --verbose --timeout=300 --maxfail=5; then
              end_time=$(date +%s)
              duration=$((end_time - start_time))
              echo '{"group": "Python Tests", "tests": 1, "passed": 1, "failed": 0, "duration": '"$duration"'}' > test-results/Python-Tests.json
            else
              end_time=$(date +%s)
              duration=$((end_time - start_time))
              echo '{"group": "Python Tests", "tests": 1, "passed": 0, "failed": 1, "duration": '"$duration"'}' > test-results/Python-Tests.json
              exit 1
            fi
          else
            echo "⚠️  No Python tests found yet"
            echo '{"group": "Python Tests", "tests": 0, "passed": 0, "failed": 0, "duration": 0}' > test-results/Python-Tests.json
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: test-results-Python-Tests
          path: test-results/
          retention-days: 7

  # ============================================================================
  # Code Quality Analysis
  # ============================================================================
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: "Code Quality Analysis"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install analysis tools
        run: |
          pip install radon lizard

      - name: Analyze code metrics
        run: |
          echo "=================================================="
          echo "Code Quality Analysis"
          echo "=================================================="

          mkdir -p quality-reports

          # Python complexity analysis
          echo "## Python Code Complexity" > quality-reports/complexity.md
          echo "" >> quality-reports/complexity.md
          echo "Functions with complexity > 10 (consider refactoring):" >> quality-reports/complexity.md
          echo '```' >> quality-reports/complexity.md
          radon cc scripts/ -a -nc 2>/dev/null || echo "No complex functions found"
          echo '```' >> quality-reports/complexity.md

          # Mojo code statistics
          echo "" >> quality-reports/complexity.md
          echo "## Mojo Code Statistics" >> quality-reports/complexity.md
          echo "" >> quality-reports/complexity.md

          total_mojo_files=$(find shared tests -name "*.mojo" 2>/dev/null | wc -l)
          total_mojo_lines=$(find shared tests -name "*.mojo" -exec cat {} \; 2>/dev/null | wc -l)
          total_functions=$(grep -r "^fn " shared tests --include="*.mojo" 2>/dev/null | wc -l)
          total_structs=$(grep -r "^struct " shared tests --include="*.mojo" 2>/dev/null | wc -l)

          cat >> quality-reports/complexity.md << EOF
          | Metric | Count |
          |--------|-------|
          | Mojo Files | $total_mojo_files |
          | Lines of Code | $total_mojo_lines |
          | Functions (fn) | $total_functions |
          | Structs | $total_structs |
          EOF

          # Technical debt markers
          echo "" >> quality-reports/complexity.md
          echo "## Technical Debt Markers" >> quality-reports/complexity.md
          echo "" >> quality-reports/complexity.md

          todo_count=$(grep -r "TODO" shared tests scripts --include="*.mojo" --include="*.py" 2>/dev/null | wc -l)
          fixme_count=$(grep -r "FIXME" shared tests scripts --include="*.mojo" --include="*.py" 2>/dev/null | wc -l)

          cat >> quality-reports/complexity.md << EOF
          | Marker | Count |
          |--------|-------|
          | TODO | $todo_count |
          | FIXME | $fixme_count |
          EOF

          cat quality-reports/complexity.md

      - name: Upload quality reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: code-quality-reports
          path: quality-reports/
          retention-days: 30

  # ============================================================================
  # SIMD Analysis (Extended - manual trigger only)
  # ============================================================================
  simd-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: "SIMD Analysis"
    if: github.event_name == 'workflow_dispatch' && inputs.run_extended == true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Analyze SIMD usage
        run: |
          echo "=================================================="
          echo "SIMD Usage Analysis"
          echo "=================================================="

          mkdir -p simd-reports

          simd_count=$(grep -r "SIMD\[" shared --include="*.mojo" 2>/dev/null | wc -l)
          vectorize_count=$(grep -r "vectorize" shared --include="*.mojo" 2>/dev/null | wc -l)
          parallelize_count=$(grep -r "parallelize" shared --include="*.mojo" 2>/dev/null | wc -l)

          cat > simd-reports/analysis.md << EOF
          # SIMD Optimization Analysis

          ## Current Usage

          | Pattern | Count |
          |---------|-------|
          | SIMD[] declarations | $simd_count |
          | vectorize() calls | $vectorize_count |
          | parallelize() calls | $parallelize_count |

          ## Files with heavy loop usage (optimization candidates)
          EOF

          echo '```' >> simd-reports/analysis.md
          grep -rl "for .* in range" shared --include="*.mojo" 2>/dev/null | \
            xargs -I{} sh -c 'echo "{}": $(grep -c "for .* in range" "{}")' 2>/dev/null | \
            sort -t: -k2 -nr | head -10 >> simd-reports/analysis.md || echo "None found"
          echo '```' >> simd-reports/analysis.md

          cat simd-reports/analysis.md

      - name: Upload SIMD analysis
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: simd-analysis
          path: simd-reports/
          retention-days: 30

  # ============================================================================
  # Build Validation (absorbed from build-validation.yml)
  # ============================================================================
  build-validation:
    needs: [mojo-syntax-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: "Build Validation"

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3

      - name: Build project
        run: NATIVE=1 just build

      - name: Validate package
        run: NATIVE=1 just package

  # ============================================================================
  # Gradient Checking Tests (absorbed from test-gradients.yml)
  # ============================================================================
  gradient-tests:
    needs: [mojo-compilation]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Gradient Checking Tests"
    # ADR-009: Mojo 0.26.1 JIT heap corruption causes random crashes.
    # Non-blocking until Mojo runtime is stable.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3

      - name: Run gradient checking tests
        run: |
          # Split per ADR-009: test_gradient_checking.mojo split to avoid Mojo 0.26.1 heap corruption
          # Routed through just test-group for JIT crash retry protection (issue #3329)
          NATIVE=1 just test-group "tests/shared/core" "test_gradient_checking_basic.mojo test_gradient_checking_dtype.mojo"

      - name: Check test results
        if: failure()
        run: |
          echo "❌ Gradient checking tests FAILED!"
          echo "One or more backward passes produce incorrect gradients."
          echo "Review the test output above for details."
          exit 1

      - name: Success message
        if: success()
        run: |
          echo "✅ All gradient checks PASSED!"
          echo "All backward passes produce correct gradients."

  # ============================================================================
  # Gradient Coverage Report (absorbed from test-gradients.yml)
  # ============================================================================
  gradient-coverage:
    needs: [gradient-tests]
    runs-on: ubuntu-latest
    name: "Gradient Coverage Report"

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Check backward pass coverage
        run: |
          echo "Checking gradient test coverage..."

          # Find all *_backward functions
          BACKWARD_FUNCS=$(grep -r "fn.*_backward" shared/core --include="*.mojo" | wc -l)

          # Find all gradient tests
          GRADIENT_TESTS=$(grep -r "test.*gradient" tests/shared/core/test_gradient_checking_basic.mojo tests/shared/core/test_gradient_checking_dtype.mojo | wc -l)

          echo "Backward functions found: $BACKWARD_FUNCS"
          echo "Gradient tests found: $GRADIENT_TESTS"

          # Calculate coverage percentage
          if [ $BACKWARD_FUNCS -gt 0 ]; then
            COVERAGE=$((GRADIENT_TESTS * 100 / BACKWARD_FUNCS))
            echo "Gradient test coverage: $COVERAGE%"

            if [ $COVERAGE -lt 80 ]; then
              echo "⚠️  Warning: Gradient test coverage is below 80%"
              echo "Consider adding more gradient checking tests."
            else
              echo "✅ Good gradient test coverage!"
            fi
          fi

  # ============================================================================
  # Data Utilities Tests (absorbed from test-data-utilities.yml)
  # ============================================================================
  test-data-utilities:
    needs: [mojo-compilation]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Data Utilities Test Suite"

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3

      - name: Verify Mojo installation
        run: pixi run mojo --version

      - name: Check if test files exist
        id: check-tests
        run: |
          if [ -d "tests/shared/data" ]; then
            echo "tests_exist=true" >> $GITHUB_OUTPUT
          else
            echo "tests_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Dataset Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          NATIVE=1 just test-group "tests/shared/data/datasets" "test_base_dataset.mojo test_tensor_dataset.mojo"

      - name: Run Loader Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          NATIVE=1 just test-group "tests/shared/data/loaders" "test_base_loader.mojo"

      - name: Run Transform Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          NATIVE=1 just test-group "tests/shared/data/transforms" "test_pipeline_part1.mojo test_pipeline_part2.mojo"

      - name: Run Sampler Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          NATIVE=1 just test-group "tests/shared/data/samplers" "test_sequential_part1.mojo test_sequential_part2.mojo"

      - name: Run All Data Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          NATIVE=1 just test-group "tests/shared/data" "run_all_tests.mojo"

      - name: Run File I/O Tests (includes remove_safely)
        run: |
          NATIVE=1 just test-group "tests/shared/utils" "test_io_part2.mojo"

      - name: Report Results
        if: always()
        run: |
          if [ "${{ steps.check-tests.outputs.tests_exist }}" = "true" ]; then
            echo "Data utilities test suite completed"
            echo "Check individual test outputs above for details"
          else
            echo "⚠️  Data utilities tests not yet implemented"
            echo "This workflow will run once tests/shared/data/ tests are created"
          fi

  # ============================================================================
  # Test Metrics / Coverage (absorbed from coverage.yml)
  # ============================================================================
  test-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: "Test Metrics"

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Generate test metrics (JSON)
        run: |
          python scripts/generate_test_metrics.py --output metrics.json --format json

      - name: Generate test metrics (Markdown)
        run: |
          python scripts/generate_test_metrics.py --output metrics.md --format markdown

      - name: Display metrics
        run: cat metrics.md

      - name: Upload metrics artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: test-metrics
          path: |
            metrics.json
            metrics.md
          retention-days: 90

      - name: Build PR comment report
        if: github.event_name == 'pull_request'
        run: python scripts/build_pr_comment.py --metrics-file metrics.md --output-file metrics-pr-comment.md

      - name: Comment on PR with metrics
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/pr-comment
        with:
          report-file: metrics-pr-comment.md
          comment-marker: "Test Metrics Report"

  # ============================================================================
  # Combined Test Report with Metrics
  # ============================================================================
  test-report:
    needs: [mojo-compilation, validate-test-coverage, audit-shared-links, test-mojo-comprehensive, test-configs, test-benchmarks, test-core-layers, test-python, code-quality, build-validation, gradient-tests, test-data-utilities, test-metrics]
    runs-on: ubuntu-latest
    if: always()
    name: "Test Report"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download all test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: all-results/
          pattern: "test-results-*"  # Only download test result artifacts, not build artifacts
          merge-multiple: false
          run-id: ${{ github.run_id }}  # Only artifacts from this specific run

      - name: Generate combined report
        run: |
          echo "# 🧪 Comprehensive Test Results" > test-report.md
          echo "" >> test-report.md
          echo "**Workflow Run**: [\`${{ github.run_number }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> test-report.md
          echo "**Commit**: \`${{ github.sha }}\`" >> test-report.md
          echo "**Date**: $(date -Iseconds)" >> test-report.md
          echo "" >> test-report.md

          total_groups=0
          passed_groups=0
          failed_groups=0
          total_tests=0
          total_passed=0
          total_failed=0
          total_duration=0

          echo "## Test Groups" >> test-report.md
          echo "" >> test-report.md
          echo "| Group | Tests | Passed | Failed | Duration |" >> test-report.md
          echo "|-------|-------|--------|--------|----------|" >> test-report.md

          # Process each result file
          for result_dir in all-results/test-results-*; do
            if [ -d "$result_dir" ]; then
              for json_file in "$result_dir"/*.json; do
                if [ -f "$json_file" ]; then
                  total_groups=$((total_groups + 1))

                  group=$(jq -r '.group' "$json_file" 2>/dev/null || echo "Unknown")
                  tests=$(jq -r '.tests' "$json_file" 2>/dev/null || echo "0")
                  passed=$(jq -r '.passed' "$json_file" 2>/dev/null || echo "0")
                  failed=$(jq -r '.failed' "$json_file" 2>/dev/null || echo "0")
                  duration=$(jq -r '.duration' "$json_file" 2>/dev/null || echo "0")

                  total_tests=$((total_tests + tests))
                  total_passed=$((total_passed + passed))
                  total_failed=$((total_failed + failed))
                  total_duration=$((total_duration + duration))

                  if [ "$failed" -gt 0 ]; then
                    failed_groups=$((failed_groups + 1))
                    status="❌"
                  else
                    passed_groups=$((passed_groups + 1))
                    status="✅"
                  fi

                  echo "| $status $group | $tests | $passed | $failed | ${duration}s |" >> test-report.md
                fi
              done
            fi
          done

          echo "" >> test-report.md
          echo "## Summary" >> test-report.md
          echo "" >> test-report.md
          echo "| Metric | Value |" >> test-report.md
          echo "|--------|-------|" >> test-report.md
          echo "| Total Test Groups | $total_groups |" >> test-report.md
          echo "| Passed Groups | $passed_groups |" >> test-report.md
          echo "| Failed Groups | $failed_groups |" >> test-report.md
          echo "| Total Tests | $total_tests |" >> test-report.md
          echo "| Passed Tests | $total_passed |" >> test-report.md
          echo "| Failed Tests | $total_failed |" >> test-report.md
          echo "| Total Duration | ${total_duration}s |" >> test-report.md

          if [ $total_tests -gt 0 ]; then
            pass_rate=$(echo "scale=1; $total_passed * 100 / $total_tests" | bc 2>/dev/null || echo "0")
            echo "| Pass Rate | ${pass_rate}% |" >> test-report.md
          fi

          echo "" >> test-report.md

          if [ $total_failed -eq 0 ]; then
            echo "✅ **All tests passed!**" >> test-report.md
          else
            echo "❌ **Some tests failed. See details above.**" >> test-report.md
          fi

          # Include code quality if available
          if [ -f "all-results/code-quality-reports/complexity.md" ]; then
            echo "" >> test-report.md
            echo "---" >> test-report.md
            echo "" >> test-report.md
            echo "## 📈 Code Quality" >> test-report.md
            cat "all-results/code-quality-reports/complexity.md" >> test-report.md
          fi

          # Display report
          cat test-report.md

      - name: Upload combined report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: comprehensive-test-report
          path: test-report.md
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/pr-comment
        with:
          report-file: test-report.md
          comment-marker: "\U0001F9EA Comprehensive Test Results"

      - name: Fail if any tests failed
        run: |
          # Check if any test groups failed
          failed=0
          for result_dir in all-results/test-results-*; do
            if [ -d "$result_dir" ]; then
              for json_file in "$result_dir"/*.json; do
                if [ -f "$json_file" ]; then
                  failed_count=$(jq -r '.failed' "$json_file" 2>/dev/null || echo "0")
                  if [ "$failed_count" -gt 0 ]; then
                    failed=1
                    break
                  fi
                fi
              done
            fi
          done

          if [ $failed -eq 1 ]; then
            echo "❌ FAIL: Some tests failed. See test report for details."
            exit 1
          else
            echo "✅ All tests passed!"
            exit 0
          fi
