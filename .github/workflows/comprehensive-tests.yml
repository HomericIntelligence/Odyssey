name: Comprehensive Tests

# Unified test workflow combining comprehensive tests with quality metrics
# Runs ALL tests (Mojo and Python) with metrics collection and quality analysis
# Also covers: build-validation, test-gradients, test-data-utilities, coverage
# Target duration: < 15 minutes (parallelized across test groups)

on:
  # Run on all pull requests
  pull_request:

  # Run on pushes to main
  push:
    branches:
      - main

  # Allow manual runs with extended options
  workflow_dispatch:
    inputs:
      run_extended:
        description: 'Run extended analysis (SIMD, complexity)'
        required: false
        default: false
        type: boolean
      enable_gdb_cores:
        description: 'Capture gdb core dumps for libKGEN JIT crashes (modular/modular#6413)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write  # For PR comments

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ============================================================================
  # Mojo Syntax Validation - Catch deprecated patterns early
  # ============================================================================
  mojo-syntax-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: "Mojo Syntax Validation"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Check for deprecated List[Type](args) pattern
        run: |
          echo "=================================================="
          echo "Checking for deprecated List[Type](args) pattern..."
          echo "=================================================="

          # Search for deprecated pattern (any type)
          if grep -rE "List\[.*\]\([0-9]" --include="*.mojo" src/projectodyssey/ tests/ examples/ benchmarks/ scripts/ 2>/dev/null; then
            echo ""
            echo "❌ FAILED: Found deprecated List[Type](args) syntax"
            echo ""
            echo "The variadic List constructor does not exist in Mojo."
            echo "Use list literals instead: var shape = [3, 4, 5]"
            echo ""
            echo "See: https://docs.modular.com/mojo/manual/types#list"
            echo "See: CLAUDE.md section 'List Initialization'"
            exit 1
          else
            echo ""
            echo "✅ PASSED: No deprecated List constructor patterns found"
          fi

      - name: Check for deprecated backward result alias names
        run: |
          echo "============================================================"
          echo "Checking for deprecated backward result alias names..."
          echo "============================================================"

          # The 8 deprecated type aliases removed in #3059/#3267.
          # They must not reappear in src/projectodyssey/ or tests/.
          PATTERN='LinearBackwardResult\|LinearNoBiasBackwardResult\|Conv2dBackwardResult\|Conv2dNoBiasBackwardResult\|DepthwiseConv2dBackwardResult\|DepthwiseConv2dNoBiasBackwardResult\|DepthwiseSeparableConv2dBackwardResult\|DepthwiseSeparableConv2dNoBiasBackwardResult'

          # Two-phase grep: broad scan, then exclude comment-only lines and docstrings.
          if grep -rn "$PATTERN" src/projectodyssey/ tests/ --include='*.mojo' 2>/dev/null \
               | grep -v '^\s*#' \
               | grep -v '^\s*"""' \
               | grep -q .; then
            echo ""
            echo "::error::Deprecated alias names detected in src/projectodyssey/ or tests/"
            grep -rn "$PATTERN" src/projectodyssey/ tests/ --include='*.mojo' 2>/dev/null \
              | grep -v '^\s*#' \
              | grep -v '^\s*"""'
            echo ""
            echo "FAILED: The above deprecated type aliases were removed in #3059."
            echo "Use the replacement struct names directly (e.g., LinearGradients)."
            exit 1
          else
            echo ""
            echo "PASSED: No deprecated backward result alias names found"
          fi

  # ============================================================================
  # Mojo Package Compilation Check - Verify src/projectodyssey package compiles
  # This runs BEFORE tests to catch compilation errors early
  # ============================================================================
  mojo-compilation:
    needs: [mojo-syntax-check]
    runs-on: ubuntu-latest
    # 30 min: `just ci-build` now actually compiles 46 example/benchmark
    # binaries in addition to the src/projectodyssey package (#5389). Previously this
    # was a 1-file no-op, so 10 min was sufficient.
    timeout-minutes: 30
    name: "Mojo Package Compilation"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Build and validate Mojo packages
        run: |
          echo "=================================================="
          echo "Building and validating Mojo packages..."
          echo "=================================================="

          just ci-build

          mkdir -p compilation-results
          total_files=$(find src/projectodyssey -name "*.mojo" -type f | wc -l)
          echo "Total .mojo files in src/projectodyssey/: $total_files"
          echo "✅ CI build validation succeeded"
          echo "compilation_status=success" >> $GITHUB_ENV

          cat > compilation-results/summary.txt << EOF
          Mojo Compilation Check
          ======================
          Total .mojo files: $total_files
          Status: success
          EOF

      - name: Upload compilation results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: mojo-compilation-results
          path: compilation-results/
          retention-days: 7

  # ============================================================================
  # Example backward-pass tests - RUN (not just compile) the hand-written
  # backward passes so a numerically-wrong gradient is caught, not just a
  # syntax error. These live under examples/<model>/ and are excluded from the
  # src coverage validator, so without this job they would execute nowhere.
  # Synthetic data only (no dataset download); ~a few minutes.
  # ============================================================================
  example-backward-tests:
    needs: [mojo-compilation]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: "Example Backward Tests"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Run example backward-pass tests
        run: just test-example-backward

  # ============================================================================
  # Training Smoke (ADR-014, #5551) - assert each training entrypoint's MECHANISM
  # works: runs a few bounded batches on synthetic data (--smoke, no dataset
  # download) to exit 0 and emit >=2 finite parseable full-precision loss lines.
  # NOT a convergence check. One job per model via a matrix so wall-clock stays
  # low (each entry AOT-compiles + runs independently, in parallel).
  # ============================================================================
  training-smoke:
    needs: [mojo-compilation]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: "Training Smoke (${{ matrix.example }}/${{ matrix.entry }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { example: resnet18_cifar10,   entry: train.mojo }
          - { example: resnet18_cifar10,   entry: train_autograd.mojo }
          - { example: googlenet_cifar10,  entry: train.mojo }
          - { example: googlenet_cifar10,  entry: train_autograd.mojo }
          - { example: vgg16_cifar10,      entry: train.mojo }
          - { example: vgg16_cifar10,      entry: train_autograd.mojo }
          - { example: mobilenetv1_cifar10, entry: train.mojo }
          - { example: mobilenetv1_cifar10, entry: train_autograd.mojo }
          - { example: alexnet_cifar10,    entry: run_train.mojo }
          - { example: alexnet_cifar10,    entry: run_train_autograd.mojo }
          - { example: mnist,              entry: train.mojo }
          - { example: mnist,              entry: train_autograd.mojo }
          - { example: lenet_emnist,       entry: train.mojo }
          - { example: lenet_emnist,       entry: run_train.mojo }

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Run training smoke (synthetic, bounded)
        run: just training-smoke-one ${{ matrix.example }} ${{ matrix.entry }}

  # ============================================================================
  # Test Coverage Validation - Ensure all tests are discovered
  # ============================================================================
  validate-test-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: "Test Coverage Validation"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml "homericintelligence-hephaestus>=0.9.0,<1"

      - name: Validate test coverage
        id: validation
        run: |
          python scripts/validate_test_coverage.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Post validation report to PR
        if: github.event_name == 'pull_request' && steps.validation.outputs.exit_code != '0'
        run: |
          python scripts/validate_test_coverage.py --post-pr

      - name: Fail if validation failed
        if: steps.validation.outputs.exit_code != '0'
        run: |
          echo "Test coverage validation failed. See PR comment for details."
          exit 1

      - name: Check source-to-test mapping (warn-only)
        # The script is warn-only by design: it always exits 0 after printing the
        # source-to-test mapping report (see scripts/check_source_coverage.py).
        # No `|| true` suppression is needed — and it is forbidden by the
        # forbid-suppressions required check (HomericIntelligence/Odysseus#280).
        run: python scripts/check_source_coverage.py

  # ============================================================================
  # Audit Shared Links - Verify .claude/shared/ files are documented in CLAUDE.md
  # ============================================================================
  audit-shared-links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: "Audit Shared Links"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "homericintelligence-hephaestus>=0.9.0,<1"

      - name: Audit src/projectodyssey links in CLAUDE.md
        run: |
          python scripts/audit_shared_links.py

  # ============================================================================
  # Dependency Sync Validation - pixi.toml is single source of truth
  # ============================================================================
  validate-dep-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: "Dependency Sync Validation"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - name: Install hephaestus
        run: pip install "homericintelligence-hephaestus>=0.9.0,<1"

      - name: Validate dependency consistency
        run: python scripts/check_dep_sync.py

  # ============================================================================
  # Comprehensive Mojo Test Suite - Parallelized by Test Group
  # ============================================================================
  test-mojo-comprehensive:
    needs: [mojo-compilation, validate-test-coverage]
    runs-on: ubuntu-latest
    # Fanned out into 6 parallel matrix jobs (one per `group`). modular/modular#6433
    # — Mojo's unconditional ~3.6 GB virtual address reservation per invocation —
    # was fixed upstream and confirmed in the nightly the project is pinned to
    # (1.0.0b2.dev2026050805, postdates JoeLoser's fix in modular@99c4bfc9d6).
    # Each matrix entry is its own GHA runner, so virtual-address contention
    # between jobs is impossible; within one runner this fan-out tests whether
    # the per-process reservation is now small enough that this no longer matters.
    # If JIT crashes return (modular/modular#6413), investigate via local
    # repro per docs/dev/mojo-jit-crash-capture-core.md; modular/modular#6433
    # returning would manifest as OOM kills, not libKGEN signals.
    timeout-minutes: 60
    name: "Comprehensive Mojo Tests"
    env:
      # Route mojo test invocations through gdb to intercept the in-process
      # SIGABRT handler in libKGEN (modular/modular#6413) before it swallows
      # the crash. Without gdb, the kernel never generates a core because the
      # process handles SIGABRT itself and exits cleanly.
      # Set to "0" locally to skip gdb overhead (default when unset).
      MOJO_TEST_UNDER_GDB: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_gdb_cores) && '1' || '0' }}
      CRASH_BUNDLE_DIR: /workspace/crash-bundle/cores

    strategy:
      fail-fast: false
      matrix:
        group:
          - core-tensors-loss
          - core-gradient-utils
          - data
          - autograd-tensor-base
          - models-misc
          - integration-bench

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Memory snapshot
        run: |
          echo "=== Available memory ==="
          free -h
          echo "ulimit -v: $(ulimit -v 2>/dev/null || echo unlimited)"
          echo "Group: ${{ matrix.group }}"

      - name: mkdir test-results
        run: mkdir -p test-results

      # Each test invocation is its own step (gated by matrix.group) so that
      # scripts/validate_test_coverage.py — which scans `run:` blocks for
      # `just test-group` literals — can see every (path, pattern) pair.

      # ---------- core-tensors-loss ----------
      - name: "Core Tensors"
        if: matrix.group == 'core-tensors-loss'
        run: |
          just test-group "tests/projectodyssey/core" \
            "test_tensors*.mojo test_arithmetic*.mojo test_broadcasting*.mojo \
             test_shape*.mojo test_creation*.mojo test_reduction*.mojo \
             test_matrix*.mojo test_matmul*.mojo test_strassen.mojo \
             test_pooling*.mojo test_properties*.mojo test_high_dimensional*.mojo \
             test_slicing*.mojo test_elementwise*.mojo test_comparison_ops*.mojo \
             test_edge_cases*.mojo test_concatenate*.mojo test_reshape*.mojo"

      - name: "Core Activations & Types"
        if: matrix.group == 'core-tensors-loss'
        run: |
          just test-group "tests/projectodyssey/core" \
            "test_activation*.mojo test_advanced_activations*.mojo \
             test_dtype_dispatch*.mojo test_dtype_ordinal*.mojo"

      - name: "Core Loss"
        if: matrix.group == 'core-tensors-loss'
        run: |
          just test-group "tests/projectodyssey/core" \
            "test_losses.mojo test_loss_funcs*.mojo test_loss_utils.mojo"

      # ---------- core-gradient-utils ----------
      - name: "Core Gradient"
        if: matrix.group == 'core-gradient-utils'
        run: |
          just test-group "tests/projectodyssey/core" \
            "test_backward*.mojo test_gradient*.mojo \
             test_variable_backward*.mojo test_depthwise_conv*.mojo"

      - name: "Core Utilities A"
        if: matrix.group == 'core-gradient-utils'
        run: |
          just test-group "tests/projectodyssey/core" \
            "test_utilities*.mojo test_utility*.mojo test_utils*.mojo \
             test_validation*.mojo test_integration*.mojo test_inplace*.mojo \
             test_lazy*.mojo test_constants*.mojo test_hash*.mojo \
             test_setitem_view*.mojo test_int_bitwise*.mojo \
             test_uint_bitwise*.mojo test_unsigned*.mojo \
             test_normalize_slice*.mojo test_jit_crash*.mojo"

      - name: "Core Utilities B"
        if: matrix.group == 'core-gradient-utils'
        run: just test-group "tests/projectodyssey/core" "test_extensor_*.mojo"

      - name: "Core Utilities C"
        if: matrix.group == 'core-gradient-utils'
        run: |
          just test-group "tests/projectodyssey/core" \
            "test_memory_pool*.mojo test_memory_leaks*.mojo \
             test_initializers*.mojo test_module*.mojo test_sequential*.mojo \
             test_composed_op*.mojo test_dropout*.mojo"

      - name: "Core Utilities D"
        if: matrix.group == 'core-gradient-utils'
        run: |
          just test-group "tests/projectodyssey/core" \
            "test_utilities*.mojo test_utility*.mojo test_utils*.mojo \
             test_validation*.mojo test_integration*.mojo test_inplace*.mojo \
             test_lazy*.mojo test_memory_pool*.mojo test_constants*.mojo \
             test_extensor_*.mojo test_setitem_view*.mojo \
             test_memory_leaks*.mojo test_initializers*.mojo \
             test_layers*.mojo test_linear*.mojo test_conv*.mojo \
             test_normalization*.mojo test_dropout*.mojo test_module*.mojo \
             test_composed_op*.mojo test_hash*.mojo test_sequential*.mojo \
             test_int_bitwise*.mojo test_uint_bitwise*.mojo \
             test_unsigned*.mojo test_normalize_slice*.mojo \
             test_jit_crash*.mojo test_numerical_safety_simd*.mojo \
             test_numerical_safety_dtype_dispatch*.mojo"

      # ---------- data ----------
      - name: "Data Core"
        if: matrix.group == 'data'
        run: just test-group "tests/projectodyssey/data" "test_*.mojo"

      - name: "Data Datasets"
        if: matrix.group == 'data'
        run: just test-group "tests/projectodyssey/data/datasets" "test_*.mojo"

      - name: "Data Loaders"
        if: matrix.group == 'data'
        run: just test-group "tests/projectodyssey/data/loaders" "test_*.mojo"

      - name: "Data Transforms"
        if: matrix.group == 'data'
        run: just test-group "tests/projectodyssey/data/transforms" "test_*.mojo"

      - name: "Data Samplers"
        if: matrix.group == 'data'
        run: just test-group "tests/projectodyssey/data/samplers" "test_*.mojo"

      - name: "Data Formats"
        if: matrix.group == 'data'
        run: just test-group "tests/projectodyssey/data/formats" "test_*.mojo"

      # ---------- autograd-tensor-base ----------
      - name: "Autograd"
        if: matrix.group == 'autograd-tensor-base'
        run: just test-group "tests/projectodyssey/autograd" "test_*.mojo"

      - name: "Tensor"
        if: matrix.group == 'autograd-tensor-base'
        run: just test-group "tests/projectodyssey/tensor" "test_*.mojo"

      - name: "Base"
        if: matrix.group == 'autograd-tensor-base'
        run: just test-group "tests/projectodyssey/base" "test_*.mojo"

      # ---------- shampoo-optimizer (named for explicit failure attribution) ----------
      - name: "Shampoo Optimizer"
        if: matrix.group == 'autograd-tensor-base'
        run: |
          just test-group "tests/projectodyssey/training/optimizers" \
            "test_shampoo.mojo"

      - name: "Shared Infra & Testing"
        if: matrix.group == 'autograd-tensor-base'
        run: |
          just test-group "tests/projectodyssey" \
            "test_imports*.mojo test_data_generators.mojo \
             test_model_utils.mojo test_serialization.mojo \
             utils/test_*.mojo fixtures/test_*.mojo \
             training/test_*.mojo training/optimizers/test_*.mojo \
             testing/test_*.mojo"

      # ---------- models-misc ----------
      - name: "Models"
        if: matrix.group == 'models-misc'
        run: just test-group "tests/models" "test_*.mojo"

      - name: "Misc Tests"
        if: matrix.group == 'models-misc'
        run: |
          just test-group "tests" \
            "test_*.mojo training/test_*.mojo unit/test_*.mojo \
             integration/test_*.mojo helpers/test_*.mojo \
             tooling/benchmarks/test_*.mojo projectodyssey/fuzz/test_*.mojo"

      - name: "Examples"
        if: matrix.group == 'models-misc'
        run: just test-group "tests/examples" "test_*.mojo"

      - name: "Core Types & Fuzz"
        if: matrix.group == 'models-misc'
        run: just test-group "tests/core/types" "test_*.mojo"

      # ---------- integration-bench ----------
      - name: "Benchmarking"
        if: matrix.group == 'integration-bench'
        run: just test-group "tests/projectodyssey/benchmarking" "test_*.mojo"

      - name: "Integration Tests"
        if: matrix.group == 'integration-bench'
        run: just test-group "tests/projectodyssey/integration" "test_*.mojo"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-results-comprehensive-${{ matrix.group }}
          path: test-results/
          retention-days: 7

  # ============================================================================
  # Configs Tests
  # ============================================================================
  # NOTE: previously had a single-element matrix as a #6433 workaround placeholder.
  # That workaround was removed once modular/modular#6433 was fixed upstream
  # (confirmed in the Mojo nightly pinned in pixi.toml).
  # `test-mojo-comprehensive` above now provides the real `matrix:` /
  # `fail-fast:` literals required by the workflow-property smoke tests.
  test-configs:
    needs: [mojo-compilation, validate-test-coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Configs"
    env:
      MOJO_TEST_UNDER_GDB: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_gdb_cores) && '1' || '0' }}
      CRASH_BUNDLE_DIR: /workspace/crash-bundle/cores

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Run Configs tests
        run: just test-group tests/configs "test_*.mojo"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-results-Configs
          path: test-results/
          retention-days: 7

  # ============================================================================
  # NOTE: Training tests moved to weekly workflow (requires dataset downloads)
  # ============================================================================

  # ============================================================================
  # Benchmarks Tests
  # ============================================================================
  test-benchmarks:
    needs: [mojo-compilation, validate-test-coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Benchmarks"
    env:
      MOJO_TEST_UNDER_GDB: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_gdb_cores) && '1' || '0' }}
      CRASH_BUNDLE_DIR: /workspace/crash-bundle/cores

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Run Benchmarks tests
        run: just test-group tests/projectodyssey/benchmarks "bench_*.mojo"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-results-Benchmarks
          path: test-results/
          retention-days: 7

  # ============================================================================
  # Core Layers Tests
  # ============================================================================
  test-core-layers:
    needs: [mojo-compilation, validate-test-coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Core Layers"
    env:
      MOJO_TEST_UNDER_GDB: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_gdb_cores) && '1' || '0' }}
      CRASH_BUNDLE_DIR: /workspace/crash-bundle/cores

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Run Core Layers tests
        run: just test-group tests/projectodyssey/core/layers "test_*.mojo"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-results-Core-Layers
          path: test-results/
          retention-days: 7

  # ============================================================================
  # Python Tests
  # ============================================================================
  test-python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: "Python Tests"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "homericintelligence-hephaestus>=0.9.0,<1" pytest pytest-cov pytest-timeout

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Install hephaestus
        run: pip install "homericintelligence-hephaestus>=0.9.0,<1"

      - name: Run Python tests
        run: |
          mkdir -p test-results

          # Collect all Python test paths
          TEST_PATHS=""

          # Unit tests
          if [ -d "tests/unit" ] && [ -n "$(find tests/unit -name 'test_*.py' 2>/dev/null)" ]; then
            TEST_PATHS="$TEST_PATHS tests/unit/"
          fi
          # Claude hook tests
          if [ -d "tests/claude" ] && [ -n "$(find tests/claude -name 'test_*.py' 2>/dev/null)" ]; then
            TEST_PATHS="$TEST_PATHS tests/claude/"
          fi

          # Integration tests (agents, foundation)
          [ -f "tests/agents/test_integration.py" ] && TEST_PATHS="$TEST_PATHS tests/agents/test_integration.py"
          [ -f "tests/foundation/test_structure_integration.py" ] && TEST_PATHS="$TEST_PATHS tests/foundation/test_structure_integration.py"

          start_time=$(date +%s)
          if [ -n "$TEST_PATHS" ]; then
            echo "Running Python tests from: $TEST_PATHS"
            if pytest $TEST_PATHS --verbose --timeout=300 --maxfail=5; then
              end_time=$(date +%s)
              duration=$((end_time - start_time))
              echo '{"group": "Python Tests", "tests": 1, "passed": 1, "failed": 0, "duration": '"$duration"'}' > test-results/Python-Tests.json
            else
              end_time=$(date +%s)
              duration=$((end_time - start_time))
              echo '{"group": "Python Tests", "tests": 1, "passed": 0, "failed": 1, "duration": '"$duration"'}' > test-results/Python-Tests.json
              exit 1
            fi
          else
            echo "⚠️  No Python tests found yet"
            echo '{"group": "Python Tests", "tests": 0, "passed": 0, "failed": 0, "duration": 0}' > test-results/Python-Tests.json
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-results-Python-Tests
          path: test-results/
          retention-days: 7

  # ============================================================================
  # Code Quality Analysis
  # ============================================================================
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: "Code Quality Analysis"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install analysis tools
        run: |
          pip install radon lizard

      - name: Analyze code metrics
        run: |
          echo "=================================================="
          echo "Code Quality Analysis"
          echo "=================================================="

          mkdir -p quality-reports

          # Python complexity analysis
          echo "## Python Code Complexity" > quality-reports/complexity.md
          echo "" >> quality-reports/complexity.md
          echo "Functions with complexity > 10 (consider refactoring):" >> quality-reports/complexity.md
          echo '```' >> quality-reports/complexity.md
          radon cc scripts/ -a -nc 2>/dev/null || echo "No complex functions found"
          echo '```' >> quality-reports/complexity.md

          # Mojo code statistics
          echo "" >> quality-reports/complexity.md
          echo "## Mojo Code Statistics" >> quality-reports/complexity.md
          echo "" >> quality-reports/complexity.md

          total_mojo_files=$(find src/projectodyssey tests -name "*.mojo" 2>/dev/null | wc -l)
          total_mojo_lines=$(find src/projectodyssey tests -name "*.mojo" -exec cat {} \; 2>/dev/null | wc -l)
          total_functions=$(grep -r "^fn " src/projectodyssey tests --include="*.mojo" 2>/dev/null | wc -l)
          total_structs=$(grep -r "^struct " src/projectodyssey tests --include="*.mojo" 2>/dev/null | wc -l)

          cat >> quality-reports/complexity.md << EOF
          | Metric | Count |
          |--------|-------|
          | Mojo Files | $total_mojo_files |
          | Lines of Code | $total_mojo_lines |
          | Functions (fn) | $total_functions |
          | Structs | $total_structs |
          EOF

          # Technical debt markers
          echo "" >> quality-reports/complexity.md
          echo "## Technical Debt Markers" >> quality-reports/complexity.md
          echo "" >> quality-reports/complexity.md

          todo_count=$(grep -r "TODO" src/projectodyssey tests scripts --include="*.mojo" --include="*.py" 2>/dev/null | wc -l)
          fixme_count=$(grep -r "FIXME" src/projectodyssey tests scripts --include="*.mojo" --include="*.py" 2>/dev/null | wc -l)

          cat >> quality-reports/complexity.md << EOF
          | Marker | Count |
          |--------|-------|
          | TODO | $todo_count |
          | FIXME | $fixme_count |
          EOF

          cat quality-reports/complexity.md

      - name: Upload quality reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: code-quality-reports
          path: quality-reports/
          retention-days: 30

  # ============================================================================
  # SIMD Analysis (Extended - manual trigger only)
  # ============================================================================
  simd-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: "SIMD Analysis"
    if: github.event_name == 'workflow_dispatch' && inputs.run_extended == true

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Analyze SIMD usage
        run: |
          echo "=================================================="
          echo "SIMD Usage Analysis"
          echo "=================================================="

          mkdir -p simd-reports

          simd_count=$(grep -r "SIMD\[" src/projectodyssey --include="*.mojo" 2>/dev/null | wc -l)
          vectorize_count=$(grep -r "vectorize" src/projectodyssey --include="*.mojo" 2>/dev/null | wc -l)
          parallelize_count=$(grep -r "parallelize" src/projectodyssey --include="*.mojo" 2>/dev/null | wc -l)

          cat > simd-reports/analysis.md << EOF
          # SIMD Optimization Analysis

          ## Current Usage

          | Pattern | Count |
          |---------|-------|
          | SIMD[] declarations | $simd_count |
          | vectorize() calls | $vectorize_count |
          | parallelize() calls | $parallelize_count |

          ## Files with heavy loop usage (optimization candidates)
          EOF

          echo '```' >> simd-reports/analysis.md
          grep -rl "for .* in range" src/projectodyssey --include="*.mojo" 2>/dev/null | \
            xargs -I{} sh -c 'echo "{}": $(grep -c "for .* in range" "{}")' 2>/dev/null | \
            sort -t: -k2 -nr | head -10 >> simd-reports/analysis.md || echo "None found"
          echo '```' >> simd-reports/analysis.md

          cat simd-reports/analysis.md

      - name: Upload SIMD analysis
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: simd-analysis
          path: simd-reports/
          retention-days: 30

  # ============================================================================
  # Build Validation (absorbed from build-validation.yml)
  # ============================================================================
  build-validation:
    needs: [mojo-syntax-check]
    runs-on: ubuntu-latest
    # 30 min: `just build` + `just package` now compile the full src/projectodyssey
    # package and 46 example/benchmark binaries (#5389). Previously the
    # build recipe was a 1-file no-op, so 10 min was sufficient.
    timeout-minutes: 30
    name: "Build Validation"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Build project
        run: just build

      - name: Validate package
        run: just package

  # ============================================================================
  # Gradient Checking Tests (absorbed from test-gradients.yml)
  # ============================================================================
  gradient-tests:
    needs: [mojo-compilation]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Gradient Checking Tests"
    env:
      MOJO_TEST_UNDER_GDB: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_gdb_cores) && '1' || '0' }}
      CRASH_BUNDLE_DIR: /workspace/crash-bundle/cores

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Run gradient checking tests
        run: |
          mkdir -p test-results
          start_time=$(date +%s)
          test_result="failed"
          exit_code=1

          if just test-group "tests/projectodyssey/core" "test_gradient_checking_basic.mojo test_gradient_checking_dtype.mojo"; then
            test_result="passed"
            exit_code=0
          fi

          end_time=$(date +%s)
          duration=$((end_time - start_time))

          cat > "test-results/Gradient-Checking-Tests.json" << EOF
          {
            "group": "Gradient Checking Tests",
            "tests": 1,
            "passed": $([ "$test_result" = "passed" ] && echo 1 || echo 0),
            "failed": $([ "$test_result" = "failed" ] && echo 1 || echo 0),
            "duration": $duration
          }
          EOF

          exit $exit_code

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-results-Gradient-Checking-Tests
          path: test-results/
          retention-days: 7

      - name: Check test results
        if: failure()
        run: |
          echo "❌ Gradient checking tests FAILED!"
          echo "One or more backward passes produce incorrect gradients."
          echo "Review the test output above for details."
          exit 1

      - name: Success message
        if: success()
        run: |
          echo "✅ All gradient checks PASSED!"
          echo "All backward passes produce correct gradients."

  # ============================================================================
  # Gradient Coverage Report (absorbed from test-gradients.yml)
  # ============================================================================
  gradient-coverage:
    needs: [gradient-tests]
    runs-on: ubuntu-latest
    if: always()  # Run even when gradient-tests fails/skips — required status check must complete
    name: "Gradient Coverage Report"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Check backward pass coverage
        run: |
          echo "Checking gradient test coverage..."

          # Guard: if gradient tests failed/skipped, report gracefully instead of failing
          if [ "${{ needs.gradient-tests.result }}" != "success" ]; then
            echo "Gradient tests did not succeed (result: ${{ needs.gradient-tests.result }})"
            echo "Skipping coverage calculation — no reliable test data available."
            exit 0
          fi

          # Find all *_backward functions
          BACKWARD_FUNCS=$(grep -r "fn.*_backward" src/projectodyssey/core --include="*.mojo" | wc -l)

          # Find all gradient tests
          GRADIENT_TESTS=$(grep -r "test.*gradient" tests/projectodyssey/core/test_gradient_checking_basic.mojo tests/projectodyssey/core/test_gradient_checking_dtype.mojo | wc -l)

          echo "Backward functions found: $BACKWARD_FUNCS"
          echo "Gradient tests found: $GRADIENT_TESTS"

          # Calculate coverage percentage
          if [ $BACKWARD_FUNCS -gt 0 ]; then
            COVERAGE=$((GRADIENT_TESTS * 100 / BACKWARD_FUNCS))
            echo "Gradient test coverage: $COVERAGE%"

            if [ $COVERAGE -lt 80 ]; then
              echo "Warning: Gradient test coverage is below 80%"
              echo "Consider adding more gradient checking tests."
            else
              echo "Good gradient test coverage!"
            fi
          fi

  # ============================================================================
  # Data Utilities Tests (absorbed from test-data-utilities.yml)
  # ============================================================================
  test-data-utilities:
    needs: [mojo-compilation]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Data Utilities Test Suite"
    env:
      MOJO_TEST_UNDER_GDB: ${{ (github.event_name == 'workflow_dispatch' && inputs.enable_gdb_cores) && '1' || '0' }}
      CRASH_BUNDLE_DIR: /workspace/crash-bundle/cores

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Check if test files exist
        id: check-tests
        run: |
          mkdir -p test-results
          echo "start_time=$(date +%s)" >> $GITHUB_ENV
          if [ -d "tests/projectodyssey/data" ]; then
            echo "tests_exist=true" >> $GITHUB_OUTPUT
          else
            echo "tests_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Dataset Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          just test-group "tests/projectodyssey/data/datasets" "test_base_dataset.mojo test_tensor_dataset.mojo"

      - name: Run Loader Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          just test-group "tests/projectodyssey/data/loaders" "test_base_loader.mojo"

      - name: Run Transform Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          just test-group "tests/projectodyssey/data/transforms" "test_pipeline.mojo"

      - name: Run Sampler Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          just test-group "tests/projectodyssey/data/samplers" "test_sequential.mojo"

      - name: Run All Data Tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          just test-group "tests/projectodyssey/data" "run_all_tests.mojo"

      - name: Run File I/O Tests (includes remove_safely)
        run: |
          just test-group "tests/projectodyssey/utils" "test_io.mojo"

      - name: Report Results
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          TESTS_EXIST: ${{ steps.check-tests.outputs.tests_exist }}
        run: |
          end_time=$(date +%s)
          duration=$((end_time - start_time))

          if [ "$JOB_STATUS" = "success" ]; then
            test_result="passed"
          else
            test_result="failed"
          fi

          cat > "test-results/Data-Utilities.json" << EOF
          {
            "group": "Data Utilities",
            "tests": 1,
            "passed": $([ "$test_result" = "passed" ] && echo 1 || echo 0),
            "failed": $([ "$test_result" = "failed" ] && echo 1 || echo 0),
            "duration": $duration
          }
          EOF

          if [ "$TESTS_EXIST" = "true" ]; then
            echo "Data utilities test suite completed"
            echo "Check individual test outputs above for details"
          else
            echo "⚠️  Data utilities tests not yet implemented"
            echo "This workflow will run once tests/projectodyssey/data/ tests are created"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-results-Data-Utilities
          path: test-results/
          retention-days: 7

  # ============================================================================
  # Test Metrics / Coverage (absorbed from coverage.yml)
  # ============================================================================
  test-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: "Test Metrics"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "homericintelligence-hephaestus>=0.9.0,<1"

      - name: Generate test metrics (JSON)
        run: |
          python scripts/generate_test_metrics.py --output metrics.json --format json

      - name: Generate test metrics (Markdown)
        run: |
          python scripts/generate_test_metrics.py --output metrics.md --format markdown

      - name: Display metrics
        run: cat metrics.md

      - name: Upload metrics artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: test-metrics
          path: |
            metrics.json
            metrics.md
          retention-days: 90

      - name: Build PR comment report
        if: github.event_name == 'pull_request'
        run: python scripts/build_pr_comment.py --metrics-file metrics.md --output-file metrics-pr-comment.md

      - name: Comment on PR with metrics
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/pr-comment
        with:
          report-file: metrics-pr-comment.md
          comment-marker: "Test Metrics Report"

  # ============================================================================
  # Combined Test Report with Metrics
  # ============================================================================
  test-report:
    needs: [mojo-compilation, validate-test-coverage, audit-shared-links, test-mojo-comprehensive, test-configs, test-benchmarks, test-core-layers, test-python, code-quality, build-validation, gradient-tests, test-data-utilities, test-metrics]
    runs-on: ubuntu-latest
    if: always()
    name: "Test Report"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Download all test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: all-results/
          pattern: "test-results-*"  # Only download test result artifacts, not build artifacts
          merge-multiple: false
          run-id: ${{ github.run_id }}  # Only artifacts from this specific run

      - name: Generate combined report
        run: |
          echo "# 🧪 Comprehensive Test Results" > test-report.md
          echo "" >> test-report.md
          echo "**Workflow Run**: [\`${{ github.run_number }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> test-report.md
          echo "**Commit**: \`${{ github.sha }}\`" >> test-report.md
          echo "**Date**: $(date -Iseconds)" >> test-report.md
          echo "" >> test-report.md

          total_groups=0
          passed_groups=0
          failed_groups=0
          total_tests=0
          total_passed=0
          total_failed=0
          total_duration=0

          echo "## Test Groups" >> test-report.md
          echo "" >> test-report.md
          echo "| Group | Tests | Passed | Failed | Duration |" >> test-report.md
          echo "|-------|-------|--------|--------|----------|" >> test-report.md

          # Process each result file
          for result_dir in all-results/test-results-*; do
            if [ -d "$result_dir" ]; then
              for json_file in "$result_dir"/*.json; do
                if [ -f "$json_file" ]; then
                  total_groups=$((total_groups + 1))

                  group=$(jq -r '.group' "$json_file" 2>/dev/null || echo "Unknown")
                  tests=$(jq -r '.tests' "$json_file" 2>/dev/null || echo "0")
                  passed=$(jq -r '.passed' "$json_file" 2>/dev/null || echo "0")
                  failed=$(jq -r '.failed' "$json_file" 2>/dev/null || echo "0")
                  duration=$(jq -r '.duration' "$json_file" 2>/dev/null || echo "0")

                  total_tests=$((total_tests + tests))
                  total_passed=$((total_passed + passed))
                  total_failed=$((total_failed + failed))
                  total_duration=$((total_duration + duration))

                  if [ "$failed" -gt 0 ]; then
                    failed_groups=$((failed_groups + 1))
                    status="❌"
                  else
                    passed_groups=$((passed_groups + 1))
                    status="✅"
                  fi

                  echo "| $status $group | $tests | $passed | $failed | ${duration}s |" >> test-report.md
                fi
              done
            fi
          done

          echo "" >> test-report.md
          echo "## Summary" >> test-report.md
          echo "" >> test-report.md
          echo "| Metric | Value |" >> test-report.md
          echo "|--------|-------|" >> test-report.md
          echo "| Total Test Groups | $total_groups |" >> test-report.md
          echo "| Passed Groups | $passed_groups |" >> test-report.md
          echo "| Failed Groups | $failed_groups |" >> test-report.md
          echo "| Total Tests | $total_tests |" >> test-report.md
          echo "| Passed Tests | $total_passed |" >> test-report.md
          echo "| Failed Tests | $total_failed |" >> test-report.md
          echo "| Total Duration | ${total_duration}s |" >> test-report.md

          if [ $total_tests -gt 0 ]; then
            pass_rate=$(echo "scale=1; $total_passed * 100 / $total_tests" | bc 2>/dev/null || echo "0")
            echo "| Pass Rate | ${pass_rate}% |" >> test-report.md
          fi

          echo "" >> test-report.md

          if [ $total_failed -eq 0 ]; then
            echo "✅ **All tests passed!**" >> test-report.md
          else
            echo "❌ **Some tests failed. See details above.**" >> test-report.md
          fi

          # Include code quality if available
          if [ -f "all-results/code-quality-reports/complexity.md" ]; then
            echo "" >> test-report.md
            echo "---" >> test-report.md
            echo "" >> test-report.md
            echo "## 📈 Code Quality" >> test-report.md
            cat "all-results/code-quality-reports/complexity.md" >> test-report.md
          fi

          # Display report
          cat test-report.md

      - name: Upload combined report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: comprehensive-test-report
          path: test-report.md
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/pr-comment
        with:
          report-file: test-report.md
          comment-marker: "\U0001F9EA Comprehensive Test Results"

      - name: Fail if any tests failed
        run: |
          # Check if any test groups failed
          failed=0
          for result_dir in all-results/test-results-*; do
            if [ -d "$result_dir" ]; then
              for json_file in "$result_dir"/*.json; do
                if [ -f "$json_file" ]; then
                  failed_count=$(jq -r '.failed' "$json_file" 2>/dev/null || echo "0")
                  if [ "$failed_count" -gt 0 ]; then
                    failed=1
                    break
                  fi
                fi
              done
            fi
          done

          if [ $failed -eq 1 ]; then
            echo "❌ FAIL: Some tests failed. See test report for details."
            exit 1
          else
            echo "✅ All tests passed!"
            exit 0
          fi
