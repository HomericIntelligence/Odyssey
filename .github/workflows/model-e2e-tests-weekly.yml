name: Weekly Model E2E Tests

# Runs full end-to-end model tests against real datasets weekly.

on:
  # Saturdays at 3 AM UTC (avoids collision with SIMD benchmarks on Sundays 2 AM)
  schedule:
    - cron: '0 3 * * 6'

  # Allow manual execution
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  model-e2e-tests:
    name: Model E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Only run on main branch for scheduled runs
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Run model E2E tests
        run: |
          echo "Running weekly model E2E tests..."
          echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo ""

          mkdir -p test-results

          # Collect model test directories. `find` exits 0 even with no
          # matches, so no suppression is needed.
          MODEL_DIRS=$(find tests/models -maxdepth 1 -mindepth 1 -type d 2>/dev/null | sort)

          if [ -z "$MODEL_DIRS" ]; then
            echo "No model test directories found under tests/models/ -- skipping"
            exit 0
          fi

          overall_status=0

          for model_dir in $MODEL_DIRS; do
            model_name=$(basename "$model_dir")
            echo ""
            echo "========================================"
            echo "Testing model: $model_name"
            echo "========================================"

            # Run Mojo tests if they exist. The PyPI Mojo build has no `mojo
            # test` subcommand (ADR-018) — run each test file as `mojo <file>`.
            mojo_tests=$(find "$model_dir" -name 'test_*.mojo' 2>/dev/null | head -1)
            if [ -n "$mojo_tests" ]; then
              if podman compose exec -T odyssey-dev bash -c "for f in \$(find $model_dir -name 'test_*.mojo'); do echo \"Running \$f\"; uv run mojo --Werror -I src -I . \"\$f\" || exit 1; done" \
                  2>&1 | tee "test-results/${model_name}-mojo.txt"; then
                echo "Mojo E2E tests passed for $model_name"
              else
                echo "Mojo E2E tests failed for $model_name"
                overall_status=1
              fi
            else
              echo "No Mojo test files found in $model_dir -- skipping Mojo tests"
            fi

            # Run Python tests if they exist
            py_tests=$(find "$model_dir" -name 'test_*.py' 2>/dev/null | head -1)
            if [ -n "$py_tests" ]; then
              if podman compose exec -T odyssey-dev bash -c "uv run pytest $model_dir --verbose" \
                  2>&1 | tee "test-results/${model_name}-python.txt"; then
                echo "Python E2E tests passed for $model_name"
              else
                echo "Python E2E tests failed for $model_name"
                overall_status=1
              fi
            fi
          done

          if [ $overall_status -eq 0 ]; then
            echo ""
            echo "All model E2E tests completed successfully"
          else
            echo ""
            echo "One or more model E2E tests failed"
            exit 1
          fi

      - name: Generate test summary
        if: always()
        run: |
          echo "Generating test summary..."
          mkdir -p test-results
          {
            echo "# Weekly Model E2E Test Results"
            echo ""
            echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          } > test-results/summary.md
          cat test-results/summary.md

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: model-e2e-test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 365
