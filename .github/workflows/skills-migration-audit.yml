name: Skills Migration Audit

on:
  # Run on pull requests when skills change
  pull_request:
    paths:
      - '.claude/skills/**'
      - 'scripts/migrate_odyssey_skills.py'
      - '.github/workflows/skills-migration-audit.yml'

  # Run on pushes to main
  push:
    branches:
      - main
    paths:
      - '.claude/skills/**'
      - 'scripts/migrate_odyssey_skills.py'
      - '.github/workflows/skills-migration-audit.yml'

  # Allow manual runs
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  audit-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install migration script dependencies
        run: |
          pixi run pip install pyyaml

      - name: Check for skills directory
        id: skills-check
        run: |
          if [ -d ".claude/skills" ] && [ "$(find .claude/skills -maxdepth 1 -type d | wc -l)" -gt 1 ]; then
            echo "has_skills=true" >> $GITHUB_OUTPUT
            echo "✓ Skills directory found with skills to audit"
          else
            echo "has_skills=false" >> $GITHUB_OUTPUT
            echo "ℹ No skills directory or empty - skipping audit"
          fi

      - name: Clone ProjectMnemosyne (target directory)
        if: steps.skills-check.outputs.has_skills == 'true'
        run: |
          # Clone ProjectMnemosyne to /tmp/ProjectMnemosyne for audit
          # If not available, create a minimal structure
          if git clone https://github.com/HomericIntelligence/ProjectMnemosyne.git /tmp/ProjectMnemosyne 2>/dev/null; then
            echo "✓ ProjectMnemosyne cloned successfully"
          else
            echo "ℹ ProjectMnemosyne not accessible, creating minimal structure"
            mkdir -p /tmp/ProjectMnemosyne/skills
          fi

      - name: Run skills migration audit
        if: steps.skills-check.outputs.has_skills == 'true'
        run: |
          python3 scripts/migrate_odyssey_skills.py \
            --audit \
            --no-color \
            --target-dir /tmp/ProjectMnemosyne

      - name: Skip skills audit (no skills present)
        if: steps.skills-check.outputs.has_skills == 'false'
        run: |
          echo "⚠️ Skipping skills migration audit - no skills directory present"
          echo "This is expected for repos that don't have local skills."

      - name: Display audit results on failure
        if: failure()
        run: |
          echo ""
          echo "❌ Skills migration audit failed!"
          echo ""
          echo "This means one or more skills in .claude/skills/ have not been"
          echo "migrated to ProjectMnemosyne yet."
          echo ""
          echo "To check migration status locally:"
          echo "  python3 scripts/migrate_odyssey_skills.py --audit"
          echo ""
          echo "To migrate a specific skill:"
          echo "  python3 scripts/migrate_odyssey_skills.py --skill <skill-name>"
          echo ""
