name: Pre-commit Checks

on:
  # Run on all pull requests
  pull_request:

  # Run on pushes to main
  push:
    branches:
      - main

  # Allow manual runs
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check pre-commit vs pixi version drift
        run: python3 scripts/check_precommit_versions.py

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install pre-commit
        run: |
          pixi run pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-

      - name: Run pre-commit hooks (excluding mojo-format)
        run: |
          SKIP=mojo-format pixi run pre-commit run --all-files --show-diff-on-failure

      - name: Run mojo format (advisory - non-blocking)
        continue-on-error: true
        run: |
          pixi run pre-commit run mojo-format --all-files --show-diff-on-failure || echo "::warning::mojo format check failed (non-blocking due to Mojo 0.26.1 formatter bugs)"

      - name: Enforce no .__matmul__() call sites
        run: just check-matmul-calls

      - name: Display helpful message on failure
        if: failure()
        run: |
          echo "❌ Pre-commit checks failed!"
          echo ""
          echo "To fix formatting issues locally:"
          echo "  1. Install pre-commit: pip install pre-commit"
          echo "  2. Install hooks: pre-commit install"
          echo "  3. Run on all files: pre-commit run --all-files"
          echo "  4. Commit the fixes"
          echo ""
          echo "Most formatting issues can be auto-fixed by running:"
          echo "  pre-commit run --all-files"
