name: Pre-commit Checks

on:
  # Run on all pull requests
  pull_request:

  # Run on pushes to main
  push:
    branches:
      - main

  # Allow manual runs
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install pre-commit
        run: |
          pixi run pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-

      - name: Run pre-commit hooks
        run: |
          pixi run pre-commit run --all-files --show-diff-on-failure

      - name: Enforce no .__matmul__() call sites
        run: |
          violations=$(grep -rn "\.__matmul__(" . --include="*.mojo" --exclude-dir=".pixi" --exclude-dir=".git" | grep -v "fn __matmul__(" | grep -v "# __matmul__" | grep -v "__matmul__.*deprecated")
          if [ -n "$violations" ]; then
            echo "::error::Found .__matmul__() call site(s). Use matmul(A, B) instead."
            echo "$violations"
            exit 1
          fi
          echo "No .__matmul__() call sites found."

      - name: Display helpful message on failure
        if: failure()
        run: |
          echo "❌ Pre-commit checks failed!"
          echo ""
          echo "To fix formatting issues locally:"
          echo "  1. Install pre-commit: pip install pre-commit"
          echo "  2. Install hooks: pre-commit install"
          echo "  3. Run on all files: pre-commit run --all-files"
          echo "  4. Commit the fixes"
          echo ""
          echo "Most formatting issues can be auto-fixed by running:"
          echo "  pre-commit run --all-files"
