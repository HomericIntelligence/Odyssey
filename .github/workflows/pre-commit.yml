name: Pre-commit Checks

# Quality gates: pre-commit hooks, type checking (mypy), notebook validation
# Absorbs: type-check.yml, notebook-validation.yml

on:
  # Run on all pull requests
  pull_request:

  # Run on pushes to main
  push:
    branches:
      - main

  # Allow manual runs
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Check pre-commit vs pixi version drift
        run: pixi run python scripts/check_precommit_versions.py

      - name: Install pre-commit
        run: |
          pixi run pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-

      - name: Run pre-commit hooks (excluding mojo-format)
        run: |
          SKIP=mojo-format pixi run pre-commit run --all-files --show-diff-on-failure

      - name: Run mojo format (fail-fast)
        # mojo-format is now fail-fast per HomericIntelligence/Odysseus#282
        # (Bucket F). Previously this step wrapped the command in an
        # `if ! ...; then echo <advisory-annotation>; fi` block to mask
        # formatter diffs. That advisory pattern is forbidden: it lets
        # unformatted Mojo merge silently. If mojo format reports a diff,
        # run it locally (in a GLIBC-compatible container — see
        # docs/dev/mojo-glibc-compatibility.md) and commit the formatted files.
        run: |
          pixi run pre-commit run mojo-format --all-files --show-diff-on-failure

      - name: Enforce no .__matmul__() call sites
        run: |
          # Bucket D: pipefail makes a no-match `grep -v` (rc=1) fail the
          # pipeline. Use `awk` filters (which always exit 0) and run the
          # initial `grep` under set +e so "no matches" doesn't trip us.
          set +e
          raw=$(grep -rn '\.__matmul__(' . --include='*.mojo' --include='*.🔥' \
                  --exclude-dir='.pixi' --exclude-dir='.git')
          set -e
          violations=$(printf '%s\n' "$raw" \
            | awk '!/fn __matmul__\(/ && !/# __matmul__/ && !/__matmul__.*deprecated/ && NF')
          if [ -n "$violations" ]; then
            echo "Found .__matmul__() call sites (use matmul(A, B) instead):"
            echo "$violations"
            exit 1
          fi

      - name: Display helpful message on failure
        if: failure()
        run: |
          echo "❌ Pre-commit checks failed!"
          echo ""
          echo "To fix formatting issues locally:"
          echo "  1. Install pre-commit: pip install pre-commit"
          echo "  2. Install hooks: pre-commit install"
          echo "  3. Run on all files: pre-commit run --all-files"
          echo "  4. Commit the fixes"
          echo ""
          echo "Most formatting issues can be auto-fixed by running:"
          echo "  pre-commit run --all-files"

  # ============================================================================
  # Type Checking (absorbed from type-check.yml)
  # ============================================================================
  mypy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Install mypy
        run: pixi run pip install mypy types-PyYAML

      - name: Run mypy
        run: |
          echo "Running mypy type checking..."
          # Exclude generators/ due to module path ambiguity (scripts adds parent to path)
          pixi run mypy --exclude 'generators/' scripts/ || {
            echo "❌ Type checking failed"
            echo ""
            echo "To fix locally:"
            echo "  pixi run pip install mypy"
            echo "  pixi run mypy --exclude 'generators/' scripts/"
            exit 1
          }
          echo "✅ All type checks passed"

  # ============================================================================
  # Notebook Validation (absorbed from notebook-validation.yml)
  # ============================================================================
  validate-notebooks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install nbformat nbconvert

      - name: Validate notebook syntax
        run: |
          echo "Validating notebook syntax..."
          for notebook in notebooks/*.ipynb; do
            if [ -f "$notebook" ]; then
              echo "Checking: $notebook"
              python -m json.tool "$notebook" > /dev/null || exit 1
            fi
          done
          echo "✅ All notebooks have valid JSON"

      - name: Check for large notebooks
        run: |
          echo "Checking notebook sizes..."
          max_size=$((500 * 1024))  # 500KB in bytes
          for notebook in notebooks/*.ipynb; do
            if [ -f "$notebook" ]; then
              size=$(stat -f%z "$notebook" 2>/dev/null || stat -c%s "$notebook")
              if [ "$size" -gt "$max_size" ]; then
                echo "ERROR: $notebook exceeds 500KB (size: $((size / 1024))KB)"
                echo "   Please clear notebook outputs with: just jupyter-clear"
                exit 1
              fi
            fi
          done
          echo "✅ All notebooks under size limit"

      - name: Check notebook count
        run: |
          echo "Checking notebook inventory..."
          expected=6
          found=$(find notebooks -name "*.ipynb" -type f | wc -l)
          if [ "$found" -lt "$expected" ]; then
            echo "Warning: Found $found notebooks, expected $expected"
          else
            echo "✅ Found $found notebooks"
          fi

      - name: Verify README
        run: |
          if [ ! -f "notebooks/README.md" ]; then
            echo "ERROR: notebooks/README.md not found"
            exit 1
          fi
          echo "✅ notebooks/README.md exists"

      - name: Check utils package
        run: |
          echo "Checking notebooks/utils package..."
          if [ ! -f "notebooks/utils/__init__.py" ]; then
            echo "ERROR: notebooks/utils/__init__.py not found"
            exit 1
          fi
          for module in mojo_bridge tensor_utils visualization progress; do
            if [ ! -f "notebooks/utils/${module}.py" ]; then
              echo "Warning: notebooks/utils/${module}.py not found"
            fi
          done
          echo "✅ Utility modules present"

  lint-notebooks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - name: Lint notebook markdown
        run: |
          echo "Checking notebook structure..."
          for notebook in notebooks/*.ipynb; do
            if [ -f "$notebook" ]; then
              python3 -c "import json; json.load(open('$notebook'))" || { echo "❌ Invalid JSON: $notebook"; exit 1; }
            fi
          done
          echo "✅ Notebook markdown looks good"

  python-syntax:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - name: Lint utility modules
        run: |
          pip install pylint ruff
          echo "Linting utility modules..."
          python -m py_compile notebooks/utils/*.py
          echo "✅ Utility modules compile successfully"
