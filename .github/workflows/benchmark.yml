name: Performance Benchmarks

# Execute performance benchmarks and detect regressions
# Target duration: < 30 minutes (parallel execution)

on:
  # Manual dispatch (primary trigger)
  workflow_dispatch:
    inputs:
      suite:
        description: 'Benchmark suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tensor-ops
          - model-training
          - data-loading

  # Scheduled nightly run at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'   # Nightly benchmark run
    - cron: '0 2 * * 0'   # Weekly Sunday SIMD benchmarks

  # Pull requests with 'benchmark' label
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read
  pull-requests: write  # For PR comments

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ============================================================================
  # Benchmark Execution - Matrix Strategy
  # ============================================================================
  benchmark-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only run if 'benchmark' label is present or scheduled/manual
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'benchmark'))

    strategy:
      fail-fast: false
      matrix:
        benchmark-suite:
          - tensor-ops
          - model-training
          - data-loading

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Check if should run this suite
        id: check-suite
        run: |
          REQUESTED_SUITE="${{ github.event.inputs.suite || 'all' }}"
          CURRENT_SUITE="${{ matrix.benchmark-suite }}"

          if [ "$REQUESTED_SUITE" = "all" ] || [ "$REQUESTED_SUITE" = "$CURRENT_SUITE" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Skipping $CURRENT_SUITE (requested: $REQUESTED_SUITE)"
          fi

      - name: Run benchmark suite - ${{ matrix.benchmark-suite }}
        if: steps.check-suite.outputs.run == 'true'
        env:
          SUITE: ${{ matrix.benchmark-suite }}
        run: |
          mkdir -p builds/benchmarks
          chmod 777 builds/benchmarks

          # Check if benchmarks directory exists
          if [ ! -d "benchmarks" ]; then
            echo "⚠️  No benchmarks/ directory found yet"
            echo "This is expected during initial development."
            echo "{\"suite\": \"$SUITE\", \"status\": \"not_implemented\"}" > "builds/benchmarks/$SUITE.json"
            exit 0
          fi

          SUITE_PATH="benchmarks/$SUITE"

          if [ -d "$SUITE_PATH" ]; then
            if [ -f "$SUITE_PATH/run_benchmark.py" ]; then
              echo "Running Python benchmark..."
              podman compose exec -T odyssey-dev bash -c "mkdir -p builds/benchmarks && uv run python $SUITE_PATH/run_benchmark.py --output builds/benchmarks/$SUITE.json"
            elif [ -f "$SUITE_PATH/run_benchmark.mojo" ]; then
              echo "Running Mojo benchmark..."
              podman compose exec -T odyssey-dev bash -c "mkdir -p builds/benchmarks && uv run mojo -I . $SUITE_PATH/run_benchmark.mojo --output builds/benchmarks/$SUITE.json"
            else
              echo "⚠️  No benchmark runner found in $SUITE_PATH"
              echo "{\"suite\": \"$SUITE\", \"status\": \"not_implemented\"}" > "builds/benchmarks/$SUITE.json"
            fi
          else
            echo "⚠️  Benchmark suite not found: $SUITE_PATH"
            echo "{\"suite\": \"$SUITE\", \"status\": \"not_found\"}" > "builds/benchmarks/$SUITE.json"
          fi

          echo "✅ Benchmark suite complete: $SUITE"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: benchmark-results-${{ matrix.benchmark-suite }}
          path: builds/benchmarks/
          retention-days: 90

  # ============================================================================
  # Benchmark Report
  # ============================================================================
  benchmark-report:
    needs: [benchmark-execution]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Download all benchmark results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          pattern: benchmark-results-*
          path: all-results/

      - name: Generate benchmark report
        run: |
          echo "# ⚡ Performance Benchmark Results" > benchmark-report.md
          echo "" >> benchmark-report.md
          echo "**Workflow Run**: [\`${{ github.run_number }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> benchmark-report.md
          echo "**Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> benchmark-report.md
          echo "" >> benchmark-report.md

          BENCHMARK_RESULT="${{ needs.benchmark-execution.result }}"

          if [ "$BENCHMARK_RESULT" = "skipped" ]; then
            echo "## Status" >> benchmark-report.md
            echo "" >> benchmark-report.md
            echo "⏭️ **Benchmarks skipped** - Add the \`benchmark\` label to run performance benchmarks." >> benchmark-report.md
            echo "" >> benchmark-report.md
            echo "Benchmarks only run when:" >> benchmark-report.md
            echo "- The \`benchmark\` label is added to the PR" >> benchmark-report.md
            echo "- Manually triggered via workflow dispatch" >> benchmark-report.md
            echo "- Scheduled nightly run" >> benchmark-report.md
          else
            echo "## Benchmark Suites" >> benchmark-report.md
            echo "" >> benchmark-report.md

            for suite in tensor-ops model-training data-loading; do
              RESULT_FILE="all-results/benchmark-results-$suite/builds/benchmarks/$suite.json"

              if [ -f "$RESULT_FILE" ]; then
                if grep -q "not_implemented\|not_found" "$RESULT_FILE"; then
                  echo "- ⚠️  **$suite**: Not yet implemented" >> benchmark-report.md
                else
                  echo "- ✅ **$suite**: Completed" >> benchmark-report.md
                fi
              else
                echo "- ❌ **$suite**: Failed or did not run" >> benchmark-report.md
              fi
            done

            echo "" >> benchmark-report.md
            echo "## Status" >> benchmark-report.md
            echo "" >> benchmark-report.md

            if [ "$BENCHMARK_RESULT" = "success" ]; then
              echo "✅ **Benchmark execution completed successfully**" >> benchmark-report.md
            else
              echo "❌ **Some benchmarks failed**" >> benchmark-report.md
            fi
          fi

          cat benchmark-report.md

      - name: Upload benchmark report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: benchmark-report
          path: benchmark-report.md
          retention-days: 90

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/pr-comment
        with:
          report-file: benchmark-report.md
          comment-marker: "⚡ Performance Benchmark Results"

      - name: Fail if critical regressions detected
        run: |
          echo "✅ No critical performance regressions (regression detection not yet implemented)"

  # ============================================================================
  # Weekly SIMD Benchmarks (absorbed from simd-benchmarks-weekly.yml)
  # Runs every Sunday at 2 AM UTC
  # ============================================================================
  simd-benchmarks:
    name: SIMD Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only run on main branch for scheduled runs; always on manual dispatch
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up container
        uses: ./.github/actions/setup-container

      - name: Run SIMD benchmarks
        run: |
          echo "Running SIMD benchmarks..."
          echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "Commit: ${{ github.sha }}"
          echo ""

          mkdir -p builds/benchmarks

          # Create output directory inside container
          podman compose exec -T odyssey-dev bash -c "mkdir -p /tmp/benchmark-results"

          podman compose exec -T odyssey-dev bash -c 'uv run mojo run -I . benchmarks/bench_simd.mojo' | tee builds/benchmarks/simd-output.txt
          echo "✅ SIMD benchmarks completed successfully"

          # Copy results from container to host
          CONTAINER_ID=$(podman compose ps -q odyssey-dev)
          if [ -z "$CONTAINER_ID" ]; then
            echo "❌ Failed to get container ID"
            exit 1
          fi
          # Best-effort copy: the file may be absent when the benchmark exited
          # early. Surface the failure as an informational `WARN:` line on
          # stdout (the workflow-annotation form is forbidden per
          # HomericIntelligence/Odysseus#282 Bucket F — advisory annotations
          # that gate a tool exit are equivalent to continue-on-error). This
          # branch does not block the step; the summary downstream will
          # document the missing data.
          if ! podman cp "$CONTAINER_ID:/tmp/benchmark-results/simd-output.txt" \
                         "benchmark-results/simd-output.txt" 2>/dev/null; then
            echo "WARN: SIMD benchmark output not found in container — summary will be empty"
          fi

      - name: Generate benchmark summary
        if: success()
        run: |
          cat > builds/benchmarks/simd-summary.md << EOF
          # SIMD Performance Benchmark Results

          **Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Commit**: ${{ github.sha }}
          **Workflow Run**: [\`${{ github.run_number }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ## Benchmark Configuration

          - **Tensor Sizes**: 64x64, 128x128, 256x256, 512x512, 1024x1024
          - **Operations**: add, multiply (scalar vs SIMD)
          - **Data Types**: float32, float64
          - **Iterations**: 10 per operation

          ## Expected Performance

          - Float32 operations: 3-5x speedup
          - Float64 operations: 2-3x speedup
          EOF

          cat builds/benchmarks/simd-summary.md

      - name: Upload SIMD benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: simd-benchmark-results-${{ github.run_number }}
          path: builds/benchmarks/
          retention-days: 365  # Keep benchmark history for 1 year
