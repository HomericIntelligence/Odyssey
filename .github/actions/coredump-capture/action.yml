name: Coredump Capture
description: |
  Enable host-side pipe core_pattern + container ulimit so the libKGEN JIT crash
  (modular/modular#6413) produces a real coredump we can attach to gdb.
  After the test job, bundles cores + matching `mojo` binary + relevant
  `.so` files into a `crash-bundle-<job-name>` artifact (14-day retention).

  When MOJO_TEST_UNDER_GDB=1 is set (CI default), mojo test invocations run
  under gdb -batch with handle SIGABRT stop nopass. On crash, gdb writes:
    - core.gdb.<timestamp>.mojo  — real ELF core (multi-MB)
    - gdb-<timestamp>.log        — full bt, threads, shlibs text dump
  Both are collected here alongside any kernel cores and the mojo binary.

  Use this action TWICE in each test job:
    1. As a setup step BEFORE the test runs (to enable cores)
    2. As a teardown step AFTER the test runs (to bundle + upload)

  The two-step split is implemented via the `phase` input.

  DESIGN: pipe-handler core_pattern (not path-based)
  ===================================================
  PR #5380 used a path-based core_pattern:
    /workspace/crash-bundle/cores/core.%p.%e.%t

  Linux docs say the path is resolved in the crashing process's mount
  namespace.  But with rootless Podman + UID-mapped subuids, the kernel
  silently wrote nothing: every post-#5380 CI run produced zero ELF cores.

  Solution (this PR): pipe handler sidesteps namespace resolution entirely.
    core_pattern = |/usr/local/bin/coredump-host-handler.sh %p %e %t %s %P

  The kernel invokes the script as PID 1 of the HOST namespace, piping the
  core ELF on stdin. The script writes to the host-side path
    /home/runner/work/ProjectOdyssey/ProjectOdyssey/crash-bundle/cores/
  which is the actual directory the bind mount maps to — no namespace
  ambiguity. See scripts/coredump-host-handler.sh for the handler.

  ERROR HANDLING: the no-`|| true` policy (#5385) applies here. Best-effort
  calls (sysctl on locked-down runners, stopping apport when it is not
  installed, copying files that may not exist) use explicit warn-and-continue
  guards instead of suppression so failures appear in the build log.

inputs:
  phase:
    description: "'setup' before tests, 'collect' after tests"
    required: true
  job-name:
    description: "Short job identifier used in artifact name (e.g. gradient-checking, data-utilities)"
    required: true
    default: "test"

runs:
  using: composite
  steps:
    - name: Enable core dumps (pipe handler — host kernel)
      if: inputs.phase == 'setup'
      shell: bash
      run: |
        set -x
        # Create the cores dir on the host (the runner workspace). The handler
        # script writes here directly — no bind-mount indirection needed.
        mkdir -p crash-bundle/cores
        chmod 1777 crash-bundle/cores

        # Install the pipe handler onto the host so the kernel can exec it.
        # The handler receives the core ELF on stdin and writes it to the
        # host-side crash-bundle/cores/ directory.
        sudo cp scripts/coredump-host-handler.sh /usr/local/bin/coredump-host-handler.sh
        sudo chmod +x /usr/local/bin/coredump-host-handler.sh

        # Set pipe-mode core_pattern. Leading '|' is critical — it tells the
        # kernel to exec the script as PID 1 of the HOST namespace rather than
        # writing to a path inside the crashing process's mount namespace.
        echo '|/usr/local/bin/coredump-host-handler.sh %p %e %t %s %P' \
          | sudo tee /proc/sys/kernel/core_pattern

        # Best-effort tweaks: hardened runners may forbid suid_dumpable=2,
        # and apport / systemd-coredump may not be installed. Warn loudly on
        # unexpected failures (per #5385) instead of suppressing them.
        if ! sudo sysctl -w fs.suid_dumpable=2; then
          echo "warn: 'sysctl -w fs.suid_dumpable=2' rejected (cores from setuid binaries will not be captured)" >&2
        fi
        if systemctl list-unit-files --quiet apport.service 2>/dev/null; then
          if ! sudo systemctl stop apport.service 2>/dev/null; then
            echo "warn: 'systemctl stop apport.service' failed" >&2
          fi
        fi
        if systemctl list-unit-files --quiet systemd-coredump.socket 2>/dev/null; then
          if ! sudo systemctl stop systemd-coredump.socket 2>/dev/null; then
            echo "warn: 'systemctl stop systemd-coredump.socket' failed" >&2
          fi
        fi

        # Raise core ulimit inside the container so it propagates to every
        # subsequent `podman compose exec` session. We `awk` the relevant rows
        # so a missing match does not look like a failure (see #5385 Bucket D).
        podman compose exec -T projectodyssey-dev bash -c \
          'ulimit -c unlimited; ulimit -a | awk "/core|file size/"'

    - name: Collect core dumps + symbols (modular/modular#6413)
      if: inputs.phase == 'collect' && always()
      shell: bash
      run: |
        set -x
        mkdir -p crash-bundle/cores crash-bundle/symbols
        # Diagnostic listing — directory may be empty if no crashes occurred.
        if [ -d crash-bundle/cores ]; then
          if ! ls -la crash-bundle/cores/ 2>/dev/null; then
            echo "warn: could not list crash-bundle/cores/" >&2
          fi
        fi

        # ALWAYS bundle symbols + metadata (even if no cores), so we can
        # distinguish "no crash this run" from "capture broken." A metadata-only
        # artifact is a positive signal that the action ran; a missing artifact
        # means the action itself failed.
        podman compose exec -T projectodyssey-dev bash -c '
          set +e
          # Resolve pixi env dir from `which mojo` — most reliable path:
          # mojo lives at $ENV/bin/mojo, so we walk up from the resolved binary.
          MOJO_BIN=$(pixi run which mojo 2>/dev/null | tail -1)
          if [ -z "$MOJO_BIN" ] || [ ! -x "$MOJO_BIN" ]; then
            echo "Could not resolve mojo binary path; skipping symbol bundle"
            exit 0
          fi
          # $MOJO_BIN is .../envs/default/bin/mojo — strip /bin/mojo to get env dir.
          ENV_DIR=$(dirname "$(dirname "$MOJO_BIN")")
          echo "Resolved pixi env dir: $ENV_DIR"
          if [ ! -d "$ENV_DIR/lib" ]; then
            echo "Env dir has no lib/ subdir at $ENV_DIR; skipping symbol bundle"
            exit 0
          fi
          mkdir -p /workspace/crash-bundle/symbols
          # Best-effort symbol bundle: if a copy fails (missing perms, missing
          # file) we log a warning but keep going so the rest of the bundle
          # still uploads.
          if ! cp -av "$MOJO_BIN" /workspace/crash-bundle/symbols/ 2>/dev/null; then
            echo "warn: failed to copy mojo binary into crash-bundle/symbols" >&2
          fi
          # nullglob ensures unmatched patterns drop out cleanly instead of
          # leaving literal "*.so" tokens for `[ -e ]` to inspect.
          shopt -s nullglob
          for so in "$ENV_DIR"/lib/libKGEN*.so "$ENV_DIR"/lib/libAsync*.so "$ENV_DIR"/lib/libMojo*.so "$ENV_DIR"/lib/libMSupport*.so; do
            if ! cp -av "$so" /workspace/crash-bundle/symbols/ 2>/dev/null; then
              echo "warn: failed to copy $so" >&2
            fi
          done
          shopt -u nullglob

          # Bundle gdb itself so the crash can be analyzed offline without
          # needing a matching gdb version installed locally. Best-effort:
          # warn instead of suppressing when gdb is unavailable.
          GDB_BIN=$(command -v gdb 2>/dev/null)
          if [ -n "$GDB_BIN" ] && [ -x "$GDB_BIN" ]; then
            if ! cp -av "$GDB_BIN" /workspace/crash-bundle/symbols/ 2>/dev/null; then
              echo "warn: failed to copy gdb ($GDB_BIN) into crash-bundle/symbols" >&2
            fi
          else
            echo "warn: gdb not found in container — offline analysis will need a host-side gdb" >&2
          fi
          ls -la /workspace/crash-bundle/symbols/
        '
        sym_rc=$?
        if [ "$sym_rc" -ne 0 ]; then
          echo "warn: symbol-bundling subshell exited $sym_rc (continuing — metadata block still runs)" >&2
        fi

        # gdb-mode artifacts: scripts/mojo-under-gdb.sh writes gdb-*.log and
        # core.gdb.* files into crash-bundle/cores/ when MOJO_TEST_UNDER_GDB=1.
        # Surface them in the build log alongside any kernel-generated cores.
        if ! ls -la crash-bundle/cores/gdb-*.log 2>/dev/null; then
          echo "(no gdb-*.log this run)"
        fi
        if ! ls -la crash-bundle/cores/core.gdb.* 2>/dev/null; then
          echo "(no core.gdb.* this run)"
        fi

        # Build the metadata file with explicit exit-code consumption per probe
        # so a failed `podman compose exec` shows up as a diagnostic line
        # rather than a silently-empty section (#5385 Bucket D pattern).
        emit_probe() {
          local label="$1"; shift
          echo "=== $label ==="
          if ! "$@" 2>&1; then
            echo "(probe failed: $* — exit code $?)"
          fi
        }
        {
          emit_probe "mojo --version" \
            podman compose exec -T projectodyssey-dev pixi run mojo --version
          emit_probe "uname -a (host)" uname -a
          emit_probe "glibc (host)" bash -c 'ldd --version | head -1'
          emit_probe "glibc (container)" \
            podman compose exec -T projectodyssey-dev bash -c 'ldd --version | head -1'
          emit_probe "/proc/sys/kernel/core_pattern (host kernel — global)" \
            cat /proc/sys/kernel/core_pattern
          emit_probe "container ulimit -c" \
            podman compose exec -T projectodyssey-dev bash -c 'ulimit -c'
          emit_probe "Coredumps found in crash-bundle/cores/" \
            ls -la crash-bundle/cores/
          # gdb-mode artifacts list separately so an operator can see at a
          # glance whether the wrapper produced anything this run.
          emit_probe "GDB logs (from mojo-under-gdb.sh)" \
            bash -c 'ls -la crash-bundle/cores/gdb-*.log 2>/dev/null || echo "(none)"'
          emit_probe "GDB ELF cores (from mojo-under-gdb.sh)" \
            bash -c 'ls -la crash-bundle/cores/core.gdb.* 2>/dev/null || echo "(none)"'
          emit_probe "Symbols bundled" \
            ls -la crash-bundle/symbols/
          # Pipe-handler-specific: prove the handler ran (or not) by surfacing
          # its log. Empty log + crash signature in tests means the pipe
          # core_pattern was not reached (suid_dumpable / ulimit -c issue).
          echo "=== handler.log (pipe handler invocations) ==="
          if [ -r crash-bundle/handler.log ]; then
            cat crash-bundle/handler.log
          else
            echo "(no handler.log — handler was not invoked this run)"
          fi
        } > crash-bundle/metadata.txt

        # If no cores (kernel or gdb) AND no gdb logs, still upload metadata +
        # symbols so the artifact appears in the run (proves the action ran).
        # `ls ... | read -r ...` is a portable no-`|| true` way to detect
        # "any matches?" without tripping the forbid-suppressions guard.
        have_kernel_cores=false
        have_gdb_logs=false
        if ls crash-bundle/cores/core* >/dev/null 2>&1; then
          have_kernel_cores=true
        fi
        if ls crash-bundle/cores/gdb-*.log >/dev/null 2>&1; then
          have_gdb_logs=true
        fi
        if [ "$have_kernel_cores" = false ] && [ "$have_gdb_logs" = false ]; then
          echo "No cores or gdb logs captured this run — uploading metadata + symbols only."
          echo "(If a crash signature appeared in test logs, check that" \
               "MOJO_TEST_UNDER_GDB=1 is set for this job, the pipe handler" \
               "is installed at /usr/local/bin/coredump-host-handler.sh, and" \
               "suid_dumpable and ulimit -c are set inside the container.)" \
               >> crash-bundle/metadata.txt
        fi

    - name: Upload crash bundle
      if: inputs.phase == 'collect' && always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
      with:
        name: crash-bundle-${{ inputs.job-name }}
        path: crash-bundle/
        retention-days: 14
        # Always upload — even an empty bundle is diagnostic data
        # (proves the action ran).
        if-no-files-found: warn
