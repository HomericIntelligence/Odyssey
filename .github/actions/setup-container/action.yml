name: Set Up Podman Container
description: Build and start the Podman compose development container for CI.

runs:
  using: composite
  steps:
    - name: Ensure .gitconfig exists
      shell: bash
      run: touch "$HOME/.gitconfig"

    - name: Export runner UID/GID
      id: uid
      shell: bash
      run: |
        echo "USER_ID=$(id -u)" >> "$GITHUB_ENV"
        echo "GROUP_ID=$(id -g)" >> "$GITHUB_ENV"
        echo "user_id=$(id -u)" >> "$GITHUB_OUTPUT"

    - name: Cache container image tar
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5
      with:
        path: /tmp/podman-image-cache
        # UID is included so a cached image built with USER_ID=1000 is never
        # reused on a runner where id -u returns 1001.  Mismatched UID causes
        # /home/dev to be unwritable inside the container.
        key: container-image-uid${{ steps.uid.outputs.user_id }}-${{ hashFiles('Dockerfile', 'pixi.toml', 'pixi.lock') }}

    - name: Start Podman socket
      shell: bash
      run: |
        # Best-effort: socket may already be active. Warn on unexpected failure
        # rather than fail the workflow (the DOCKER_HOST assignment below will
        # surface a real problem when the socket is genuinely unavailable).
        if ! systemctl --user start podman.socket; then
          echo "warn: 'systemctl --user start podman.socket' failed (may already be running)" >&2
        fi
        export DOCKER_HOST=unix:///run/user/$(id -u)/podman/podman.sock
        echo "DOCKER_HOST=unix:///run/user/$(id -u)/podman/podman.sock" >> "$GITHUB_ENV"

    - name: Load cached image or build
      shell: bash
      run: |
        if [ -f /tmp/podman-image-cache/dev.tar ]; then
          echo "Loading cached image..."
          podman load -i /tmp/podman-image-cache/dev.tar
        else
          echo "No cache found, building image..."
          podman compose build odyssey-dev
          mkdir -p /tmp/podman-image-cache
          podman save -o /tmp/podman-image-cache/dev.tar odyssey:dev
        fi

    - name: Seed pixi-cache volume from image layer
      shell: bash
      run: |
        # The pixi-cache named volume holds the detached pixi environments
        # (detached-environments = true in .pixi/config.toml). On each fresh CI
        # runner the volume starts empty, causing the entrypoint to run
        # `pixi install` from scratch. This can consume significant resources.
        #
        # Seed the pixi-cache volume from the image's baked-in per-user cache
        # (/home/dev/.cache/pixi) BEFORE starting the dev container so the
        # entrypoint's pixi-info probe finds mojo already installed.
        # The volume name is prefixed with the Compose project name.
        VOLUME_NAME="odyssey_pixi-cache"
        # Idempotent: volume may already exist. `podman volume inspect` exits 0
        # only when the volume is present.
        if ! podman volume inspect "$VOLUME_NAME" >/dev/null 2>&1; then
          podman volume create "$VOLUME_NAME"
        fi
        # Check if already seeded (any mojo binary present under the volume)
        SEEDED=$(podman run --rm \
          --user root \
          -v "${VOLUME_NAME}:/mnt/pixi-seed" \
          odyssey:dev \
          bash -c "find /mnt/pixi-seed -name 'mojo' -type f 2>/dev/null | grep -q . && echo yes || echo no")
        if [ "$SEEDED" = "no" ]; then
          echo "Seeding pixi-cache volume from image layer..."
          podman run --rm \
            --user root \
            -v "${VOLUME_NAME}:/mnt/pixi-seed" \
            odyssey:dev \
            bash -c "cp -a /home/dev/.cache/pixi/. /mnt/pixi-seed/"
          echo "Seeding complete."
        else
          echo "pixi-cache volume already seeded — skipping."
        fi

    - name: Fix workspace permissions
      shell: bash
      run: |
        # Rootless Podman UID-maps bind-mounted host files, so the container
        # user may not be able to write to the workspace.  Make the checkout
        # world-writable (dirs get +x for traversal) so mojo build, test
        # fixtures, etc. can create output files.  Safe: CI runners are
        # ephemeral single-use VMs.
        #
        # Must run BEFORE `podman compose up -d` because the container
        # entrypoint immediately tries to write `.pixi/.gitignore` and
        # symlink `.pixi/envs` during `pixi install` — racing this chmod
        # caused intermittent "Permission denied" failures on CI runs that
        # bypassed the pixi-cache seed.
        #
        # Some files (e.g. socket inodes inside .pixi/) cannot be chmod'd —
        # log unexpected failures to stderr but do not fail the job.
        if ! chmod -R a+rwX .; then
          echo "warn: 'chmod -R a+rwX .' encountered files it could not modify" >&2
        fi

    - name: Start container
      shell: bash
      run: podman compose up -d odyssey-dev

    - name: Wait for container and verify
      shell: bash
      run: |
        for i in $(seq 1 30); do
          if podman compose ps -q odyssey-dev 2>/dev/null \
            | xargs -r podman inspect -f '{{.State.Running}}' 2>/dev/null \
            | grep -q true; then
            echo "Container is running"
            podman compose exec -T odyssey-dev pixi run mojo --version
            exit 0
          fi
          echo "Waiting for container... ($i/30)"
          sleep 2
        done
        echo "ERROR: Container did not start within 60 seconds"
        podman compose logs odyssey-dev
        exit 1
