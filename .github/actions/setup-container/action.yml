name: Set Up Podman Container
description: Build and start the Podman compose development container for CI.

runs:
  using: composite
  steps:
    - name: Ensure .gitconfig exists
      shell: bash
      run: touch "$HOME/.gitconfig"

    - name: Export runner UID/GID
      id: uid
      shell: bash
      run: |
        echo "USER_ID=$(id -u)" >> "$GITHUB_ENV"
        echo "GROUP_ID=$(id -g)" >> "$GITHUB_ENV"
        echo "user_id=$(id -u)" >> "$GITHUB_OUTPUT"

    - name: Cache container image tar
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5
      with:
        path: /tmp/podman-image-cache
        # UID is included so a cached image built with USER_ID=1000 is never
        # reused on a runner where id -u returns 1001.  Mismatched UID causes
        # /home/dev to be unwritable inside the container, which triggers
        # __fortify_fail_abort in libKGENCompilerRTShared.so during JIT init.
        key: container-image-uid${{ steps.uid.outputs.user_id }}-${{ hashFiles('Dockerfile', 'pixi.toml', 'pixi.lock') }}

    - name: Start Podman socket
      shell: bash
      run: |
        systemctl --user start podman.socket || true
        export DOCKER_HOST=unix:///run/user/$(id -u)/podman/podman.sock
        echo "DOCKER_HOST=unix:///run/user/$(id -u)/podman/podman.sock" >> "$GITHUB_ENV"

    - name: Load cached image or build
      shell: bash
      run: |
        if [ -f /tmp/podman-image-cache/dev.tar ]; then
          echo "Loading cached image..."
          podman load -i /tmp/podman-image-cache/dev.tar
        else
          echo "No cache found, building image..."
          podman compose build projectodyssey-dev
          mkdir -p /tmp/podman-image-cache
          podman save -o /tmp/podman-image-cache/dev.tar projectodyssey:dev
        fi

    - name: Start container
      shell: bash
      run: podman compose up -d projectodyssey-dev

    - name: Fix workspace permissions
      shell: bash
      run: |
        # Rootless Podman UID-maps bind-mounted host files, so the container
        # user may not be able to write to the workspace.  Make the checkout
        # world-writable (dirs get +x for traversal) so mojo build, test
        # fixtures, etc. can create output files.  Safe: CI runners are
        # ephemeral single-use VMs.
        chmod -R a+rwX . || true

    - name: Wait for container and verify
      shell: bash
      run: |
        for i in $(seq 1 30); do
          if podman compose ps -q projectodyssey-dev 2>/dev/null \
            | xargs -r podman inspect -f '{{.State.Running}}' 2>/dev/null \
            | grep -q true; then
            echo "Container is running"
            podman compose exec -T projectodyssey-dev pixi run mojo --version
            exit 0
          fi
          echo "Waiting for container... ($i/30)"
          sleep 2
        done
        echo "ERROR: Container did not start within 60 seconds"
        podman compose logs projectodyssey-dev
        exit 1
