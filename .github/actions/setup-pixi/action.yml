name: Set Up Pixi Environment
description: Install Pixi and restore the cached environment.

inputs:
  pixi-version:
    description: Pixi version to install
    required: false
    # Must be >= the pixi that writes pixi.lock locally (0.70.x → lockfile v7).
    # Older pixi (<=0.67) cannot read a v7 lock and fails `pixi install --locked`
    # with "Lock-file version 7 is newer than supported".
    default: v0.70.2

runs:
  using: composite
  steps:
    - name: Set up Pixi
      uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4
      with:
        pixi-version: ${{ inputs.pixi-version }}

    - name: Cache pixi environments
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5
      with:
        path: |
          .pixi
          ~/.pixi/bin
          ~/.cache/rattler/cache
        key: pixi-${{ runner.os }}-${{ hashFiles('pixi.lock') }}
