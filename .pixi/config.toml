# Prevent host-side and container-side pixi envs from colliding at the same
# filesystem path. With detached-environments = true, each side resolves its
# environment to its own per-user cache directory instead of
# <workspace>/.pixi/envs/:
#
#   Host:      ~/.cache/pixi/envs/<workspace-hash>/default/
#   Container: /home/dev/.cache/pixi/envs/<workspace-hash>/default/
#
# The two envs are completely separate and neither can corrupt the other.
# Pre-commit hooks (run on the host) and `just build` (run in the container)
# now target different physical locations, which is correct: Mojo requires
# glibc >= 2.32 and must run from the container's env; Python tooling (ruff,
# mypy, bandit) runs from the host's env.
detached-environments = true
